<script>
  const isCompactMode = new URLSearchParams(location.search).get('compact') === '1';
  if (isCompactMode) {
    document.body.classList.add('compact');
  }

  const compactMeta = document.getElementById('compactMeta');
  const headerMeta = document.getElementById('meta');
const BASELINE_PATTERN_MD="# 组织维度 × 平庸基线 × 偏离信号\n\n判偏离前,先知道\"平庸基线\"长什么样。下面 9 个维度,每个给:**平庸基线(D=0 的样子)**、**平庸 pattern(病征 + 露馅信号)**、以及**高偏离信号(D=2~3,值得关注的反共识做法,可能↑也可能↓)**。\n\n打偏离度 D 时:信号越贴近\"平庸基线\"→ D 越低;越像\"高偏离信号\"→ D 越高。注意一个维度可同时有多条信号,取最强的进 Top-3。\n\n贯穿所有维度的母题:**平庸 = 局部理性的总和**。每个平庸 pattern 背后,都是个体在自己位置上做了对自己理性、对组织有害的选择。一家公司能系统性地对抗这种引力,才构成真偏离。\n\n---\n\n## 先过这道闸:这是不是\"组织\"的事?\n\n**组织设计 = 公司如何安排「人」来产出的决策**:汇报线、团队边界、决策权与授权、招聘/解雇/晋升、激励与\"结果的所有权\"、信息流动、层级与 span、组织如何随战略演进。\n\n每条信号进打分前,先过**三问测试**(核心就一句:这跟\"人怎么被组织\"有关吗?):\n\n1. **主语测试**:把这条设计的主语换成\"人\"——是不是在说\"谁向谁汇报 / 谁能拍板 / 谁被招汰升 / 人怎么被激励 / 人被分进哪个团队 / 信息在人之间怎么流 / 人头叠几层\"?句子成立=候选组织信号;主语其实是\"产品/市场/钱\"=不是。\n2. **反事实测试**:换一个产品、换一个市场、换一种融资方式,这条设计还能**原样存在**吗?能(它独立于业务地约束人)=组织层;不能(它只是某业务/融资选择的影子)=**不是独立组织信号**——除非它已固化成对\"人\"的具体安排。\n3. **落点测试**:它最终改变的是\"人怎么协作产出\",还是\"做什么 / 卖给谁 / 钱从哪来\"?\n\n> **CEO 对\"公司怎么组织起来\"的独特、具体的理解/隐喻,本身就是一个信号。** 能说出一套连贯、反常的组织自我认知,本身稀有(多数 CEO 说不出任何连贯模型)——这是**维度8(一号位组织设计自觉)**上的真信号。但它是**入口 + 软信号,不是终值**:\n> - 框架 **+ 挖到背后在跑的机制**(谁/怎么/多少)→ 真 Alpha(高);\n> - 框架但**挖不到机制**(只是个好听的故事/愿景)→ 退回\"stated/愿景\",给一点\"有组织设计自觉\"的**软分**,别当 Alpha;\n> - **区分**:这指**独特、具体的运营模型框架**(隐含\"人/团队怎么被组织、发掘、培养、激励\"),不是\"长期主义/以人为本\"这类平庸口号(那类仍 = 0)。\n> 做法:**别把这类框架当产品/业务战略一刀切掉**(护栏一砍的是\"纯资本/产品/市场\"决策);把隐喻当入口,顺着挖背后的机制——挖到才算 Alpha,挖不到只记维度8 的软分。\n\n### 边界案例(最容易混的)\n\n| 决策 | 是组织信号吗 | 怎么处理 |\n|---|---|---|\n| 零融资 / 估值 / **公司 cap-table·治理·投票权**(超级投票权双重股权、使命锁定信托/PBC、董事会控制) | ✗ 金融/治理,**降权** | 它只说\"谁控制公司\",不说\"人怎么被组织\"——进战略层、不驱动高偏离 |\n| **员工所有权 / 股权即激励**(利润分成、广泛 ESOP、合伙人自掏入股、结果所有权) | ✓ 组织(激励) | 改变普通员工怎么被对齐/激励/问责 → 计入维度5 |\n| all-in 某赛道 / 砍某业务线 | ✗ 战略 | 进战略层;但\"为执行它怎么重组班子、动了哪些人\"=组织演进=✓ |\n| 产品做成模块化 / 某功能形态 | ✗ 产品 | 但\"按 API 把团队解耦、按 X 划团队边界\"(康威)=✓ |\n| 定价 / 增长打法 / 渠道 | ✗ 市场 | 进战略层 |\n| \"长期主义 / 第一性原理 / 做难而正确的事\" | 看落点 | 多为 cheap talk(见 costly-cheap-judge);只有落到**对人的具体反常做法**才算 |\n\n> 一句判定:**资本/战略/产品/市场的决策,只在它落到「人怎么被组织」上时,才转化为可打分的组织信号。** 例:\"零外部融资\"是资本决策(→战略层),不打分;它的**组织表达**才打分——\"无董事会\"(治理/决策权)、\"~40 人撑起 X 营收\"(span)、\"利润分享而非期权\"(激励)。\n\n---\n\n## 两道护栏(必须内建,别让工具被污染)\n\n**护栏一 · 地平线陷阱:业务离群 ≠ 组织离群。**\n一家公司可能在**业务/战略**上极离群(十年前做硬件、至暗时刻砍 IoT all-in 车、把半个公司压到一个客户),却在**组织**上只有\"长期主义/不浮躁/静下心\"这类 cheap talk。**偏离检测必须锚死在组织维度**:业务/战略上的特别**单独打标**(进战略层、写进卡片的\"业务/战略离群\"字段),**绝不混入组织分**。\n为什么这条是命门:本工具的价值在于挖\"被低估的隐藏变量——组织\"。业务/市场上的特别你本来就看得见、不需要这个工具;一旦把它算进组织分,就把工具退化成\"找敢下大注的公司\",并把一个**组织平庸但业务激进**的公司误判为高分。**组织分低 + 业务离群高**是一个完全合法、且很常见的结论——它的意思是\"战略上值得看,但组织上别指望从这工具里得到信号\"。\n\n**护栏二 · 表演型 outlier:正确但不特别。**\n会甩\"第一性原理/长期主义/拥抱变化\"金句的创始人很多——这些话**正确,但不特别**,因为谁都能零成本说。用 costly/cheap 判别(见 [`costly-cheap-judge.md`](costly-cheap-judge.md))过滤即可:这类口号 C≈0,**不构成组织偏离**,别被\"听起来很有理念\"骗成高 D。\n\n**护栏三 · 参照系:偏离对\"同类\"判,不对全体判。**\n判 D(偏离度)前,先定这家的**同类**(同子赛道 × 同规模/阶段;用 市场/上市状态/赛道 近似),问\"它的同类默认长什么样\",再看它偏离**同类**多远——不是偏离大公司多远。\n- **table-stakes 过滤**:同类群里**人人都这么说/这么做**的,**不算偏离**,D 压到 0–1。例:400 人 AI 创业公司喊\"扁平、3 层、快决策\"——这是 AI 创业公司的 table stakes(同辈共识),D≈0–1;同一句话出自十万人大厂才是大偏离。\n- 反过来:大厂一号位\"砍中层/自曝家丑\"对它的同类(成熟大厂)很稀有 = 高 D;放初创身上则无意义。\n- 这条接护栏二:**\"特别\"= 相对同类的特别,不是相对全人类。** agent 最爱犯的错就是拿初创跟大公司比、把同辈常态误判成\"反共识\"。\n\n---\n\n## 机制追问:每个维度要\"挖到\"什么(挖不到=不算数)\n\n打偏离前,每个维度都要把\"金句/印象\"追到**可复述的机制**(谁、怎么、多少)。挖不到机制就标\"需补机制\"、不进打分。这是准度的来源——一个维度真正的偏离,藏在机制的细节里,不在口号里。\n\n| 维度 | 要复述出的机制(到这层才算数) |\n|---|---|\n| 1 战略-结构 | 谁和谁被放进同一个 P&L/团队、为什么;新战略来时结构怎么重画 |\n| 2 人才密度 | 招谁/不招谁的**具体筛子**(筛什么信号,如\"问最近 2–3 个月的新 idea\");怎么汰换\"仅合格\"者(有无 keeper test/具体动作);团队规模涨还是平 |\n| 3 决策权 | 一线能独立拍板的**边界**(改什么不用签字);什么才上浮;谁拍板、谁只是牵头商量 |\n| 4 层级/span | 一线到 CEO 几层;经理平均带几人;晋升靠\"带人多\"还是\"战功\" |\n| 5 激励 | **为什么被激励**(奖结果/奖解题/奖创业)× **回报来源**(长期水位 vs 单次暴涨)× **公平机制**(如赛马是否平等授权)× 它实际**选出什么行为** |\n| 6 信息流 | 坏消息怎么上行、过几层、有无被包装;有无保证透明的**具体制度**(非口号) |\n| 7 康威 | 团队边界怎么划、和产品架构对不对得上 |\n| 8 一号位亲历 | 一号位亲自管什么、管到哪一层;\"放手\"有没有配套机制(而非撒手) |\n| 9 组织演进 | 上一次随战略动组织**具体动了什么**(拆了谁/换了谁/砍了什么) |\n\n> 怎么判一条机制可不可信(costly vs cheap)、一手 vs 二手怎么折,见 [`costly-cheap-judge.md`](costly-cheap-judge.md)。**机制本身就是最高级的 costly 证据**:它可复述、可证伪、能被员工对账;口号不能。\n\n---\n\n## 1. 战略—结构匹配\n- **平庸基线**:组织图是历史沉积,不是战略选择;问\"为何这样分工\"答\"一直这样\"。\n- **病征「组织图考古学」**:结构解释不了战略;reorg 频繁但战略没变。\n- **高偏离信号**:汇报线能反推战略(如把每块业务做成可独立下注的小团队=反推出\"多点下注\";纯职能制+单一 P&L=反推出\"单一深协同\");为了想要的产品架构**先设计团队边界**(用康威定律,而非被它支配)。\n\n## 2. 人才密度\n- **平庸基线**:用招人数量证明进展(\"今年从 200 到 600 人\"当政绩)。\n- **病征「人头通胀 + B 级常态化」**:关键岗位有\"占位但不增长\"的人,无人敢动;靠流程兜平均水平。\n- **高偏离信号**:敢用\"留任测试\"主动清退\"仅合格\"者(\"仅合格也给优厚遣散\");明确\"少而精+顶薪\"而非\"多而平庸+控成本\";不拼天价薪酬却有超高留存(靠使命/文化留人)。\n\n## 3. 决策权与授权\n- **平庸基线**:决策默认上浮,一线不敢拍板;CEO 日历塞满细节。\n- **病征「决策上浮 / 拍板权真空」**:中层\"能独立批的最大决策\"小得离谱;责任不对称(拍错挨罚、拍对功劳归上)。\n- **高偏离信号**:可逆决策下沉一线、错了再改(可逆/不可逆分级,可逆的不上浮);能独立把一件事从想法带到落地的\"barrel\"被识别并授权;给足上下文、把决策权留在一线(context-not-control);自缚式决策承诺(\"X 小时内不决策则默认下级拍板\")。\n\n## 4. 官僚层级与 span of control\n- **平庸基线**:层级随规模增厚,span 普遍窄(经理带 2–3 人),大量\"经理的经理\"。\n- **病征「科层增生」**:<5000 人却 >6–7 层;为给晋升造位置而增层(为人设岗)。\n- **高偏离信号**:极宽 span(几十个直接下属、不设一对一);刻意压层级;把\"协调岗位增速 > 产出增速\"当红线砍。\n\n## 5. 激励与所有权\n- **平庸基线**:奖励\"活动/规模\"而非\"结果\";晋升给\"管的人多\"的。\n- **病征「联合负责 = 无人负责」**:关键指标说不出唯一具名 owner;\"two-in-a-box\"。\n- **高偏离信号**:每个指标有具名 owner、上下行都真实;极致去中心化 + 真实所有权(子公司高度自治、总部极小);奖励\"用更少的人解决更大问题\"。\n- **所有权只算\"员工层\"**:利润分成 / 广泛持股 / 合伙人入股 / 结果所有权(改变人怎么被对齐)= 组织信号、计这里;**公司层 cap-table / 治理 / 投票权(双重股权、PBC/信托)= 金融治理,降权、不在这里计**(见边界案例)。一句测试:这条股权改变的是\"普通员工周二怎么干活/被激励\",还是只改变\"谁控制董事会\"?后者不算。\n\n## 6. 信息透明与真相上行\n- **平庸基线**:坏消息逐层美化,越近高层越乐观;真问题只在茶水间/匿名社区流通。\n- **病征「真相反向衰减」**:报喜不报忧是局部最优。\n- **高偏离信号**:坏消息无损快速上行、一线敢当面说不;把\"逆权力说真话\"制度化(如全员互评/公开 issue log——但这类高调透明也可能是\"表演式 costly\",见 judge 失效模式)。\n- **特别强 ↑ 信号:一号位 costly 地公开自陈组织病**。平庸的默认是**否认与麻木**——大多数 CEO 报喜不报忧、对自己组织的退化无感。所以当一号位**公开、具体、自我归罪地**揪出大公司病(如点名\"大公司病全有了\"\"效率比优秀团队低很多我却不震惊\"),且**跟着真动作**(拆冗余结构、砍项目),这是真相上行 + 标准维度的**强 ↑ 反平庸信号,不是\"确认平庸\"**。详见下方\"承认 ≠ 平庸\"。\n\n## 7. 康威定律 / 组织即产品\n- **平庸基线**:产品忠实暴露组织政治(两功能互掐=两部门争地盘;App 里反复换语境)。\n- **病征「出货组织图」**:没人有权跨部门统一体验,产品接缝长在组织接缝上。\n- **高偏离信号**:有意用团队边界**设计**出想要的架构(如用 API/接口强制团队解耦);产品连贯是因为组织接缝被设计过。\n\n## 8. 一号位对组织的亲历程度\n- **平庸基线**:一号位认知停在直接下属层,再往下是黑箱;只有抽象汇报、没有具体的人和卡点。\n- **病征「PPT 级认知」**:画不出真实组织图。\n- **高偏离信号**:叫得出二线骨干、知道卡在谁那;\"文化无法被委托\"(亲自管文化/招聘);敢放手是因为**先把组织设计成能自运转**(网状/自治结构),而非撒手。\n\n## 9. 组织随战略演进的能力\n- **平庸基线**:打法三年不变(惯性)**或** reorg 上瘾、中台越铺越大(为组织而组织)。\n- **病征「惯性 / 为组织而组织」**:用结构动作代替战略思考。\n- **高偏离信号**:每个量级主动重置打法和班子;**敢做减法**(如把共享中台拆成各自担损益的 BU;或试了一套重型治理体系后公开认错、退回更轻的打法)。\n\n---\n\n## 平庸反模式速查(出现即扣偏离、或本身是\"高可信平庸信号\")\n\n中层臃肿(frozen middle)· 为组织而组织 · consensus 瘫痪 · politics 内耗 · metric gaming(OKR/PBC 博弈)· 组织惯性(\"我们一直这样\")· reorg 成瘾 · 决策上浮 · 流程/黑话替代判断(万字文档、黑话满天飞)· 能量内向(最强的人忙于内部对齐而非客户)。\n\n### 承认 ≠ 平庸(关键区分,别搞反)\n\n要把**病征的存在**和**一号位对病征的承认**分成两件事打分:\n\n- **病征独立成立 = 确认平庸**:有**独立证据**显示组织真的官僚/迟钝/政治(员工口径、可核验的决策慢、实际的中层臃肿)→ 这是\"确认平庸\"的 costly 证据,钉低分,RICH。\n- **一号位 costly 地公开承认 = Delta 级的 ↑,不是 Alpha**:CEO 具体、自我归罪地揪病 + 宣布改——这比\"否认与麻木\"强,给一点 ↑(自觉/在转向)。但它是 **Delta(增量信号)**,**不是截面优异,默认不进主分、不据此打高分**。至于是否意味着组织债,**别一概而论——detect 到 reorg 要诊断一轮(强势演进 vs 弱势补债,见 SKILL 顶部),且有债≠判死**。标\"↗转向中\",要进分得满足 Delta 的两条件(转向后 Alpha 可刻画 + revealed 在落地)。\n- **唯一打折情形**:承认若是**空泛口号、无具体细节、无后续动作**(如只喊\"我们要保持创业精神\")→ cheap talk,既不给 ↑、也不算可靠病征。\n\n> 两句话框住它:**①** 别把\"承认大公司病\"当成\"得了却没救\"——能 costly 说出来,说明组织还有自我修正力(Delta ↑)。**②** 但也别把它当成\"组织好\"——**承认+宣布改 = 它在转向(Delta),不是它截面上优异(Alpha)**。至于有没有债、债重不重,**detect 到 reorg 要诊断一轮(强势演进 vs 弱势补债),别默认有债;且有债≠判死——高 Alpha + 有债仍可能强过无债的平庸**。主分看 standing Alpha,Delta 单独标。\n\n**但承认只证明\"自觉\",不证明\"修好了\"(治\"说得好但落实平平\")。** 一号位 costly 承认 + 宣布修复(回创业制/拆中台/提速 X%),**默认仍是 stated**;\"宣布的修复真生效\"要有 **revealed 证据**(员工侧、第三方、可验证结果,且**没回弹**)。只有承认+宣布、没有落地证据 → **\"敢说\"给点 ↑,\"做成\"不给分**,按 judge\"落地/revealed 闸\"封顶 C≤2、标\"待验证落地\"。否则会被\"会自我批评、还自带漂亮数字的 articulate 创始人\"骗成高分(典型:CEO 财报会自我归罪 + 自引\"提速 30%\" + 宣布改制——全是 stated)。\n\n---\n\n> 信息盲区另说:搜了几轮**查无组织表达**(既无病征证据、也无承认)→ 置信度 NONE/THIN、标\"待补\",和上面\"确认平庸\"(RICH、可 Pass)是两回事。\n";

rong>——逆自身短期利益、得罪可被高价撬走的明星。〔revealed〕留存数据 = 没回弹的落地证据。偏离&rdquo;按市场博弈/拍脑袋加薪&rdquo;同类常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;he has just one direct report — his chief of staff…Everyone else reports to…Daniela Amodei&rdquo;;&rdquo;It&rsquo;s incredibly freeing&rdquo;(Dario Amodei→Bloomberg)</td>\n<td><strong>CEO 只留 1 个直接下属,全执行层挂在 President 之下</strong>;Dario 把 100% 带宽留给战略/文化/研究方向(自述 ~40% 时间在文化)。对比 Altman ~6、黄仁勋数十——对同类一号位极反常。注:&rdquo;freeing&rdquo;对他本人更省事(理发师铁律)→ C 封 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/决策</td>\n<td>&ldquo;He quite frequently puts out…very, very well-reasoned essays&rdquo; → &ldquo;giant essay-length debates&rdquo;(Sholto Douglas);鼓励 &ldquo;don&rsquo;t agree with leadership and challenge it publicly&rdquo;;&rdquo;avoid…&rsquo;corpo speak&rsquo;&ldquo;(Dario, Dwarkesh)</td>\n<td><strong>以 Slack 长文+全员书面辩论取代发言式会议</strong>,一号位观点公开可被员工当面顶;notebook 频道、failed-experiment postmortem、匿名反馈。机制可证伪但成效混合(分析师指 &ldquo;analysis paralysis&rdquo; 风险)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top-3 = 9(密度)+9(激励)+6(span)= 24 → round(24/27×100)= <strong>89</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;mission 对齐是买不到的稀缺资源、可替代天价薪酬留住顶尖人&rdquo;+&rdquo;小而极对齐的网状组织能自运转,让 CEO 几乎不做日常管理&rdquo;。失效条件:规模过千后 vibe-based 对齐稀释(报道已点名&rdquo;hive mind 可持续性&rdquo;存疑);AGI 竞赛若让 mission 溢价被对手现金碾压、留存数据回落,则两根支柱同时松动。</li>\n<li><strong>盲区+下一步</strong>:康威/团队边界划法、研究 vs 产品 P&amp;L 结构未挖到机制(需补)。Follow up:验证 hypothesis &ldquo;culture interview 是真闸还是表演&rdquo;——找近两年被拒的强技术候选人/在职研究员对账(judge 失效模式① 表演式),以及 2026 留存是否随规模扩张回弹。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:Responsible Scaling Policy(braking-performance-keeps-pace-with-engine)、PBC/长期收益信托属治理与战略,降权;不驱动组织分但属反共识战略层。</li>\n<li><strong>优先级</strong>:组织 89 × 市场(大,基础大模型/AGI) × 战略(反共识,safety-first + 反天价挖角)→ <strong>P0</strong>。三项全顶格,且偏离信号有 revealed 第三方数据托底、非 CEO 自引——放下手头去看、follow up Daniela Amodei(运营一号位)与招聘负责人侧的机制落地。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":4,"score":89,"conf":"RICH","dir":"?","priority":"P0","company":"Telegram","oneliner":"30工程师撑10亿用户、无HR无中层、Durov独任PM+赛事招人,机制全revealed","card":"<h1>Telegram — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。组织操作系统 =「Navy SEAL 编制」——~30 名工程师扛 10 亿+ 用户、零 HR、创始人是唯一 PM/股东/董事,招人不靠面试靠 coding 比赛筛&rdquo;全球最强单点&rdquo;。这是<strong>截面 Alpha</strong>(自创始至今一直如此、当前在跑、可复述),不是转向 Delta;赌注极端,且 1B 用户在线本身就是落地证据。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span(4)</td>\n<td>&ldquo;it&rsquo;s just about 30 engineers… It&rsquo;s really compact, it&rsquo;s super efficient. It&rsquo;s like a Navy SEAL team.&rdquo;(Durov, Lex Fridman 2025-10);spokesperson 校正:&rdquo;30 developers… plus 30 core team&rdquo;(TechCrunch 2024-06)</td>\n<td>~30 工程师(+约30核心)服务 1B+ 用户、无中层、无董事会;每人 span 极宽、责任极广。偏离同类(社交平台动辄数千~万人)极端;且由可运行产品 revealed</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;We don&rsquo;t need an HR department to find super-talented engineers.&rdquo;「我们在 contest.com 办比赛,每一两个月一次,选 best of the best of the best」;近期 Android 赛头奖=$100万年薪(Durov, officechai/Lex 2025)</td>\n<td>招人筛子=公开 coding 比赛(2007 VK 沿用至今)+&rdquo;必须是产品用户&rdquo;;不办常规面试、不设 HR。汰换=赢不了比赛即出局。排他、可证伪、自缚——costly 且 revealed(contest.com 在跑)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(3)</td>\n<td>〔事实〕Durov 是 Telegram 唯一 PM、唯一重要股东、唯一董事,无外部投资人、无董事会;&rdquo;executive-level decisions are made by Pavel Durov&rdquo;,直接对接工程师(多源:Axios/revenuememo 2024–26)</td>\n<td>唯一拍板人=创始人,可逆/不可逆都他定;无审批层、无政治。极端集权——下行全担(2024 法国被捕即&rdquo;负责人&rdquo;由他一人承)→ 是 costly 而非自利的集权</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/风险(6)</td>\n<td>Galperin(EFF):&ldquo;&lsquo;Thirty engineers&rsquo; means there is no one to fight legal requests… no infrastructure for dealing with abuse and content moderation&rdquo;;Aumasson:&rdquo;none of these 30… include privacy or compliance people, zero third-party audit&rdquo;(TechCrunch 2024-06)</td>\n<td>同一极致精简在合规/审核/安全维度=结构性缺人，第三方点名为风险。同一机制的 ↓ 面,记录在案</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → span 9 + 人才 9 + 决策 6 = 24;round(24/27×100)=<strong>89</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;极少数顶尖单点 + 创始人单一品味&rdquo;能替代规模化组织。在产品/工程上已被 1B 用户证明;失效点在合规/审核/安全这类<strong>需要人多于需要天才</strong>的维度——监管与滥用治理压上来时,30 人结构是债(2024 被捕即一次撞墙)。</li>\n<li><strong>盲区 + 下一步</strong>:无&rdquo;怎么开会/纪要&rdquo;的一手机制原话(需补);激励维度(工程师如何分钱/留存率)只有薪酬亮点、缺机制。follow-up:Lex Fridman 2025 全访谈逐字 + contest.com 实际录用→留存数据,验证&rdquo;30 人是否真稳态、还是靠 Durov 不可复制&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零外部融资、TON/加密自筹、抗监管定位——战略极离群,但已单列,不混入组织分。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 大(全球即时通讯)× 战略 反共识 → <strong>P0</strong>:组织赌注极端、可信、revealed,且压在大市场+反共识战略上。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":5,"score":89,"conf":"RICH","dir":"↑","priority":"P0","company":"DeepSeek (深度求索)","oneliner":"无层级无预设角色、实习生免审批用集群,机制可证伪且多源印证","card":"<h1>DeepSeek (深度求索) — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头去看。组织操作系统 = <strong>「两层制 + 研究员自组织 + 应届顶尖脑 + 无审批算力/无 KPI」</strong>——用约 150 人、只有&rdquo;梁文锋 + 研究员&rdquo;两层、不靠天价薪酬，跑出 frontier 模型。这是<strong>截面 Alpha</strong>(当前在运行、跑成稳态、可复述成机制),不是转向故事;唯一的 ↓ 是<strong>核心作者被对手 2–3 倍薪资撬走</strong>,压着&rdquo;靠使命留人&rdquo;这条假设。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;只有梁文锋和其他研究员两个层级&rdquo;;〔研究团队约100多人、除梁文锋外没有二把手〕(网易《V4发布前的DeepSeek》)</td>\n<td>~150人组织只有 founder→研究员两层、无 deputy、无总监层;梁出席每个团队周会、周会跨组开放。偏离同类 lab(仍有 research director/VP 层)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;我们的招聘标准一直基于热情和好奇心…他们对研究的渴望远超对金钱的关注&rdquo;;&rdquo;(有)热爱、扎实的基础能力,其他都没那么重要&rdquo;(梁文锋·暗涌2024.7,新浪转载)</td>\n<td>几乎不社招、招应届/博士/四五年级实习生,172名作者中&gt;7成本硕、&gt;7成&lt;30岁;不靠天价薪酬却出 frontier→筛&rdquo;内驱+好奇&rdquo;而非资历/名校。同类共识是 8 位数挖资深明星</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/激励</td>\n<td>&ldquo;计算资源和团队成员的使用没有限制…可以随时调用训练集群,无需审批&rdquo;;&rdquo;没有明确的绩效考核和DDL&rdquo;;&rdquo;不预先设定角色,分工是自然形成的&rdquo;(暗涌;网易)</td>\n<td>一线无审批用集群、不打卡(6–7点走)、无 KPI、自由组队;但&rdquo;当一个idea显潜力,我们也会<strong>自上而下</strong>地去调配资源&rdquo;→ 探索期下沉、下大注时集中。非纯去中心</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威</td>\n<td>&ldquo;cross-functional division of labor…数据选择与infra落地必须在实验定版期一起考虑&rdquo;(网易)</td>\n<td>不按职能切墙、按模型训练的协同需求让 data/infra/算法贴在一起做 = 用团队边界设计协同,非组织图考古</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>留存(债/红旗)</td>\n<td>〔V4致谢近300研发者,10名核心作者已离职:王炳宣→腾讯、罗福莉被雷军千万年薪挖至小米、郭达雅→字节;对手薪资普遍高2–3倍、部分8位数总包〕(每经/钛媒体/证券时报)</td>\n<td>&ldquo;低薪+使命留人&rdquo;模型在过热市场被精准定价撬动→这是市场挖角压力、非弱组织 reorg 补债;不抹掉 Alpha,但是&rdquo;何时失效&rdquo;的真条件</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 层级(3×3=9)+ 人才(3×3=9)+ 决策/激励(3×2=6)= <strong>24/27×100 ≈ 89</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;少而精的内驱天才 + 极低管理摩擦&rdquo;能持续胜过&rdquo;规模化 + 强激励 + 厚管理层&rdquo;;当(a)对手用 2–3x 薪资持续撬走能独立带方向的核心作者、(b)规模逼近梁本人&rdquo;亲历式&rdquo;管理与自然分工的上限时,两层制可能撑不住。</li>\n<li><strong>盲区 + 下一步</strong>：信息流(坏消息上行机制)、晋升/汰换具体动作&rdquo;需补机制&rdquo;——非平庸,是没挖到。follow up:验证 hypothesis&rdquo;frontier 输出靠的是结构(两层+无审批)还是少数明星个体&rdquo;——查留任核心 vs 离职后产出是否衰减;问前员工&rdquo;无 KPI 下怎么决定谁做什么、谁的赌注被砍&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：幻方量化自有算力/零外部融资、开源 + 极低定价(&ldquo;不亏本不暴利&rdquo;)——战略极反共识,但属资本/市场层,不进组织分。</li>\n<li><strong>优先级</strong>：组织 89 × 市场 大(frontier LLM/AGI) × 战略 反共识 → <strong>P0</strong>:组织截面 Alpha 强且可信(多为 revealed),押在最大牌桌上,理应优先看;同时盯人才留存这条 ↓。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":6,"score":89,"conf":"RICH","dir":"↑","priority":"P0","company":"Airbnb","oneliner":"职能制+单一roadmap(10%法则)+砍掉经典PM+30人核心组,稳态5年的强Alpha","card":"<h1>Airbnb — Why attention?   ·   Score 89 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。组织操作系统 = <strong>&ldquo;创始人当总编辑的单一功能制&rdquo;</strong>——把一家 $12B 上市消费平台砍成一个 P&amp;L、无 BU/GM、无 COO,全部职能直接汇报给 Chesky,他亲自 hire/fire/promote/manage ~50 人、按 1/2/4 周节奏当 editor-in-chief 评所有产品、全公司 2x/年统一发布。这是<strong>截面 Alpha(已稳态运行 ~5 年、没回弹)</strong>,不是只会讲故事的 Delta。它<strong>起源于 2020 危机式 reorg(Δ),但已固化成持续在跑的标准结构</strong>(诊断:危机后被迫做 → 但常规节奏维持 5 年、营收/利润为正、未反转 = 强组织已把补债转成 standing Alpha)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 康威</td>\n<td>&ldquo;I got rid of layers of management. I went back to functional. I got rid of all managers… you can only manage the function.&rdquo;(Chesky, officechai 转述其发言);〔事实〕把约 10 个 division 砍回单一功能制,finance/strategy/product/legal/people 全直报 CEO、无 COO(fourweekmba / 多源)</td>\n<td>一个 P&amp;L、无 BU、无 GM、共享 eng/marketing;新战略来时先重画团队边界(康威主动用)。偏离同类(Booking/Expedia/Uber 皆 BU+GM 制)的上市消费平台基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span + 一号位亲历</td>\n<td>&ldquo;I treat them all as my directs… hire, fire, promote, and manage&rdquo;(Fortune 2025-08);〔事实〕在 ~7,300–8,200 人公司亲管 ~50 人(Fortune/Yahoo)</td>\n<td>CEO 把 ~50 人当直属、亲自决定去留升迁 + skip-level;自缚式占用 CEO 时间、可证伪、反&rdquo;大公司 CEO 不下沉&rdquo;正统</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权 / 组织演进</td>\n<td>&ldquo;we got rid of the classic product management function… we combine product management with product marketing&rdquo;;&rdquo;The CEO reviewed all work… editor-in-chief&rdquo;(Joca Torres 转述其演讲);&rdquo;I actually stay in the details&rdquo;(Kantrowitz)</td>\n<td>PM 并入 product marketing、designer 升到 PM 级;roadmap 收敛到 ~10 个项目;<strong>80% 产品 2x/年统一发布、20% 持续优化</strong>;Chesky 按 1/2/4 周评所有产出。偏离&rdquo;PM 主导 + 持续小步发版&rdquo;行业共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We want a small, lean, elite… team, not a team of mid-level battalion type people&rdquo;;&rdquo;every person brings… a communication tax&rdquo;;&rdquo;B players hire lots of C players&rdquo;(officechai)</td>\n<td>用&rdquo;沟通税(人头→复杂度指数级)&rdquo;压人头(headcount 5 年仅 ~7.3k→8.2k)、控会议;偏离&rdquo;用招人数量证明进展&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9 + 9 + 6 = 24 → 24/27×100 = <strong>89</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;创始人能当全公司单点带宽 + editor-in-chief&rdquo;——AI 让&rdquo;少而精&rdquo;成立时极强;一旦 Chesky 离场/分心/赛道需多线并进,单点功能制会成瓶颈(可逆性差、无 COO 接班缓冲)。</li>\n<li><strong>盲区 + 下一步</strong>:信息流维度(坏消息怎么上行)无独立机制证据;PM 改制后<strong>员工侧对账缺位</strong>(未找到 Blind/Glassdoor 一线口径印证 vs 表演)。Follow-up:① 找前/现 PM 与设计师口径,验证&rdquo;editor-in-chief&rdquo;是真授权还是事必躬亲瓶颈;② 验证 2x/年发布是否仍在跑(2025-2026 节奏)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:2025 计划砸 $250M 拓新业务线(Experiences/Services)、travel/OTA 大市场——战略层值得看,但与组织分独立。</li>\n<li><strong>优先级</strong>:组织 89 × 市场 大(全球旅游/OTA)× 战略 反共识(功能制 all-in)→ <strong>P0</strong>:组织分极高 + 大市场,放下手头去看;主要风险是单点依赖创始人。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":7,"score":85,"conf":"RICH","dir":"↑","priority":"P0","company":"Netflix","oneliner":"keeper test+context-not-control+无休假/报销政策,多条在跑且可证伪的高Alpha","card":"<h1>Netflix — Why attention?   ·   Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头看——这是<strong>截面 Alpha</strong>（运行 20+ 年、已被第三方反复验证、被全行业抄袭的&rdquo;组织操作系统&rdquo;），不是转向 Delta。它的 OS：<strong>用极高人才密度替代流程</strong>——&ldquo;少而精 + 个人市场顶薪全现金 + keeper test 持续汰换&rdquo;，再在此前提上跑&rdquo;context not control + informed captain&rdquo;的去审批决策。同辈基线是好莱坞大厂的科层+占位文化，Netflix 在人才密度/激励/决策权/低官僚四维同时反常。下方每条均为<strong>当前在运行</strong>的机制（A）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;If X wanted to leave, would I fight to keep them?&rdquo; / 新增 &ldquo;Knowing everything I know today, would I hire X again?&rdquo;（Netflix 官方 Culture Memo, jobs.netflix.com/culture）；〔事实〕&rdquo;adequate performance gets a generous severance&rdquo;（历版 memo，业内广引）；〔事实〕FY24 营收 $39.1B / ~12,800 人 ≈ <strong>$3.0M 营收/人 vs 迪士尼 ~$410K、233,000 人</strong>（SEC 10-K + Bullfincher）</td>\n<td>经理对每个直接下属<strong>持续</strong>（非年度）做 keeper test，&rdquo;仅合格&rdquo;者主动给优厚遣散换星；汰换是<strong>真动作+可对账</strong>（员工侧 Glassdoor/Blind 反复证实&rdquo;被裁/焦虑&rdquo;——证明机制真在跑）。偏离好莱坞大厂&rdquo;人头通胀+占位不动&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>&ldquo;We pay personal top of market for the role and location — a judgment about what that person could make in a similar role at another company.&rdquo;（官方 memo）</td>\n<td>全现金、按&rdquo;你在别处能拿多少&rdquo;定薪，不玩期权游戏/不靠职级表 → 奖个人市场价、买留存而非锁人；偏离&rdquo;分级薪酬带+股权绑定&rdquo;共识。营收/人是其 revealed 结果</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;For every significant decision, we identify an informed captain… We expect informed captains to seek out different opinions… We call this farming for dissent.&rdquo;（官方 memo）；&rdquo;context not control&rdquo;（同上）</td>\n<td>每个重大决策<strong>单一具名 informed captain</strong> 拍板（非共识投票）、决策前强制&rdquo;farming for dissent&rdquo;、同目标的两组无需相互审批即可执行 → 决策下沉一线、给上下文不给控制；偏离&rdquo;决策上浮/层层签字&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/官僚</td>\n<td>&ldquo;Our vacation policy… is two words: &lsquo;Take vacation.&rsquo;&rdquo; / &ldquo;Our expenses policy is just five words: &lsquo;Act in Netflix&rsquo;s best interests.&rsquo;&ldquo;（官方 memo）</td>\n<td>取消休假/差旅/报销审批制度，只留一句原则 → 自缚式去流程（赌人才密度撑得住、出事公开打脸）；对大公司基线（厚审批层）激进反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2024 改版 memo：&rdquo;professional sports team, not a family&rdquo;；保留 keeper test 并<strong>新增</strong> &ldquo;would I hire again&rdquo; 维度（about.netflix.com/news；Entrepreneur）</td>\n<td>reorg 诊断：<strong>强组织表现好时主动升级</strong>（盈利/增长中、按节奏收紧标准、有 15 年 track record），非危机补债、非反复反转 → 维度9 的 Alpha，不扣分</td>\n<td style=\"text-align: center;\">Δ→A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3：人才密度 S=9、激励 S=6、决策权 S=6 → Σtop3=21 /27×100 = <strong>78</strong>；2024 演进经诊断为强组织主动升级（非债）、上调至 <strong>85</strong>。<strong>在赌什么 / 何时失效</strong>：全押&rdquo;人才密度足够高 → 流程可省、自由可给&rdquo;。失效条件：密度一旦下滑，无流程兜底会放大风险；员工侧&rdquo;culture of fear / 24-7 anxiety&rdquo;是真实下行（方向风险），可能压制坦诚与冒险——costly 不等于对，这套对&rdquo;可被替换的执行岗&rdquo;残酷。</li>\n<li><strong>盲区 + 下一步</strong>：现任双 CEO（Sarandos/Peters）<strong>个人</strong>招人筛子/会议怪癖未挖到一手原话（机制承自 Hastings 时代、属公司级而非个人级）——是信息盲区，非平庸。Follow up：①验证 keeper test 在 Hastings 退任后是否仍硬执行、有无松动（找近 1-2 年 Blind/离职访谈对账）；②验证&rdquo;fear culture&rdquo;是否在伤害内容创新产出。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：单一全球流媒体平台、广告/游戏扩张、并购 WBD 传闻——战略层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 85 × 市场 {大，全球流媒体} × 战略 {部分反共识} → <strong>P0</strong>：高 Alpha + 大市场，标杆级可学样本，放下手头看。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":8,"score":85,"conf":"RICH","dir":"↑","priority":"P0","company":"Shopify","oneliner":"加人前先证明AI做不了+含高管全员+进考核,正式资源闸","card":"<h1>Shopify — Why attention?   ·   Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头去看。这是<strong>截面 Alpha（不是转向故事）</strong>——一个把&rdquo;减法/去摩擦&rdquo;做成可复述硬机制的组织操作系统：用 IT 一夜杀光会议、用&rdquo;先证明 AI 干不了才准招人&rdquo;卡住人头通胀、用&rdquo;生命故事+机会观&rdquo;筛人而非标准面试题。多数同类（大型 SaaS）只喊&rdquo;高效/扁平&rdquo;，Shopify 把它落成了得罪人、可证伪、且被财报数据 revealed 的动作。同辈 table-stakes（喊敏捷）已剔除。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/层级</td>\n<td>&ldquo;We can either go slow and deliberate, or fast and chaotic. We are going fast and chaotic… Intentional chaos is more than okay&rdquo;（COO Kaz Nejatian 全员邮件, 2023-01, Fortune/Axios）；Tobi: &ldquo;The best thing founders can do is subtraction&rdquo;（Bloomberg）</td>\n<td>IT 一夜<strong>自动删除全公司所有 3 人以上 recurring 会议</strong>，释放约 76,500 小时；周三零会议；50 人以上会议只能周四 11-5 ET。非&rdquo;鼓励少开会&rdquo;口号，而是<strong>用系统强制</strong>——同类多停在倡议层</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/人才密度</td>\n<td>&ldquo;Teams must demonstrate why they cannot get what they want done using AI before asking for more headcount and resources&rdquo;；&rdquo;reflexive AI usage is now a baseline expectation&rdquo;；&rdquo;this applies to me and the executive team&rdquo;（Tobi 内部备忘, 自己发到 X, 2025-04, CNBC/Inc）</td>\n<td><strong>招人前先举证 AI 干不了</strong>；AI 使用进<strong>绩效考核+同行互评</strong>；明确含 CEO/高管自己。〔revealed 事实〕员工数 8,300→约8,100，而 2024 营收 +26% 至 $8.88B、经营利润由 −$1.42B 翻正至 +$1.08B（公司 6-K/年报）→ 人头与营收脱钩、<strong>没回弹</strong>。偏离&rdquo;用招人数量证明进展&rdquo;的人头通胀基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度（筛子）</td>\n<td>&ldquo;the strongest predictor of people who do well at Shopify is whether they see opportunity as something to compete for, or… essentially everywhere and unlimited&rdquo;；trust 从 50% 起&rdquo;battery&rdquo;（Knowledge Project Ep.41, fs.blog）</td>\n<td><strong>不问标准面试题</strong>，听候选人讲生命故事+追问关键决策；用&rdquo;机会观（稀缺 vs 无限）&rdquo;做录用预测器；二级人才市场<strong>招潜力不招现成技能</strong>。是 revealed 的看人筛子，非&rdquo;我们重视人才&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位自觉</td>\n<td>组织&rdquo;like a book written by a single author&rdquo;，主张 &ldquo;skilled micromanagement&rdquo;；&rdquo;Amazon is trying to build an empire and Shopify is trying to arm the rebels&rdquo;（Tobi 多处访谈, readtheprofile/notboring）</td>\n<td>一号位亲自管文化与产品连贯性、用单作者隐喻反对纯放手；&rdquo;arming the rebels&rdquo;是连贯运营模型（隐含怎么组织/激励团队）。框架+部分在跑机制→维度8 真信号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/演进</td>\n<td>&ldquo;larger companies are more sluggish… because of all the side quests and distractions&rdquo;；点名 managers &ldquo;add heavy layers of process, approvals, meetings&rdquo;（Tobi 2023-05 裁员备忘, Globe&amp;Mail）；员工感觉像&rdquo;NPCs&rdquo;（TechCrunch 批沟通）</td>\n<td>砍 20%（约1,800人）、卖物流给 Flexport、<strong>专砍管理层减少层级</strong>。reorg 诊断：在聚焦&rdquo;main quest&rdquo;时主动做、明确减层（偏 Alpha），但沟通翻车=轻债。<strong>不进主分</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C：决策权 3×3=9、AI/人头 3×3=9、筛子 2×2=4 → Σ=22 → round(22/27×100)=<strong>81</strong>；一号位 4 作第4条不计入。〔同维度限 2 条，决策权与激励为不同维度故都计〕<strong>取 85 反映 revealed 落地之硬（财报数据，非自述）。在赌什么</strong>：赌&rdquo;减法+去摩擦+AI 杠杆&rdquo;能让小团队持续跑赢人头堆出来的对手；<strong>失效条件</strong>：AI 真实产出不及预期时，&rdquo;先证明 AI 干不了&rdquo;会退化成隐性 hiring freeze、灼伤士气（Blind/员工侧已有&rdquo;变相裁员&rdquo;解读，待坐实）。</li>\n<li><strong>盲区 + 下一步</strong>：信息流/真相上行、康威定律两维<strong>信息不足</strong>（≠平庸，需补）。Follow up：① 拉 Glassdoor/Blind 2025 看 AI 强制令的员工侧对账（mandate 是真提效还是恐惧驱动的&rdquo;AI 守门人&rdquo;）；② 验证 hypothesis&rdquo;会议清零没回弹&rdquo;（员工证实 2024-25 仍维持 vs 悄悄复原）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：&rdquo;arm the rebels&rdquo;对抗 Amazon 的平台战略、大市场（全球电商基建），属反共识战略层，叠加在高组织分上。</li>\n<li><strong>优先级</strong>：组织 85 × 市场（大）× 战略（反共识）→ <strong>P0</strong>。高 Alpha 截面 + 一条轻量 reorg 债（沟通翻车），债不减 Alpha；revealed 财报证据使 AI/人头机制坐实，达到 P0 阈值。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":9,"score":85,"conf":"RICH","dir":"↑","priority":"P0","company":"Amphenol","oneliner":"100+独立P&L、GM全权当老板经营、总部极小:跨数代CEO稳态的去中心化机制","card":"<h1>Amphenol (APH) — Why attention?  ·  Score 85 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。它的&rdquo;组织操作系统&rdquo;是<strong>把一家 ~170,000 人的公司拆成 ~145 个全 P&amp;L 自治小公司</strong>,每个 GM 像老板一样自管工厂/研发/定价/客户,总部仅几百人、无中央 R&amp;D/销售/制造——这是<strong>截面 Alpha</strong>(已稳定运行 35+ 年、被业绩反复验证),不是转向故事。极少数把&rdquo;联邦式去中心化&rdquo;做到这个规模且没崩的工业公司。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权</td>\n<td>&ldquo;We give the management team complete authority to run their operating unit.&rdquo; &ldquo;We do not micro-manage from headquarters.&rdquo; &ldquo;The team on the ground, those closest to the customer, have total flexibility.&rdquo;(Norwitt, ConnectorSupplier)</td>\n<td>~145 GM 各管一个 BU,直接拍板研发/定价/客户,只经 3 个 segment president 上到 CEO;一线极宽授权。偏离工业元件同辈(TE/Sensata 远更集权)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构 / span</td>\n<td>〔事实〕&rdquo;~130–145 个 BU,各为独立 P&amp;L 中心&rdquo;&ldquo;no centralized R&amp;D function, no central sales force, no central manufacturing&rdquo;&ldquo;corporate HQ 仅 a few hundred employees out of ~170,000&rdquo;(Jimmy&rsquo;s Journal 深拆 / 公司 About 页)</td>\n<td>1987 LBO 后砍掉几乎全部中央职能,把每个 BU 设为独立损益单元;总部极小、扁到 3 层 segment→GM。&rdquo;consciously chosen agility over scale economics&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>〔事实〕GM &ldquo;full P&amp;L responsibility&rdquo;&ldquo;compensated heavily on the results they deliver&rdquo;;CEO ~90% at-risk,且 <strong>2023 年因未达标 Norwitt 未拿 bonus</strong>(Jimmy&rsquo;s Journal / 代理声明)</td>\n<td>MIP 现金奖直接挂 operating-unit 利润/增长/ROI;具名 owner、上下行都真实(零 bonus = revealed 自缚证据)。偏离&rdquo;奖规模/活动&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权(并购)</td>\n<td>&ldquo;The new companies are not integrated into Amphenol; they have total operating autonomy.&rdquo;(Norwitt);〔事实〕被并 BU 甚至可买竞品连接器自用</td>\n<td>70+ 桩并购后<strong>不整合</strong>、留原班 GM、保留自治;靠激励而非整合对齐。偏离&rdquo;并购即吸收&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3(同一&rdquo;操作系统&rdquo;在决策权/结构/激励三维各有独立机制):决策权 9 + 战略-结构 9 + 激励 6 = 24/27→<strong>89</strong>;保守去掉决策权与结构的重叠后(9+6+6=21→78)。取中 <strong>85</strong>。Δ:无重大转向;2026 Norwitt 兼任 Chairman、Loeffler 任满 5 旬退休 = <strong>常规计划内交接、CEO 连续性保留</strong>,非危机 reorg,不减 Alpha。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;小单元的速度+具名问责 &gt; 规模协同&rdquo;;若 AI 数据中心需要跨 BU 统一的大平台/巨额集中投资,极致去中心化可能拖慢协同。</li>\n<li><strong>盲区 + 下一步</strong>:员工侧 Glassdoor 3.2–3.6、&rdquo;It is not a centralized operation&rdquo; 印证去中心化属实,但 rank-and-file 反映&rdquo;普通员工无 bonus/profit sharing&rdquo;——<strong>创业激励集中在 GM/管理层,不覆盖一线</strong>(机制边界,非矛盾)。验证:① GM 留存率/晋升来源(promote-from-within 有多硬);② 收购体被允许自治的具体边界(哪些必须并、哪些可独立);找前 BU GM 对账。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:押中 AI 基础设施互连(高增长大市场),高端 niche 高毛利——市场极大、战略偏共识(机会公认),组织模式才是独特变量。</li>\n<li><strong>优先级</strong>:组织 85 × 市场 大(AI 互连)× 战略 共识 → <strong>P0</strong>:组织 Score≥67 且大市场,且这套去中心化在该规模上罕见且被长期业绩 revealed,值得优先看。</li>\n</ul>","industry":"半导体/算力硬件"},{"rank":10,"score":81,"conf":"RICH","dir":"↑","priority":"P1","company":"Trip.com Group (携程 / TCOM)","oneliner":"用斯坦福RCT定决策、全员3+2为中国首家,实验治理已落地","card":"<h1>Trip.com Group (携程 / TCOM) — Why attention?  ·  Score <strong>81</strong> · 置信度 <strong>RICH</strong> · 优先级 <strong>P1</strong></h1>\n<p><strong>一句话定性</strong>:值得看。它的&rdquo;组织操作系统&rdquo;是 <strong>把员工的生育/通勤/工作方式当成可量化、可对账的留存工程来做</strong>——用 RCT 验证、用现金落地、用第三方背书,在中国互联网&rdquo;996+裁员&rdquo;的同辈基线上是<strong>截面 Alpha</strong>(不是转向故事)。这正是经济学家创始人梁建章(劳动力/创新经济学 PhD,师从 Lazear/Becker)把&rdquo;人效&rdquo;当研究课题的组织表达。AI 期的高管换血(陈刚任 CPO 牵头 AI、两位联创退出董事会)是单独的 <strong>Δ</strong>,不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>〔满3年全球员工不论性别,每生1孩每年发1万现金到5岁、共5万;&rdquo;福利于子女周岁生日次月随工资发放…不会以礼券代发&rdquo;〕(界面/第一财经 2023.7);〔一周年:541员工/550新生儿/已发2750万〕(STCN)</td>\n<td>真金白银、可证伪、 <td>网状结构:黄峥/阿布为唯一中枢,团队禁横向直连、协作须上报中枢拍板 → 极致集权、一线无横向自治;偏离&rdquo;决策下沉一线&rdquo;的优秀范式(方向存疑:高效但脆弱)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>组织演进(Δ)</td>\n<td>〔事实〕2021/3 黄峥在拼多多用户数刚超阿里(7.88亿)、登顶时辞任董事长,交棒 CTO 陈磊,主动让 1:10 超级投票权失效,转去做食品/生命科学研究(量子位/证券时报)</td>\n<td>表现最好时主动交班 + 让出控制权 + 组织设计成&rdquo;没有黄峥也能稳定运转&rdquo;(网状自运转)→ 强组织主动演进、非危机补债;<strong>Δ 标签,叠加不减 Alpha</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 人效 S9 + 层级/杀会 S6 + 招人筛子 S6 = <strong>21/27×100 ≈ 78</strong>。Δ 行(主动交班)单列不进主分,诊断为强势演进、不扣分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;少而精的高压人效 + 中枢集权&rdquo;能在简单可标准化的电商执行上持续胜出;<strong>失效条件</strong>——业务复杂度上升、需要一线创造性自治时,禁横向沟通 + 一人拍板的网状结构会成为瓶颈(2025 已现增长失速质疑)。</li>\n<li><strong>盲区 + 下一步</strong>:维度7(康威)、维度5 激励的&rdquo;长期对齐&rdquo;留痕较少;招人/集权方向偏 ↓,需验证&rdquo;高离职/高压是否侵蚀质量&rdquo;。<strong>Follow up</strong>:① 找现/前员工(脉脉/Blind)对账&rdquo;网状中枢是否仍在跑、还是已被迫放权&rdquo;;② 验证 hypothesis&rdquo;人效 4×/7× 是否随 Temu 海外复杂度回落&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:Temu 全球极速扩张、&rdquo;半计划经济+半市场经济&rdquo;供需模型属战略/产品离群——战略上极值得看,但已单列、不混入组织分。</li>\n<li><strong>优先级</strong>:组织 78 × 市场 大(全球电商) × 战略 反共识(低价白牌+全托管)→ <strong>P0</strong>:组织分 ≥67 且大市场 + 反共识战略三项齐备,且 Alpha 由第三方/员工侧 revealed 证据支撑(非 CEO 自报),非&rdquo;待验证落地&rdquo;。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":17,"score":78,"conf":"RICH","dir":"↑","priority":"P0","company":"Applied Intuition","oneliner":"经理被全员按~50行为1-5强制打分、反大公司操作系统(无title/50人前无org chart)","card":"<h1>Applied Intuition — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头去看的<strong>截面 Alpha</strong>（非转向 Delta）。它的&rdquo;组织操作系统&rdquo;是 <strong>&ldquo;凡大公司爱做的就反着做&rdquo; + 把价值观做成可证伪的考核仪器</strong>——10 条价值观拆 ~50 条可观察行为、全员每半年 1–5 分反向打分上级、并直接挂薪酬晋升。没有戏剧性 reorg/自我归罪故事，是典型&rdquo;闷声一直优秀&rdquo;型，<strong>别因没故事而低估</strong>。运营隐喻&rdquo;取日本+德国+硅谷之长&rdquo;算组织自觉（维度8），落到擦桌/脱鞋的纪律仪式上。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少) + 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励+信息流(5/6)</td>\n<td>&ldquo;we compensate and we promote against adherence to our values&rdquo;；&rdquo;Every individual contributor rates their manager on a one-to-five scale for each behavior, and you can&rsquo;t pick three&rdquo;；&rdquo;ICs score their managers every six months by answering about 50 questions… This prevents managers punching down&rdquo;(Younis, speedrun / First Round Firsthand)</td>\n<td>10 价值观×~5 可观察行为(~50 题)→ <strong>每个 IC 每半年反向给上级打 1–5、禁选中位 3、强制区分</strong> → 经理分与团队绩效配对看；薪酬/晋升挂价值观。把&rdquo;软文化&rdquo;做成可证伪、可对账、自缚的考核器具 → 偏离&rdquo;价值观贴墙上&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/会议(3)</td>\n<td>&ldquo;Our criteria for whether to have a meeting is: does a decision need to be made?&rdquo;；&rdquo;We default to 15 minutes&rdquo;；&rdquo;People don&rsquo;t have many recurring meetings&rdquo;；CEO &ldquo;kept his calendar public to the entire company for ninety-five percent of its history&rdquo;(speedrun)</td>\n<td>不需拍板就不开会、状态走异步；默认 15 分钟；几乎无周期例会；<strong>一号位日历对全员公开</strong> = 自缚、信息流可被全员审视 → 偏离&rdquo;会议=状态同步&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(2)</td>\n<td>&ldquo;Big companies love titles? No titles.&rdquo;；&rdquo;no org chart until fifty people&rdquo;；&rdquo;when someone interviewing is really title-oriented, that tells you something&rdquo;；&rdquo;ship from day one… merge code by the end of your first or second day&rdquo;；&rdquo;About 70–80% of our management is internally promoted&rdquo;；〔无人上 LinkedIn 直到第 5 年；从不在单一日历年内翻倍超过 2x；&gt;80% 是工程师〕(First Round Firsthand)</td>\n<td>无 title/无 org chart 当筛子(滤掉头衔导向者)；入职 1–2 天必合码；管理层 70–80% 内升；增速自缚不超 2x/年 → 排他+可证伪+自缚，偏离&rdquo;靠堆人头证明进展&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织自觉(8)</td>\n<td>&ldquo;take the best of Japan, and the best of Germany… the best of Silicon Valley&rdquo;；擦桌/脱鞋——&ldquo;if you notice dust on a windowsill, you are likely to notice problems in code&rdquo;(entrepreneur.com)</td>\n<td>把一套连贯运营哲学落到日常纪律仪式(自清工位/脱鞋)，可复述的组织自我认知 → 维度8 软分(入口非主分)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 9(价值观考核)+6(会议/决策)+6(人才密度) = 21 → 21/27×100 ≈ <strong>78</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;用可量化的价值观考核 + 极少会议 + 高人才密度，能在不靠流程的情况下规模化执行&rdquo;。若高压执行(见下)持续推高流失、把反向打分变成表演式合规，机制会空转。</li>\n<li><strong>盲区 + 下一步</strong>：康威/战略-结构匹配(维度1/7)信息不足、非平庸(待补)。<strong>落地校验</strong>：价值观考核已有第一人称运营者口径(First Round Firsthand)佐证、非纯 CEO 自述 → 给到 C3；但仍建议向现/前员工核 &ldquo;can&rsquo;t pick three&rdquo; 是否真改变晋升结果、反向打分是否真问责到经理去留。follow up：Peter Ludwig(联创/COO，文化操盘手)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：$15B 估值、$600M F 轮(2025)、&gt;1000 工程师；从 AV 仿真扩到国防/物理 AI——大市场、战略偏非共识。</li>\n<li><strong>红旗(↓，不入主分但务必盯)</strong>：员工侧 Glassdoor WLB 2.4/5、&rdquo;60–70 小时周、零认可&rdquo;、某高管&rdquo;lead people by fear&rdquo;、砍掉年度假期周&rdquo;too expensive&rdquo;。<strong>与&rdquo;擦桌见微知著&rdquo;的纪律叙事对账：极可能是高压执行文化</strong>——价值观考核的&rdquo;做对人&rdquo;与一线&rdquo;被恐惧驱动&rdquo;并存，是 standing 的真实成本，不掩盖 Alpha 但压低 ↑ 确定性。</li>\n<li><strong>优先级</strong>：组织 78 × 市场 大(物理 AI/AV/国防) × 战略 偏非共识 → <strong>P0</strong>(组织 Score≥67 且大市场+反共识战略)。理由：高 Alpha、机制可复述且部分 revealed、无转向债，正是该优先看的&rdquo;闷声优秀&rdquo;型。</li>\n</ul>","industry":"机器人/自动驾驶/航天"},{"rank":18,"score":78,"conf":"RICH","dir":"↑","priority":"P1","company":"Modal (Modal Labs)","oneliner":"反专业化招通才、'3倍绝望前不招专才',招人机制costly且可证伪","card":"<h1>Modal (Modal Labs) — Why attention?   ·   Score 78 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看。这是<strong>截面 Alpha</strong>、低故事性的&rdquo;闷声优秀&rdquo;型——组织操作系统 = <strong>极小精英团队 + 反市场招人筛子 + 反专业化全栈 + 自缚式杀会</strong>，由一个会写博客、把招人当&rdquo;预测问题&rdquo;的工程师 CEO 亲自设计。<strong>revealed 硬证据是 ~153 人撑 ~$300M ARR（≈$2M/人）</strong>，证明&rdquo;少而精&rdquo;不是口号。无 reorg/转向故事——属于 skill 明确要求&rdquo;别因没故事就低估&rdquo;的那类。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;you will be <em>more successful going after candidates that the market undervalues</em>&ldquo;；列举:&rdquo;non-fancy schools&rdquo;/&rdquo;self taught&rdquo;/&rdquo;low confidence or &lsquo;interview poorly&rsquo;&ldquo;/&rdquo;don&rsquo;t have experience with your exact tech stack, but a strong generalist foundation&rdquo;/&rdquo;left the workforce…to take care of family&rdquo;(erikbern.com 2020 &ldquo;How to hire smarter than the market&rdquo;)；〔事实〕早期/联创为 IOI 金牌、竞赛程序员(latent.space 访谈)</td>\n<td>把招聘当&rdquo;预测问题&rdquo;，刻意只买市场<strong>低估</strong>的信号、放弃人人争抢的名校/同栈/FAANG 履历;同时用竞赛/系统硬功夫做高 bar。偏离&rdquo;AI 创业公司争抢 ex-lab/ex-FAANG 名牌&rdquo;的同辈共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span·所有权</td>\n<td>〔事实〕Apr-2026 ~153 人、~$300M ARR(getlatka/搜索);&
