yle=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 决策权 6 + 信息流 6 + 激励 4 = 16 → round(16/27×100)=<strong>59</strong>。Δ(拆分)单列不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;写比说快、异步比开会强&rdquo;——团队足够自律、文档负担可承受时成立;若规模/速度压力下文档化拖慢迭代(Amp 那类月级变化业务)就崩,这正是拆分要解的张力。</li>\n<li><strong>盲区+下一步</strong>:span/层级、一线拍板边界的具体机制&rdquo;需补&rdquo;;拆分后两家各自 standing Alpha 待重判。Follow up:① 找 Sourcegraph/Amp 现员工对账&rdquo;RFC 是否真减会、还是变成文档官僚&rdquo;;② 验证 2025 exec 离任是主动换血还是失血。</li>\n<li><strong>业务/战略离群(不计组织分)</strong>:AI 写码量级×1000 的大市场下,把&rdquo;稳态基建(Sourcegraph)&rdquo;与&rdquo;前沿 agent(Amp)&rdquo;按速度拆开——战略上反共识、值得看,但属产品/战略层。</li>\n<li><strong>优先级</strong>:组织 59 × 市场 大(AI 编程/dev tools)× 战略 反共识(主动拆分) → <strong>P1</strong>,排进本周:有真在跑的可对账机制(非 cheap talk),但单条偏离未达 P0 的 67 尖峰。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":47,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"Figure AI","oneliner":"17.6万简历手筛只录0.24%、按价值观招汰,选才机制具体但偏同辈高标","card":"<h1>Figure AI — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。组织操作系统 = <strong>&ldquo;创始人即招聘机器 + 以一手提前兑现股权锁住顶尖工程师&rdquo;</strong>——人才密度和激励两维上有<strong>可核验、已落地(revealed)的截面 Alpha</strong>,不是转向故事;但层级/span/开会机制基本是盲区,挖不到机制。同类基线取 top-tier 人形/具身 startup(Tesla Optimus、1X、Physical Intelligence)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/决策权</td>\n<td>&ldquo;I sent thousands of cold emails, did ~300 interviews = 13,500 minutes in that phone booth&rdquo;(Adcock X, 2023-05 Series A 复盘);&rdquo;We had a 40 person team in four or five months. They were very good&rdquo;(Adcock, Sourcery)</td>\n<td>CEO 亲自当唯一招聘漏斗:cold-email 为主渠道(他另称&rdquo;tracked cold emails vs referrals, cold emails consistently outperform&rdquo;) 人&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑↓</td>\n</tr>\n<tr>\n<td>激励/所有权</td>\n<td>〔事实〕公司章程规定&rdquo;distribute at least 1% of annual net profit as employee incentives&rdquo;;季度现金奖金(按业绩)+ 年度利润分享;2025 人均奖金约 NT$2.64M(~$87k);自 2023 起奖金每年至少 +30%(Taiwan News/Tom&rsquo;s/Bloomberg)</td>\n<td>激励=<strong>重现金、几乎无&rdquo;期权彩票&rdquo;</strong>:章程自缚(可证伪、烧退路)+ 季度即兑现 + 全员利润分享池(2025 约 NT$206B)。选出&rdquo;留得住、稳态产出&rdquo;的人,反硅谷&rdquo;低现金 + RSU 暴富&rdquo;同业范式</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/真相上行</td>\n<td>董事长 Mark Liu:&rdquo;Not being criticized is the biggest enemy of engineers&rdquo;;&rdquo;The key is to have adequate communication, rather than looking at personality, culture&rdquo;(Tom&rsquo;s Hardware,Arizona 工会语境)</td>\n<td>把&rdquo;被批评/逆向反馈&rdquo;当工程师成长的制度前提,公开为严苛批评文化辩护(得罪美式和谐共识、可被对账)。机制偏薄,介于哲学与制度之间</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(自动化杀夜班)</td>\n<td>〔事实〕2021 宣布约一年后设备工程师不再轮夜班;靠 AI&rdquo;smart workstation adjustment&rdquo;,成功率从人工 60%→91%(CommonWealth)</td>\n<td>在<strong>业绩高点主动</strong>用自动化消灭组织最大痛点(夜班),有 revealed 落地(成功率数据)→ 强组织主动演进,非危机补债</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 人才筛子(2×3=6)+ 现金利润分享(2×3=6)+ 批评文化(2×2=4)= <strong>16/27×100 ≈ 59</strong>。Δ 行(杀夜班)单独列,不进主分但坐实&rdquo;强组织主动演进、非补债&rdquo;。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;纪律 + 现金 + 服从 &gt; 自治 + 期权 + 个人英雄主义&rdquo;,在 24/7 资本密集制造里成立(良率即一切);<strong>台外复制时失效</strong>——Arizona 诉讼/工会/27% Glassdoor 好评 = 这套 OS 高度绑定台湾劳动文化,出海即露馅。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/span/层级&rdquo;需补机制&rdquo;(只查到 Wei 集 chairman+CEO 于一身、&rdquo;quiet competence&rdquo;,未挖到一线授权边界与层级数)。Follow up:① TSMC 内部&rdquo;operations review&rdquo;具体怎么开(纪律机制最 revealed 入口);② Arizona 这套移植的落地/回弹——验证&rdquo;OS 能否离开台湾&rdquo;这一核心 hypothesis。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:纯代工&rdquo;永不与客户竞争&rdquo;中立模型 = 极强战略护城河 + AI 时代地缘 linchpin(大市场),但属战略/产品层,非组织信号。</li>\n<li><strong>优先级</strong>:组织 59(33–66)× 市场 大(AI/半导体咽喉)× 战略 反共识(纯代工中立)→ <strong>P1</strong>:排进本周——组织上是&rdquo;反硅谷的纪律型 Alpha&rdquo;罕见样本,但截面分未破 67,且台外可复制性存疑,不到放下一切(P0)。</li>\n</ul>","industry":"半导体/算力硬件"},{"rank":49,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"Anysphere (Cursor)","oneliner":"40-60人撑$500M+ARR,刻意精简靠AI工具+高招聘门槛,有机制","card":"<h1>Anysphere (Cursor) — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。组织操作系统 = <strong>&ldquo;极致 leverage 的工程精英密度&rdquo;</strong>——靠一道反共识的招人筛子（AI 公司面试禁用 AI + 2 天真项目 tryout）和创始人亲自抢人，把 40–60 人撑到 $500M+ ARR；这是<strong>截面 Alpha</strong>（机制当前在跑、有第三方/员工侧印证），不是转向故事。同赛道（Replit/Cognition/Sourcegraph/Codeium）里&rdquo;小而精+扁平+autonomy+快迭代&rdquo;是 table-stakes，已按同辈基线压低 D；真正偏离同类的是招人筛子与人效。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>2 人才密度</td>\n<td>Truell: &ldquo;We actually still interview people without allowing them to use AI, other than autocomplete, for first technical screens&rdquo;；&rdquo;Programming without AI is still a really great time-boxed test for skill and intelligence&rdquo;（AOL/Business Insider）</td>\n<td>一家 AI 编程公司<strong>在面试里禁用自家品类的 AI</strong>，用裸编程做 skill 筛子 → 招&rdquo;无 AI 经验的好程序员，上岗再教&rdquo;。偏离同类&rdquo;考 AI 协作能力&rdquo;的直觉，可证伪、得罪一批投机者</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>〔事实〕候选人到 office 待 2 天，发&rdquo;a desk, a laptop, and a frozen version of the company&rsquo;s codebase&rdquo;，做真项目+同吃饭+demo；Truell: &ldquo;gives us a lot of signal on raw technical skills&rdquo;、兼作 cultural interview（AOL/BI 多源）</td>\n<td>keeper-test 式硬筛子：高门槛 tryout 主动劝退&rdquo;只是来投简历&rdquo;的人（&rdquo;not super willing to do that if you&rsquo;re just viewing it as a job&rdquo;）→ 选 passion-for-problem-space。比同类&rdquo;几轮远程面&rdquo;重得多、得罪人</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4 层级/span</td>\n<td>〔事实〕40–60 人产出 $500M+ ARR（≈$8–12M ARR/人）；CEO 维持极宽 span、R&amp;D 重、GTM/ops 极薄（digidai 深析 / Creately org）</td>\n<td>刻意压人头、用 AI 工具+高人效替代扩编；一线工程师对自己 checked-in 代码（手写或 Cursor 生成）全责（Pragmatic Engineer）。人效对同类亦属极端</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8 一号位亲历</td>\n<td>Truell: 招人会&rdquo;flying across the world to the person after they say no&rdquo;，团队甚至&rdquo;made up a dinner with researchers to lure them back&rdquo;，&rdquo;do anything possible to get the most talented people&rdquo;（BI）</td>\n<td>创始人亲自做顶级人才漏斗、被拒后继续追 → 招聘不外包、一号位亲管 talent。costly（烧时间/烧脸）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流（对账红旗）</td>\n<td>员工侧 Glassdoor：一条评&rdquo;culture is not very truth seeking or humble, hype often valued over substance&rdquo;；另一条赞&rdquo;flat&hellip; trust and autonomy&rdquo;；WLB 3.5、&rdquo;thrashy&rdquo;（Glassdoor / JobsByCulture）</td>\n<td>员工口径分裂：autonomy 真、但&rdquo;重 hype 轻 substance&rdquo;是真相上行的隐忧。与对外精英叙事<strong>部分对不上账</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C：人才密度禁AI筛(2×3=6) + 2天tryout(2×3=6) + 人效/span(2×2=4) = 16；16/27×100 ≈ <strong>59</strong>。同维度（人才密度2条）已占 Top-3 的两条，符合&rdquo;单维最多2条&rdquo;。<strong>在赌什么/何时失效</strong>：赌&rdquo;极少数顶尖工程师×AI 杠杆 &gt; 规模化团队&rdquo;，且赌品类竞争是人才战而非铺人头。失效场景：产品复杂度/合规/GTM 需要规模化协作时，40–60 人结构会绷断；&rdquo;hype&gt;substance&rdquo;若蔓延会侵蚀真相上行。</li>\n<li><strong>盲区 + 下一步</strong>：决策权（dim3）、激励/股权结构（dim5）、康威/团队边界（dim7）、组织演进（dim9）<strong>信息不足、需补机制</strong>（非平庸）。下一步：找在职/离职工程师对账&rdquo;2 天 tryout 的真实淘汰率与留存&rdquo;&ldquo;禁 AI 筛子是否真在跑（还是已悄悄改）&rdquo;&ldquo;hype vs substance 是个例还是系统&rdquo;；验证 hypothesis：高人效是真 Alpha 还是融资周期的暂时数字。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：$500M→$2B ARR 量级火箭增长、$9.9B→更高估值、&rdquo;own the surface&rdquo;全栈下注——战略/市场极强，但属业务离群，不进组织分。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大（AI 编程/agent 是超大牌桌）× 战略 反共识（禁 AI 筛子+超薄组织）→ <strong>P1</strong>（组织分 33–66 + 大市场/反共识战略，排进本周）。距 P0 差一截：高 C 的 standing Alpha 集中在&rdquo;人才入口&rdquo;单一面，决策权/激励/演进机制尚未挖到、且有&rdquo;hype&gt;substance&rdquo;的对账红旗未澄清。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":50,"score":59,"conf":"RICH","dir":"↑","priority":"P2","company":"Etsy","oneliner":"持久squad运营模型:8-10人/单一指标/限时/公开问责,标准维度但纪律明确;CEO换帅(Δ)","card":"<h1>Etsy — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得有空看,不必放下手头事。Etsy 的&rdquo;组织操作系统&rdquo;是 Josh Silverman 2017 上任后装的一套<strong>聚焦+实验+小队问责机器</strong>——&ldquo;每个 squad 只给一个客户问题 + 一个要解锁的财务指标&rdquo;,叠在它本就世界级的实验平台上(每天数百个 A/B、50+ 次/天部署)。这是<strong>截面 Alpha(在运行、跑了 8 年、可复述)</strong>,但有两个减分:turnaround 红利已过、GMS 自 2021 走平,且 2023 起的裁员后<strong>员工侧报出&rdquo;留低绩效、政治化&rdquo;</strong>——与它对外的绩效纪律叙事对账出裂缝;Silverman 2026/1 卸任、Kruti Patel Goyal 接棒(↗领导层换防 Δ)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>&ldquo;every squad at Etsy is given one customer problem they need to fix with one financial metric it needs to unlock&rdquo;(20VC/Antoine Buteau 摘录)</td>\n<td>每个小队=一个客户问题×一个具名财务指标 → 联合负责被拆成单点 owner,授权配问责;偏离 marketplace/tech 同辈&rdquo;两人共管/指标含糊&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/信息流</td>\n<td>&ldquo;each team designs and runs its own experiments…reducing organizational bottlenecks, it lets many teams make decisions in parallel&rdquo;(Etsy Code as Craft 工程博客)</td>\n<td>自助实验平台+持续部署(50+ deploys/day),团队不上浮即可上线试验、用数据拍板;第三方工程文档可核验=revealed,非口号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;what are the fewest things we need to do well to succeed?&rdquo;;〔事实〕上任后停掉约 60% 项目、把 15+ 指标砍到以 GMV 为唯一北极星(Marketplace Pulse / Antoine Buteau)</td>\n<td>用&rdquo;最少必做项&rdquo;重画优先级、单一指标对齐全公司;裁 ~80–140 人砍冗余=costly 动作;但叙事偏旧、部分 stated</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(反向对账)</td>\n<td>&ldquo;Retain low performers and no vision…office politics, chaos&rdquo;、&rdquo;culture deteriorating since the RIF at end of 2023&rdquo;(Glassdoor 员工评价)</td>\n<td>员工侧指实际<strong>没</strong>执行绩效汰换、晋升&rdquo;a dream rather than reality&rdquo;——与 CEO 的绩效文化叙事矛盾=表演式/已回弹风险;〔revealed 反信号〕</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2023 裁 225(11%)、2024 Reverb 再裁 18%、CMO/CHRO 出局;2026/1 Silverman→执行主席、KPG 任 CEO</td>\n<td>危机/GMS 走平后的被动收缩+一号位换防,非表现好时的主动升级 → 偏&rdquo;补债&rdquo;一侧</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 激励 6 + 实验 6 + 聚焦 4 = 16 → 16/27×100 ≈ <strong>59</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;小队单点问责+海量实验&rdquo;能在无中心拍板下涌现增长。当市场走平(GMV 见顶),实验只能榨边际、产生不了新增长曲线时这套机器失速——正是 2022 后发生的事;且换帅+裁员后纪律可能回弹成普通大厂。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span、CEO 亲历程度无一手机制(需补)。Follow up:① 验证新 CEO Kruti Patel Goyal 是否保留 squad-单指标模型还是另起炉灶(是 Alpha 延续还是债);② 用近 1–2 年 Glassdoor/Blind 对账&rdquo;绩效汰换&rdquo;到底执行没有——这决定人才密度是真 Alpha 还是叙事。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:押注&rdquo;handmade/special 的反 Amazon 定位&rdquo;+ GMS 自 2021 走平的增长困境——战略中等、非高离群。</li>\n<li><strong>优先级</strong>:组织 59 × 市场 中(在线市场成熟、增长见顶)× 战略 共识 → <strong>P2</strong>:有一套真实、可复述、第三方可核验的 standing Alpha(实验+小队问责),但红利已过、出现回弹反信号、且正值换帅——持续观察、有空再看,不进 P0/P1。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":51,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"MercadoLibre (MELI)","oneliner":"无OKR下压+5%PM占比+按\"会反对\"晋升+30k次/日部署,多机制revealed的强Alpha","card":"<h1>MercadoLibre (MELI) — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。它的&rdquo;组织操作系统&rdquo;是<strong>用极低的协调层（PM 极稀缺 + 不下沉 OKR + 平台自动化）换取一线工程团队的高自治与高出货速度</strong>——这是<strong>截面 Alpha</strong>（25 年、10 万+人规模上仍在运行的稳态结构），不是转向故事；但员工侧出现 KPI 度量监控/官僚化的反向信号，autonomy 主张未被第三方坐实，故 C 封顶 2。同类基线＝10 万+人、跨 18 国的成熟消费电商平台。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>康威/人才密度</td>\n<td>〔事实〕&rdquo;18,000 engineers but only 1,000 PMs—about 5% compared with the typical 20% to 30% ratio&rdquo;；&rdquo;We don&rsquo;t let titles determine who owns the product.&rdquo;（SVP Sebastian Barrios，Lenny&rsquo;s Newsletter 2025）</td>\n<td>PM 占比压到同辈 1/4–1/6，产品判断推给工程师而非专职 PM 层 → 砍掉协调岗、按&rdquo;谁懂用户谁拥有&rdquo;分配 ownership；可证伪、反同类共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/结构</td>\n<td>〔事实〕&rdquo;No OKRs cascading down. Just high-level company objectives (3 to 5 bullet points) refreshed quarterly&rdquo;，团队&rdquo;near-total autonomy&rdquo;但&rdquo;extreme accountability&rdquo;；&rdquo;30,000 code deployments a day&rdquo;（同上，Barrios）</td>\n<td>不逐层下压 OKR、只给 3–5 条季度目标，余下放给团队自决；内部平台自动处理 scaling/安全/合规支撑 3 万次/日部署（硬事实、revealed）。偏离大组织&rdquo;OKR 层层对齐&rdquo;默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/激励</td>\n<td>&ldquo;leadership gives brutally honest product feedback in public reviews… &lsquo;This is about the product, not about you.&rsquo;&ldquo;；&rdquo;promote people based on their ability to disagree productively&rdquo;（Lenny&rsquo;s 转述 Barrios）</td>\n<td>公开评审里对产品狠批但与人解耦 + 把&rdquo;会有效地反对&rdquo;作为晋升标准 → 制度化逆权力说真话；机制可复述但多为转述</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>〔事实〕Barrios 每周给 CEO 发&rdquo;what I did, what&rsquo;s next, where I needs help&rdquo;并向下级公开（Lenny&rsquo;s）</td>\n<td>一号位—一线之间用固定周报三段式同步、向团队透明级联；具体但同辈不算罕见</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权（反向）</td>\n<td>〔员工侧〕&rdquo;measures KPIs like Slack messages, commits, and Google suite usage…good developers being fired over these metrics&rdquo;；&rdquo;too much Bureaucracy for Decision Making&rdquo;（Glassdoor 匿名，整体 4.1/5、83% recommend）</td>\n<td>与&rdquo;高自治&rdquo;主张矛盾：用活动量度量替代结果、决策有官僚摩擦 → 压住 autonomy 类信号 C 不给 3</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6+6+4 = 16 → 16/27×100 ≈ <strong>59</strong>。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;少协调岗 + 平台兜底 + 一线 ownership&rdquo;能在 10 万人规模维持创业期速度；若平台抽象漏水、或用活动量 KPI 取代结果判断（员工侧已现苗头），自治会退化成&rdquo;无 PM 的散乱 + 监控式管理&rdquo;。</li>\n<li><strong>盲区 + 下一步</strong>：span/层级（一线到 CEO 几层、经理带几人）、激励的具体回报结构（股权/奖金分配）&rdquo;需补机制&rdquo;。Follow up：①核 autonomy 是否真落地——找近 1–2 年工程侧离职访谈/Blind，验证&rdquo;KPI 监控 vs 自治&rdquo;哪个是主流体验；②听 Lenny&rsquo;s 原播客取 Barrios 关于招聘&rdquo;product thinking&rdquo;筛子的逐字机制。验证 hypothesis：<strong>&ldquo;低 PM 比 + 高自治&rdquo;是真 revealed 优势，还是被度量监控对冲掉的纸面结构。</strong></li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：自建支付（Mercado Pago）、自有物流与机队（own fleet of planes）、跨 18 国——战略上重资产纵向一体化，离群但属业务层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大（拉美电商/金融科技龙头）× 战略 中（纵向一体化，部分反共识）→ <strong>P1</strong>：组织 33–66 + 大市场，排进本周看；未达 P0 因 autonomy 落地有员工侧反证、C 未到 3。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":52,"score":52,"conf":"RICH","dir":"↑","priority":"P1","company":"ElevenLabs","oneliner":"20个5-10人微团队各担一产品+无头衔+创始人面到400人","card":"<h1>ElevenLabs — Why attention?   ·   Score 52 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。组织操作系统 = 「极宽 span + 无中层 + 取消职称 + 创始人亲面每一人 + 微团队 6 个月生死线」——靠创始人亲历 + 信任授权撑起一个 250→400 人却几乎没有管理层的结构。这是<strong>当前在跑的截面 Alpha</strong>（不是转向 Δ）；但&rdquo;运转良好&rdquo;主要是创始人自述，员工侧出现明显反证，落地待验证。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 /  right at the top is we build beautiful things… if you want work life balance, don&rsquo;t come here.&rdquo;(Motley Fool 访谈, 2025-12)</td>\n<td>用&rdquo;工艺自豪感 + 高强度&rdquo;做自筛子,&rdquo;想走捷径的人活不下来&rdquo;;owner 当面排他、可证伪。<strong>员工侧对账落地</strong>:Glassdoor/Indeed 多条&rdquo;12 小时工时只付 8 小时&rdquo;&ldquo;薪资远低于市场&rdquo;&ldquo;高流失/burnout&rdquo;(Glassdoor 262 评, WLB 3.1/5)。偏离&rdquo;对外只喊狼性&rdquo;的口号——这是真有代价、且被第三方 revealed 的硬文化</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>一号位亲历(dim8)</td>\n<td>&ldquo;Both CEOs of those companies are the chief engineers… I&rsquo;m down at the engine, I&rsquo;m at the test site and we&rsquo;re doing real work. And the close couple of the engineering decisions with the business decisions I think is super super critical.&rdquo;(Payload 访谈)</td>\n<td>一号位亲自做工程、把工程决策与商业决策强耦合(无大学学历、精密机械学徒出身,CNBC/Gulf News 可核验);&rdquo;放手&rdquo;不靠层级靠自己下沉。但 NewSpace 同辈(SpaceX)同形 → 对同类只算轻-中度反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/康威(dim1)</td>\n<td>&ldquo;we don&rsquo;t [do everything] because of a magic vision… written on a wall somewhere… because it makes the most amount of sense&rdquo;; &ldquo;we&rsquo;re not acquiring things for their balance sheet… great teams that align with culture&rdquo;(Bloomberg/Payload)</td>\n<td>垂直整合是<strong>务实的组织决策</strong>而非教条:供应商跟不上就自造(3D 打印阀门、自建工业炉);并购挑&rdquo;对齐文化的团队+技术&rdquo;,非财务。把团队边界沿&rdquo;端到端任务&rdquo;重画 → 反推&rdquo;无妥协的单一指挥链&rdquo;。但多半是战略的组织影子,机制偏浅</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:文化 2×3=6 + 首席工程师 2×2=4 + 垂直整合 2×2=4 = <strong>14< all of the back and forths&rdquo;（J. Sarihan, Sequoia podcast）</td>\n<td>取消计时收费、改<strong>按件定价</strong>；全公司北极星指标=TTAT（总周转时间）+ HuRT（人工复核时间）→ 律师被激励去<strong>自动化自己的活、把单子做快</strong>，不是攒工时。逆转整个律所行业的根本激励</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构(1)</td>\n<td>&ldquo;building our own law firm in order to own the entire process, end to end&rdquo;（R. Daniels, TechCrunch 2025-06-17）；〔事实〕分两实体：Crosby Legal PLLC（持牌律所）+ Crosby Legal Inc.（建 AI）（ZoomInfo/Sacra）</td>\n<td>不做&rdquo;卖给律师的工具&rdquo;而<strong>亲自当律所</strong>：paralegal-agent 路由来单 → 强制 lawyer-in-the-loop 逐件签字。偏离同类（多数 legal-AI 是 SaaS 卖给律所）。但双实体部分是 UPL/非律师持股法规所迫，非纯自选</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/人才(7/2)</td>\n<td>&ldquo;we literally in our office have desks staggered: lawyer, engineer, lawyer, engineer, in order to… incent them to really collaborate&rdquo;（R. Daniels）；&rdquo;domain experts sit side by side with your engineers creates… a feedback loop… more than just evals&rdquo;（J. Sarihan, Sequoia podcast）</td>\n<td>用<strong>座位强制跨学科相邻</strong>+ 强制 NYC in-person，让律师=工程师的&rdquo;产品 user research&rdquo;。偏离同类 AI 创业（多 remote/职能分仓）。座位是可核验的结构事实、in-person 是真代价</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励(5)</td>\n<td>&ldquo;When you can make an AI do this thing that you&rsquo;ve been doing and not enjoying doing, it is the most magical experience ever&rdquo;；&rdquo;we really praise… ways that we can step out of [repetitive work] and think bigger&rdquo;（R. Daniels）</td>\n<td>反常：员工被<strong>表扬去消灭自己的重复活</strong>（律师奖&rdquo;把自己自动化掉&rdquo;），对齐&rdquo;奖结果不奖工时&rdquo;。仅金句层，机制薄→不进 Top-3</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6（激励·按件）+ 4（战略-结构）+ 4（康威座位）= 14 → 14/27×100 = <strong>52</strong>。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;律所收费=计时&rdquo;这一行业激励是可被组织设计反转的，且律师+工程师同屋的反馈环能持续产出独占领域数据。若规模放大后 lawyer-in-the-loop 成为瓶颈、座位法在 50+ 人时失效、或按件定价无法覆盖复杂谈判长尾，机制会崩。</li>\n<li><strong>盲区 + 下一步</strong>：<strong>全部为创始人自述/投资人（Sequoia·Bain·Index·Lux）放大，无员工侧/Glassdoor/留存对账</strong>——按落地闸，&rdquo;机制有效/律师真买账&rdquo;仍是 stated，C 封顶 2、标&rdquo;待验证落地&rdquo;。找谁：① 现/前 Crosby 律师，验证&rdquo;按件+TTAT 激励&rdquo;是否真改了日常行为、有无回到加班赶工；② 验证 ~30 人后座位法/in-person 强制是否还在跑。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：&rdquo;services-as-software&rdquo;（自己当律所而非卖 SaaS）是相当反共识的 GTM 赌注，且法律服务市场极大——这是<strong>战略层值得看</strong>的点，但不进组织分。</li>\n<li><strong>优先级</strong>：组织 52 × 市场 大（法律服务） × 战略 反共识（当律所而非卖工具）→ <strong>P1</strong>（Score 33–66 + 大市场/反共识战略）。组织有真 Alpha（尤其按件+TTAT 反转律所激励），但落地未经第三方验证、公司太年轻，够不上 P0。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":59,"score":48,"conf":"THIN","dir":"↑","priority":"P1","company":"Captions (now Mirage)","oneliner":"每工程师周更可上市功能+设计师即PM/PM懂营销;部分系AI创业table-stakes","card":"<h1>Captions / Mirage — Why attention?   ·   Score 48 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看一眼。它的&rdquo;组织操作系统&rdquo;= <strong>极窄的人才入口（自报 0.05% offer 率）+ 把&rdquo;出货权&rdquo;压到单个工程师身上的硬节奏（&rdquo;每人每周出一个可营销产品&rdquo;）</strong>——这是<strong>截面 Alpha</strong>（当前在跑的两条机制），不是转向故事；Captions→Mirage 改名+进军前沿研究是<strong>战略/产品</strong>层动作，不是组织债。同类系 NYC ~100 人、$175M+ 的生成式 AI 应用公司（Suno/ElevenLabs/HeyGen 一档），该群的 table-stakes（&rdquo;小而快、扁平、ship fast&rdquo;）不计偏离；只对<strong>超出同类</strong>的具体机制打分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励 / 决策权</td>\n<td>&ldquo;every engineer should ship a marketable product every week&rdquo;；marketable = &ldquo;something users would come to your app specifically for or even pay for&rdquo;；&rdquo;Cut, cut, cut until&hellip; it&rsquo;s going to be useless if we cut anymore&rdquo;（Gaurav Misra, Lenny&rsquo;s Podcast 2025-03-27）</td>\n<td>出货权下沉到<strong>每个工程师</strong>：节奏单位=人×周，标的=可营销产品（不是 commit/PR）；逼迫一线自己砍 scope、自己拍板留什么。比同类泛泛&rdquo;ship fast&rdquo;更硬、可证伪（每周能不能数出产物）。但只有 CEO 自述节奏、无员工侧对账它是否真兑现</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔事实/自述〕2025 年只有 <strong>0.05%</strong> 进入工程招聘漏斗的候选人拿到 offer，CEO 自比 Harvard 2.58% / YC 1% / Ramp eng 0.23%，称结果是&rdquo;world-class team&hellip; insanely talented&rdquo;（Gaurav Misra 本人 LinkedIn 帖）</td>\n<td>招人<strong>筛子=极窄漏斗</strong>（每 2000 个候选人 ~1 个 offer），数量已被公开承诺=可证伪。但 offer 率是<strong>自家口径、自家抛、自利框架</strong>（理发师铁律）、无第三方/员工审计 → C 封顶</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;A lot of unique insight and innovation can come from one person doing two different functions&rdquo;（沿用 Snap 的 designer-PM 混合岗）（Gaurav Misra, Colossus/Index 访谈）</td>\n<td>看人筛子偏<strong>通才</strong>（懂 eng+data+marketing+sales），少招纯专才 → 支撑&rdquo;一人能把一件事从想法带到出货&rdquo;。软、未量化</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>&ldquo;It&rsquo;s not just a product team thing. It&rsquo;s like engineering, recruiting&hellip; everybody comes up with ideas&rdquo;（季度头脑风暴产出&rdquo;secret roadmap&rdquo;）（Gaurav Misra）</td>\n<td>路线图输入面=全员（含招聘/工程），季度一次。但&rdquo;包容式 ideation&rdquo;在 &lt;150 人创业公司较常见，近 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 6 + 6 + 1 = 13；13/27×100 ≈ <strong>48</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;少数顶尖通才 + 每周强制出货&rdquo;能跑赢大团队的协调成本；若产品复杂度升高（前沿视频模型研究，非每周可出货的应用迭代），&rdquo;每人每周一个可营销产品&rdquo;这条会与研究型工作冲突而失效，&rdquo;embrace technical debt&rdquo;也可能反噬。</li>\n<li><strong>盲区 + 下一步</strong>：层级/span、决策上浮边界、激励的&rdquo;回报来源/公平机制&rdquo;、信息坏消息上行——<strong>几乎全无独立证据（需补机制/信息不足，≠平庸）</strong>。组织信号几乎<strong>全是 CEO 一面之词</strong>，零员工侧对账。<strong>Follow up</strong>：① 找 Mirage 前/现工程师验证&rdquo;每周一个可营销产品&rdquo;是否真在执行、未达标会怎样（验最关键 hypothesis）；② 核 0.05% 漏斗的分子分母口径（是否含自动过滤的海投）；③ 看改名 Mirage 后研究团队是否另立一套不同于&rdquo;每周出货&rdquo;的节奏（是否出现双轨组织）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：Captions→Mirage 改名 + 从创作者工具扩到&rdquo;frontier AI 视频研究/模型&rdquo;、Mirage Studio 切广告（$500M 估值、$175M+ 融资）——<strong>战略层值得看</strong>，但属产品/市场赌注，不是组织偏离。</li>\n<li><strong>优先级</strong>：组织 48 × 市场 大（AI 视频） × 战略 共识偏积极 → <strong>P1</strong>：分数中段但卡在大市场上，排进本周；不进 P0（核心两条机制均为 stated、无 revealed 落地证据，按落地闸 C≤2、待验证落地）。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":60,"score":48,"conf":"THIN","dir":"↑","priority":"P1","company":"Midjourney","oneliner":"~150人撑$500M、无销售/市场/增长部、利润分成、无董事会","card":"<h1>Midjourney — Why attention?   ·   Score 48 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看一眼,但偏离主要在&rdquo;极端 span + 把社区做成组织的一部分&rdquo;两点上 —— 这是<strong>截面 Alpha</strong>(稳态跑了 3+ 年、可复述),不是转向故事。组织&rdquo;操作系统&rdquo;= <strong>一支不招销售/市场的极小自筹研究室,把模型训练与产品反馈外包给一个一号位亲自每周对话的百万级社区</strong>。但内部&rdquo;人怎么被组织&rdquo;(决策权、层级、汰换、激励)几乎查无机制,员工侧只有 1 条 Glassdoor 评价 —— 故置信度 THIN,真偏离待一手坐实。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>4 层级/span</td>\n<td>〔事实〕创始团队 11 人=1 创始人+8 开发+1 法务+1 财务,<strong>无市场/无销售</strong>;~40 人时 ~$200M、$500M ARR 时仍极小团队,人效 ~$3–12.5M/人(Product Growth、andrew.ooo、Contrary)</td>\n<td>用 ~40 人撑 $500M、零市场零销售岗 → 用&rdquo;少而精&rdquo;替代职能堆叠;偏离同类 AI 公司&rdquo;边长边扩职能&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流/8 一号位</td>\n<td>〔事实〕Holz <strong>每周三亲自</strong>在 Discord 开 public Office Hours 做更新+Q&amp;A,已持续多年(aiandseewhy、Luma、多源)</td>\n<td>一号位不设代理、直接对百万社区暴露路线图与权衡 → 真相/反馈无损直达一号位;偏离&rdquo;CEO 只对直接下属、对外靠 PR&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>7 康威/组织边界</td>\n<td>&ldquo;Select the one that you think is more beautiful… round 3 is about learning what&rsquo;s &lsquo;good&rsquo;&ldquo;(Midjourney V8 Rating Party 官方说明)</td>\n<td>&ldquo;Rating Party&rdquo;:社区成对投票排序 → 直接喂模型训练,把&rdquo;标注/评测&rdquo;这一职能<strong>外包给用户</strong>而非内部团队 → 组织边界延伸到社区;偏离&rdquo;自建标注/RLHF 团队&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>〔事实〕硬件负责人 Ahmad Abbas 是 Holz 在 Leap Motion 旧同事(VentureBeat、Contrary)</td>\n<td>&ldquo;招共事过的人&rdquo;——只有一例、无可复述筛子 → <strong>需补机制</strong>,不进主分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>激励/治理</td>\n<td>&ldquo;We&rsquo;re self-funded. We have no investors. We&rsquo;re not really financially motivated.&rdquo;(Holz, The Register 2022)</td>\n<td>零 VC/无董事会 = <strong>资本/治理</strong>决策,按边界案例降权;只在&rdquo;无增长压力如何改变人怎么干活&rdquo;落地时才算组织,目前无机制</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:span S=2×3=6 + 一号位/信息流 S=2×3=6 + 社区训练 S=2×2=4 → Σ=16 /27×100 ≈ <strong>59</strong>;但 span 与&rdquo;自筹/无销售&rdquo;高度同源、且 AI 极小团队渐成 table-stakes(Mistral/ElevenLabs 同款),按护栏三对同类去重、压一档 → 取 <strong>48</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;产品力+社区飞轮可替代销售/标注职能,小团队不必长大&rdquo;;若进入需企业销售/合规/多模态规模化(已招硬件)、社区红利见顶,极小团队会成为执行瓶颈。</li>\n<li><strong>盲区 + 下一步</strong>:内部<strong>决策权、层级、汰换、激励、晋升</strong>五维<strong>全部查无机制</strong>(信息盲区≠平庸)。员工侧仅 1 条 Glassdoor → 无法对账 CEO 自述。Follow up:找在职/前员工验证&rdquo;~40 人内部真无中层吗、谁拍板模型方向&rdquo;;验证 hypothesis&rdquo;社区 Rating Party 是真训练机制还是 PR&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零 VC、零市场预算、Discord 原生分发、人效 $3M+/人 —— 战略上极离群、值得看,但这是资本/分发决策,不是组织偏离。</li>\n<li><strong>优先级</strong>:组织 48 × 市场 {大,生成式媒体} × 战略 {反共识,零融资/零营销} → <strong>P1</strong>:组织分中等但市场大+战略强反共识,排进本周看;组织维度需一手接触才能从 THIN 升级。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":61,"score":48,"conf":"THIN","dir":"?","priority":"P2","company":"StoneCo","oneliner":"Stone Hubs加盟本地化+分段P&L负责制,真机制但有CEO动荡债","card":"<h1>StoneCo (STNE) — Why attention?   ·   Score 48 · 置信度 THIN · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得看的是<strong>截面 Alpha——把分销做成组织（Conway 维度）</strong>:~600 个自营+加盟 Stone Hub + &ldquo;Green Angels&rdquo; 地推工程师/客服,在巴西 SMB 支付里反&rdquo;轻资产 fintech&rdquo;共识地自建重型本地化服务网（这是当前在跑、能复述、持续多年的结构,真 Alpha）。但叠了一层<strong>明显的组织 Δ/债</strong>:2021 信贷业务暴雷+集体诉讼、Linx 收购后又拆售、三年三任 CEO（Piau→Zinner→Scherer）、最新&rdquo;把决策权收回长任期老人手里&rdquo;——诊断更像<strong>弱组织危机后补债</strong>,非主动演进。债不抹掉 hub Alpha,但压住了分数与置信度（缺一手组织机制原话）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text n<td>&ldquo;3 yrs with no hike, no salary review even though company doc says twice a year&rdquo;(Blind, tudjogb 2021);&rdquo;no raises, no bonus, no 401k match, no espp&rdquo;(Glassdoor)</td>\n<td>revealed:文档承诺的&rdquo;季度调薪&rdquo;实际未跑;扁平→&rdquo;almost no promotions, almost no pay raises ever&rdquo; → 机制 stated 但落地反向,坐实&rdquo;说到没做到&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>决策权/信息流</td>\n<td>&ldquo;Leaders provide the context… talented people, given the right context, usually make the &lsquo;right&rsquo; decision&rdquo;;&rdquo;If consensus cannot be achieved, decisions are still made quickly&rdquo;;&rdquo;bad news isn&rsquo;t hidden&rdquo;(Culture doc)</td>\n<td>context-not-control 授权 + 不等共识快拍板 + 坏消息上行;email-heavy。机制具体可复述,轻度反&rdquo;事事上浮&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/会议</td>\n<td>&ldquo;Be present in meetings and only attend if you need to — if you use your laptop during the meeting… that&rsquo;s a sign you don&rsquo;t need to be in the meeting&rdquo;(Culture doc)</td>\n<td>自缚式会议过滤(用电脑=你不该在这);扁平、少经理层 → 偏离同辈&rdquo;按级别拉满会议室&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(Δ)</td>\n<td>〔2023 两轮裁员 ~200 人 + ~10%,severance 计提 $83.2M;员工称&rdquo;rudderless&rdquo;&ldquo;dictator-esque CEO who keeps changing his mind&rdquo;〕(SEC 8-K;Glassdoor)</td>\n<td>股价崩后被迫减员、非表现好时主动升级 → 偏弱组织补债,非强组织演进。债≠判死,但不加 Alpha 分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 激励4 + 决策4 + 会议(D2×C1=2,取激励对账 D2×C2=4)→ 4+4+4=12 → 12/27×100 ≈ <strong>44</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;招够好的人+给够 context+按市场付钱&rdquo;就能少管;在小而精的硬件期成立,人员激增(2019→2021 翻几倍)后&rdquo;无晋升无加薪+无 1-on-1&rdquo;导致 7 名前员工称&rdquo;对文化感到困惑&rdquo;、attrition 上升——规模化时这套&rdquo;低治理高自主&rdquo;易塌。</li>\n<li><strong>盲区 + 下一步</strong>:康威/战略-结构/一号位亲历三维&rdquo;需补机制&rdquo;(文档外无独立证据)。Follow up:① 找现/前 Roku 工程/广告侧员工,验证&rdquo;季度市场调薪&rdquo;现在到底跑不跑(stated vs revealed 的命门);② 看 2023 裁员后是否反复反转(债的轻重)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:CTV/流媒广告大市场、操作系统+硬件+广告三轮,战略偏共识(平台广告化)、非反共识。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大(CTV/广告) × 战略 共识 → <strong>P1</strong>(中分但卡在大市场;组织框架清晰值得排进本周看一眼,但&rdquo;说到没做到&rdquo;+被迫裁员压住了上限,不进 P0)。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":64,"score":44,"conf":"RICH","dir":"↑","priority":"P1","company":"Atlassian","oneliner":"无传统销售/S&M仅19%+Team Anywhere专队循证,两条在跑机制","card":"<h1>Atlassian — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得一看,但要带着怀疑看。它有<strong>两条真·standing Alpha</strong>(全员分布式 Team Anywhere、&rdquo;Open company, no bullshit&rdquo; 的默认开放信息流),都不是口号、是跑了多年的结构性机制——<strong>但成效全是公司自引数据(stated),且 2026 年的反向 revealed 证据(强制曲线 + 10% 大裁员)正在啃食它</strong>。这是一家&rdquo;有真组织设计资产、但当前处于被迫纠偏(Delta↓)&rdquo;的成熟 SaaS,不是闷声优异、也不是确认平庸。同类=大型上市 SaaS。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>1/9 战略-结构</td>\n<td>〔事实〕&rdquo;since 2020, Atlassians have been able to choose where they work, every single day&rdquo;;设有 behavioral-science &ldquo;Team Anywhere Lab&rdquo;;&rdquo;workforce has tripled… applications more than doubled&rdquo;(atlassian.com/blog distributed-work 系列)</td>\n<td><strong>Team Anywhere</strong>:把&rdquo;全员每天自选地点&rdquo;做成一套<strong>designed 结构</strong>(专设行为科学实验室持续调参),不是疫情临时态。同类大 SaaS 多在 2022–24 转 RTO/hybrid mandate,它<strong>逆势没回弹</strong> → 反同类 D=3。但&rdquo;92% 做最好工作&rdquo;&ldquo;无生产力下降&rdquo;全是<strong>自引内部数据(stated)</strong> → 落地闸封顶</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流</td>\n<td>&ldquo;Information is open internally by default and sharing is a first principle&rdquo;;&rdquo;Open company, no bullshit&rdquo;(公司 value;wiki/Confluence 默认开放,IPO 信息早早全员可见)(atlassian.com/company;opensource.com)</td>\n<td>创始期起<strong>信息上 wiki 默认全员可读</strong>取代点对点邮件 → 真机制。但 tech 圈已广泛模仿(table-stakes 化)→ D=2;且 2026 裁员的沟通方式<strong>当面打脸</strong>该 value → C 不给高</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>8 一号位组织自觉</td>\n<td>MCB:&rdquo;they should be afraid of someone who&rsquo;s really good at AI taking their job&rdquo;(Stratechery 2025 访谈)</td>\n<td>一号位能讲一套连贯的 AI×组织框架(招更 AI-native 的年轻人、人+AI 混合) → 维度8 软分;<strong>挖不到背后&rdquo;谁/怎么/多少&rdquo;机制</strong> → 仅软信号、不当满 Alpha</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>2/9 绩效·裁员(反向)</td>\n<td>〔Glassdoor/Blind〕强制曲线 stack ranking(约 2023 起、半年一次、P50 起卷入 PIP);MCB 2026.3.11 memo:&rdquo;self-fund further investment in AI&rdquo;;&rdquo;It would be disingenuous to pretend AI doesn&rsquo;t change… the number of roles required&rdquo;(letsdatascience/thenextweb)</td>\n<td><strong>revealed</strong>:裁 1,600 人≈10%、&gt;900 来自 R&D;通知后给 <strong>6 小时 Slack 告别</strong>、blog 上线 20 分钟后才单独通知;同期换/拆 CTO。强制曲线+反复 reorg+危机式一次性大裁 → <strong>弱组织补债</strong>特征</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(仅累计 A 行 Top-3)</strong>:Team Anywhere S=3×2=6 · Open-company S=2×2=4 · 一号位自觉 S=1×2=2 → Σ=12 → round(12/27×100)=<strong>44</strong>。<strong>Δ 裁员行(S=6,↓)不进主分</strong>,但作为 standing 的负向因素登记。<strong>在赌什么/何时失效</strong>:赌&rdquo;全员分布式 + 默认透明&rdquo;能在不靠 RTO 的前提下维持高产出与人才吸引;在裁员/强制曲线把&rdquo;no bullshit/信任&rdquo;消耗殆尽、且分布式产出只有自证数据时失效。</li>\n<li><strong>盲区 + 下一步</strong>:① <strong>落地待验证</strong>——Team Anywhere 的产出/留存优势缺<strong>独立第三方</strong>数据,全是自引;找离职工程师/Blind 对账&rdquo;分布式是否真没拖产出&rdquo;。② reorg 诊断:这次是<strong>表现承压下被迫的 AI 纠偏</strong>(股价压力+self-fund 措辞+换 CTO),非&rdquo;增长期主动升级&rdquo;→ 偏债;追问 follow up:<strong>Rajeev Rajan 走、CTO 拆成 Teamwork/Enterprise 两职</strong>是主动演进还是补债。③ 验证 hypothesis:&rdquo;open company no bullshit&rdquo; 在裁员沟通(20 分钟差/6 小时 Slack)中是否系统性失守 = 表演式 costly 还是真值。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:全 all-in AI 自筹(&ldquo;self-fund AI + enterprise sales&rdquo;)、企业级上移——战略层值得看,但属资本/战略决策,不进组织分。</li>\n<li><strong>优先级</strong>:组织 Score 44 × 市场 大(企业协作 SaaS) × 战略 中(AI 转向是同辈共识)→ <strong>P1</strong>(33–66 + 大市场)。但 standing Alpha <strong>成效未独立坐实 + 当前 revealed 趋势向下</strong>,实质更接近 P2 边缘;建议&rdquo;排进本周但带验证清单看&rdquo;,别因 Team Anywhere 的名气高估。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":65,"score":44,"conf":"THIN","dir":"↑","priority":"P1","company":"Lemonade (LMND)","oneliner":"业务翻倍而人头仅+2%、客服转去训练/审计AI,AI原生人效机制","card":"<h1>Lemonade (LMND) — Why attention?   ·   Score 44 · 置信度 THIN · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得本周看,但看点是<strong>一条 revealed 的截面 Alpha——&ldquo;用 AI 把人效拉到与百年巨头同档&rdquo;</strong>(~$1M in-force premium/员工,1,282 人对标 Progressive/Allstate/GEICO),而非一套可复述的组织机制。<strong>这是 Alpha(人效已落地、第三方+SEC 可核验),但组织&rdquo;谁/怎么/多少&rdquo;层面很薄</strong>;叠加两个需独立诊断的点:顶层 co-CEO 实验反转(Δ)、以及员工侧&rdquo;裁员手法+晋升偏袒&rdquo;的 ↓ 红旗——它们不盖 Alpha,但压住了 confidence 与 P0。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/人效</td>\n<td>&ldquo;in-force premium per employee exceeds $1 million…matches larger peers such as Progressive, Allstate, GEICO, and Travelers&rdquo;;&rdquo;since late 2022…deeply embedding LLMs within our proprietary technology stack…reducing headcount by 6%&rdquo;(PYMNTS 2026 / Q1&lsquo;26 股东信)</td>\n<td>〔事实〕1,282 人(2024:1,235)撑 $1.3B IFP;Q3&lsquo;22 以来 +1.2M 客户而人头 -6% → 人效对标 1/100 规模的巨头。偏离&rdquo;保险=人海+理赔人力&rdquo;基线,且是 revealed(SEC/Macrotrends 可核验、未回弹)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/组织即产品</td>\n<td>&ldquo;Maya&rdquo; 90 秒出报价、&rdquo;Jim&rdquo; 3 秒赔付无人工;&rdquo;tech company doing insurance, not the other way around&rdquo;(多源访谈/case study)</td>\n<td>把报价+理赔交互做成 AI agent 替代岗位,LAE ~4%;团队按产品而非职能堆人。机制止于&rdquo;自动化替人&rdquo;,团队边界划法未挖到</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(顶层)</td>\n<td>&ldquo;the clarity this structure provides outweighs the benefits of the Co-CEO structure&rdquo;(8-K, 2023-12;co-CEO 2021末→2024-01 反转)</td>\n<td>Schreiber+Wininger 当了 2.5 年 co-CEO 后<strong>退回</strong> CEO/President。诊断:顶层结构实验未坐实、主动退回求清晰 → 轻度反转,非危机补债也非强演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流/待遇(对账)</td>\n<td>〔员工侧〕&rdquo;huge layoffs were sprung…day-of…severance…only if they agreed not to write negative reviews&rdquo;;&rdquo;major favoritism…promotions&rdquo;(Glassdoor 3.4/5, 627 评)</td>\n<td>-6% 人头里<strong>含突袭式裁员</strong>,且遣散捆绑&rdquo;不写差评&rdquo; NDA;晋升偏袒 → 与&rdquo;AI 优雅提效&rdquo;叙事对账后:提效部分靠裁,信息/待遇侧有 ↓</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 人效 6 + 康威 4 + 待遇 2 = 12 → round(12/27×100)=<strong>44</strong>。co-CEO 反转为 Δ,单列不计分。<strong>在赌什么/何时失效</strong>:赌&rdquo;LLM 把保险变成软件、人效可对标巨头而成本结构碾压&rdquo;。若 AI 提效进入边际递减、或损失率(承保本身)而非人力成本才是胜负手,这条人效 Alpha 的杠杆就钝化。</li>\n<li><strong>盲区 + 下一步</strong>:决策权、层级/span、激励、招人筛子、开会机制<strong>全部&rdquo;需补机制&rdquo;</strong>(只搜到&rdquo;hire the best/skips committees/squads&rdquo;等 table-stakes,无 who/how/much)→ confidence THIN。Follow up:① 找 LMND 工程/理赔在职或前员工核实&rdquo;-6% 里裁员 vs 自然替代的比例、AI 替岗的真实边界&rdquo;;② 查 Wininger(产品/技术一号位)的招人筛子与团队划法,这是人效 Alpha 背后唯一没挖到的机制源头。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AI-native 全栈保险、自营技术栈、reinsurance 结构属战略层,大市场(美国 P&amp;C 巨型),战略中度反共识。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 {大} × 战略 {中度反共识} → <strong>P1</strong>(33–66 + 大市场)。理由:有一条 revealed、可核验的人效 Alpha 值得排进本周看;但组织机制薄+顶层反转+裁员红旗使其够不上 P0,需一手对账才能判这是&rdquo;组织优异&rdquo;还是&rdquo;被自动化叙事美化的常规降本&rdquo;。</li>\n</ul>","industry":"金融/支付/加密"},{"rank":66,"score":44,"conf":"RICH","dir":"↑","priority":"P1","company":"Meta Platforms","oneliner":"扎克伯格反复押注小而精人才密度>团队规模、削管理层、TBD Lab保留","card":"<h1>Meta Platforms — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Meta 的&rdquo;组织操作系统&rdquo;是<strong>一号位亲手压层级 + 用硬考核制造 non-regrettable attrition + 在 AI 上亲自打超高密度小团队</strong>——这是<strong>截面 Alpha</strong>（层级/考核机制已跑两轮、稳态、可复述），叠加一个<strong>诊断为&rdquo;偏补债&rdquo;的 AI reorg Delta（Llama 4 失利后被迫重组、FAIR 裁员、LeCun 出走、反复重组）</strong>——Delta 不减 Alpha，但也别把&rdquo;会讲 AI 转向故事&rdquo;高估于截面机制本身。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;I don&rsquo;t think you want a management structure that&rsquo;s just managers managing managers, managing managers… managing the people who are doing the work.&rdquo;（Zuckerberg 内部会，2023.1）；&rdquo;we will make our organization flatter by removing multiple layers of management… ask many managers to become individual contributors&rdquo;（Year of Efficiency 备忘，about.fb.com 2023.3）</td>\n<td>主动把&rdquo;经理管经理&rdquo;层级砍掉、要求大批 manager 转 IC 或走人（内部称 &ldquo;flattening&rdquo;）；2022 砍 1.1 万 + 2023 再砍 1 万。对一家 7 万+ 人成熟大厂主动减层 = 对同辈（Google/MSFT/Apple）明确反常；revealed 硬裁员，非口号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/考核</td>\n<td>〔事实〕Meta 把绩效末位桶配额从去年 12–15% 提到 <strong>15–20%</strong>（团队≥150 人），目标周期内达 <strong>10% non-regrettable attrition</strong>；&rdquo;even those who met most expectations could be considered for termination&rdquo;（Fast Company / Slashdot 2025.5）</td>\n<td>硬写进考核分布的强制末位淘汰 + 自创术语 &ldquo;non-regrettable attrition&rdquo;；谁/多少都明确、可被员工对账。对同辈反常（多数大厂淡化 stack-ranking），revealed</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度（AI）</td>\n<td>&ldquo;having basically the most compute per researcher is a strategic advantage, not just for doing the work, but for attracting the best people&rdquo;（Zuckerberg，MSL 备忘 2025.6，CNBC 转述）；MSL 成员须在各 lab &ldquo;very top handful&rdquo;；〔事实〕Zuck 亲自谈 offer、把新 hire 物理重排到自己旁边、~100 人小队、签字费报道达数千万–传 $1B</td>\n<td>一号位亲自当招聘官（绕过 HR）+ 以 compute/researcher 为筛子和卖点 + 极小精英队。机制具体；但&rdquo;是否真出成果&rdquo;未验证、且 FAIR 裁员/LeCun 出走说明有回弹 → 按落地闸 C 封顶 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>会议/信息流</td>\n<td>〔事实〕Zuckerberg 要求会前发~4 页书面备忘 + 议程预读；每个会先定&rdquo;是 discussion 还是 decision&rdquo;（Inc. / Beenote 转述）</td>\n<td>书面预读 + 决策/讨论二分，压发言式会议。具体但属同辈优秀公司 table-stakes（Amazon/Stripe 类似），二手、较旧</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进（AI）</td>\n<td>〔事实〕Llama 4（2025.4）被自家 CTO Bosworth 称 &ldquo;a disappointment&rdquo;；随后 $14.8B 收 Scale AI、空降 Alexandr Wang 任 CAIO、组 MSL、2025.10 裁 FAIR、LeCun 辞职（Pragmatic Engineer / Built In / Yahoo 2025）</td>\n<td>reorg 诊断：<strong>偏&rdquo;弱组织补债&rdquo;</strong>——危机/失利后被迫、AI 线反复重组、关键科学家流失。算 Δ、不进主分；不减上面 standing Alpha，但提示 AI 线 standing base 弱</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 S=D×C → 层级 6 + 考核 6 …同一维度（考核可归层级母题，但机制独立）取 6+6+人才密度 4 = <strong>16/27×100≈59</strong>？为避免层级/考核同维刷分（护栏：同维最多 2 条），取 层级 6 + 考核 6 + 人才密度 4 中<strong>跨不同母维</strong>的 Top-3 = 层级 6、人才密度 4、会议 2 = 12 → <strong>Score≈44</strong>（考核与层级同属&rdquo;减层/淘汰&rdquo;母维，只计其一最高 6）。<strong>在赌什么</strong>：赌&rdquo;减层 + 强制末位淘汰能换来速度与人效，不杀掉创新与信任&rdquo;；条件是顶部判断力够强、好人不被误伤。<strong>何时失效</strong>：flattening 已有研究质疑会制造&rdquo;非正式隐形层级&rdquo;与政治；AI 线已显回弹（人才流失）。</li>\n<li><strong>盲区 + 下一步</strong>：决策权下沉边界、康威式团队划分&rdquo;需补机制&rdquo;。Follow up：① 找 Blind/前员工对账 flattening 是否真减层、还是只是换了 title；② 验证 hypothesis&rdquo;non-regrettable attrition 是真清退 B 级、还是 metric gaming 制造恐惧文化（表演式 costly 风险）&rdquo;；③ 跟踪 MSL 是否稳态成军、还是继续反复重组。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：$15B 级 AI all-in + 从开源转闭源、Avocado 模型延至 2026Q1——战略上敢下大注，但属业务层，不进组织分。</li>\n<li><strong>优先级</strong>：组织 44 × 市场 大（社交+AI 双巨型市场）× 战略 偏反共识（逆周期减层 + 天价挖人）→ <strong>P1</strong>，排进本周：截面有真机制（减层/淘汰可证伪、CEO 亲招），但&rdquo;做没做成&rdquo;待第三方/员工侧坐实，且 AI 线带补债 Δ，未到 P0。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":67,"score":44,"conf":"RICH","dir":"↑","priority":"P1","company":"MiniMax (稀宇科技)","oneliner":"全公司仅3层+算法基建一体共优一目标,机制清晰可证伪","card":"<h1>MiniMax (稀宇科技) — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。它的&rdquo;组织操作系统&rdquo;是 <strong>AI-native 的&rdquo;解方程式&rdquo;组织</strong>——一号位把&rdquo;研究组织&rdquo;当高杠杆动作，用极扁平结构 + 亲自把关的&rdquo;协作筛子&rdquo; + 消解职能边界，让 ~400 人干通常要数千人的活。这是<strong>当前在跑的截面 Alpha</strong>（不是转向故事）；唯一的大 Δ（算法/infra 合并）经诊断更像<strong>主动演进</strong>而非补债。同辈（头部基模 lab）共识项已压分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;他考核的核心除了聪明、热情，最看重的一点是&rsquo;有没有和人合作的能力&rsquo;&ldquo;；&rdquo;有些很强的个体融不进团队，有些看着没那么强的人能提升团队整体产出&rdquo;（罗永浩对谈复盘, 澎湃 32148957）</td>\n<td>闫俊杰<strong>亲自做算法岗最后一个面试官</strong>；筛子=协作而非天才，会刷掉&rdquo;强但不合作&rdquo;的人 → 反&rdquo;招最强个体&rdquo;共识、可证伪、得罪一批 strong-but-lone-wolf</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;现在还是只有闫俊杰、闫俊杰的-1、闫俊杰的-2三个层级&rdquo;；&rdquo;很喜欢研究组织&rdquo;&ldquo;组织的杠杆其实非常大&rdquo;（同上 + 晚点 LateTalk 99）</td>\n<td>~400 人<strong>只 3 层</strong>；一号位把&rdquo;研究组织&rdquo;当高杠杆、不愿做&rdquo;低杠杆的管理&rdquo; → 同类(基模 lab)也讲扁平，但&rdquo;3 层@400人&rdquo;是具体可证伪的硬约束</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/激励</td>\n<td>&ldquo;很难统计非技术人员比例，因为大家工作方式更靠近问题本质，而不是传统职位定义&rdquo;；B 端售前&rdquo;会自己写代码给客户做 demo&rdquo;；&rdquo;AI Native 让近 400 人干通常要数千人的活&rdquo;（澎湃 32148957）</td>\n<td>刻意<strong>打破算法/开发/PM 边界</strong>、按&rdquo;问题本质&rdquo;组织人而非职位；全员期权覆盖全职能 → 人效偏离&rdquo;按职能堆人&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;公司大多数决策都是在计算某些东西的最优化&rdquo;&ldquo;我们在解方程&rdquo;；资源受限时选&rdquo;最激进的方案&rdquo;，&rdquo;把事做到极致才会好&rdquo;（新浪财经 inhhnuut2522282）</td>\n<td>决策=优化求解的哲学，但<strong>谁拍板/一线边界未挖到机制</strong> → 软信号，需补机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>&ldquo;算法和基础设施一定要一体的，相当于所有人要优化同一个目标，而不是每个人自己优化目标&rdquo;，结果&rdquo;有些人不认同，离开了 MiniMax&rdquo;（澎湃 32148957）</td>\n<td>~半年前把算法+infra 合并、取消个人 scope 边界 → reorg 诊断:<strong>增长/IPO 前主动做、框架是&rdquo;下一阶段一体化&rdquo;、非危机自曝臃肿</strong> = 主动演进偏 Alpha；但落地仅 CEO 自述</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 招聘筛子(2×2=4) + 3层级(2×2=4) + AI-native边界(2×2=4) = 12，/27×100 = <strong>44</strong>。Δ 行(算法/infra 合并)单独列、不进主分。<strong>在赌什么/何时失效</strong>：赌&rdquo;协作密度 + 极扁平 + 边界消解&rdquo;能让小团队压制大厂；当规模再翻倍、或多产品线需要独立损益时，3 层 + 无职能边界可能扛不住，需看会不会被迫加层。</li>\n<li><strong>盲区 + 下一步</strong>：决策权(一线能独立拍板的边界)、信息流(坏消息上行机制)、reorg 落地(合并后人效/留存是否 revealed)均&rdquo;需补机制/待验证&rdquo;。员工侧已交叉印证:知乎/脉脉口径&rdquo;对事不对人&rdquo;&ldquo;每两天一次会、谈下一步而非汇报&rdquo;&ldquo;能背靠背&rdquo;——与协作筛子+轻会议一致，但属软证据。Follow up:① 找合并后离职者/在职算法工程师对账&rdquo;优化同一目标&rdquo;是否真落地、有无回弹；② 验证&rdquo;3 层@400人&rdquo;在 IPO 后是否仍成立。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：全模态技术路线 + 决意全球化 + IPO 速度破纪录(4 年天使轮到上市)；一号位&rdquo;更怕陷入追随者心态&rdquo;。这些是战略/资本离群，进战略层、不驱动组织分。</li>\n<li><strong>优先级</strong>：组织 44 × 市场 大(基础大模型/AGI) × 战略 偏共识(基模赛道拥挤) → <strong>P1</strong>，排进本周:组织有真机制(协作筛子+扁平+边界消解)、大市场加持，但偏离同辈 lab 未到激进、落地待验证，不足以 P0。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":68,"score":44,"conf":"RICH","dir":"?","priority":"P1","company":"美团 Meituan","oneliner":"7高管+双决策组治理、王兴亲历AI招人不设考核;有Alpha底+reorg持续演进","card":"<h1>美团 Meituan — Why attention?  ·  Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看，但不是&rdquo;组织赌徒&rdquo;型偏离——它的&rdquo;组织操作系统&rdquo;是一套<strong>已落地、可核验的内部领导梯队 + Z字型强制轮岗 + 高内部提拔率</strong>(维度2/4 的真 Alpha，第三方/数字可对账)，叠加一套<strong>按业务成熟度有节奏拆/并 BU、每层指名 P&amp;L owner 的主动组织演进</strong>(维度9，强组织主动演进为主、2025 部分裹挟外卖大战危机)。这是<strong>截面 Alpha 为主</strong>；&rdquo;反内卷&rdquo;&ldquo;出海千亿&rdquo;是战略/Delta，不计组织分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度/层级 (2/4)</td>\n<td>&ldquo;当前我们69%的管理者是内部提拔…总监及以上超一半来自内部晋升&rdquo;(王兴2024中秋内部信，新浪/凤凰财经)</td>\n<td>谁:总监+/VP；怎么:领导梯队培养计划(2020启动)+人才盘点+继任+强制换岗；多少:69%内部提拔。互联网同类(阿里/腾讯)更靠外部空降高管→Meituan 内生密度明显反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进 (9)</td>\n<td>〔事实〕薛冰(司龄14年)、魏巍(9年)、章若愚各&rdquo;先后在外卖/配送/到家到店多个核心岗位轮岗&rdquo;才拿到事业部(网易/财经)</td>\n<td>&ldquo;Z字型/π型&rdquo;发展:升 P&amp;L 前强制横向多岗轮岗，逆&rdquo;专精晋升&rdquo;惯性、对在位高管 costly；有命名案例可核验</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进 (9)</td>\n<td>〔事实〕2024.02 整合到家/到店/平台/基研→04 王莆中任&rdquo;核心本地商业CEO&rdquo;；08 快驴/小象/优选并为&rdquo;食杂零售&rdquo;(郭万怀)、境外改 Keeta(仇广宇)(澎湃/证券时报)</td>\n<td>谁拍板:王兴发内部邮件按节奏拆并 BU、每层指名单一 owner;常规节奏+成熟度驱动=强组织主动演进(非反复反转);2025上半年核心本地商业溢利-75.6%下部分调整裹挟竞争压力→混合，非纯补债</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>一号位亲历 (8/4)</td>\n<td>〔事实〕王兴亲自直管无人机+香港/海外 Keeta;&rdquo;无独立办公室、经济舱、被叫兴哥&rdquo;(腾讯新闻/IPO 文化材料)</td>\n<td>一号位亲管前沿新赌注(非撒手);平权符号部分是大厂 table-stakes(D 低)，亲管前沿是真 8 维信号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/决策 (3/6)</td>\n<td>〔事实〕高管会放周末开、S-team 每人发言;干嘉伟早年劝&rdquo;你得抓大放小，授权别人管理&rdquo;(腾讯新闻，二手/陈旧)</td>\n<td><strong>需补机制</strong>:一线可独立拍板边界、坏消息上行制度均未挖到具体规则→不进打分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 6 + 4 + 2 = 12 → round(12/27×100)= <strong>44</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;内生人才 + 横向轮岗出的复合视角&rdquo;长期胜过外部空降；若外卖大战逼出短期硬仗、内部慢培养的梯队跟不上即时战力，这套优势会被稀释。</li>\n<li><strong>盲区 + 下一步</strong>:会议/决策权/真相上行(维度3/6)只有&rdquo;周末开会、抓大放小&rdquo;等软料，<strong>需补机制</strong>(信息盲区≠平庸)。Follow up:核心本地商业一线产品/运营&rdquo;能独立改什么不用签字&rdquo;的授权边界；脉脉/离职访谈对账 69% 内部提拔是否=固化/天花板。验证 hypothesis:轮岗梯队是真人才密度引擎，还是大厂内循环近亲繁殖。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:&rdquo;2025–2035 重点国际化、Keeta 目标千亿美元外卖规模&rdquo;&ldquo;坚决反对内卷&rdquo;&ldquo;we will do whatever it takes to win&rdquo;(新浪/股东会)——战略大注 + 2025 由盈转亏(全年净亏约234亿)，战略层值得单独看，<strong>不抬组织分</strong>。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大(本地生活/外卖/出海超大牌桌) × 战略 中(出海反共识、外卖防守共识) → <strong>P1</strong>,排进本周看;组织偏离中等但真实可核验、且卡在巨型市场+出海反共识赌注上。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":69,"score":44,"conf":"RICH","dir":"?","priority":"P2","company":"Carta","oneliner":"薪酬=纯市场无年涨+分层1:1走步制,但第三方实锤有毒文化/自交易","card":"<h1>Carta — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;看一眼、别追&rdquo;。CEO Henry Ward 是少数能写出一整套连贯组织模型的一号位(自缚式裁员归责、shadow-org 网络分析、一套成文的招人筛子)——这是真的<strong>截面 Alpha</strong>,机制可复述。但它撞上一道极硬的 <strong>revealed 反证</strong>:数据滥用丑闻后退出 secondaries、3+ 起性骚扰/歧视和解、员工侧&rdquo;领导层不停换、yes-people、toxic&rdquo;。<strong>stated 哲学很强 ≠ 组织真好</strong>:Alpha 被同等强度的&rdquo;确认 dysfunction&rdquo;对冲,所以中分而非高分。同辈基线=美国 B2B SaaS 独角兽(2000 人级)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源,必填)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位 / 6 信息流</td>\n<td>&ldquo;Once the lists were created, they were sent to me for approval. I personally reviewed every list and every person&hellip; If you are one of those affected it is because I decided it. Your manager did not.&rdquo;(Ward, <em>Carta&rsquo;s covid-19 layoff</em>, Medium 2020)</td>\n<td>裁员三条成文 criterion(岗位消失→PIP/将进 PIP→&rdquo;再砍一个会是谁&rdquo;),161 人/16%;CEO 逐人复核并公开把责任拦在自己身上、明确替经理挡。自缚+可证伪+公开担下行,偏离&rdquo;经理背锅/HR 模板信&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流 / 8 一号位</td>\n<td>〔事实〕用 Innovisor 三问网络调查(&ldquo;谁让你有干劲/你找谁求助/你找谁做决定 各列≥4 人&rdquo;)测非正式影响网;&rdquo;ten employees… influences 70% of our 250&rdquo;;CEO&rdquo;didn&rsquo;t make the top 10&rdquo;(Ward, <em>The shadow org chart</em>, Medium)</td>\n<td>用网络分析量化&rdquo;影子组织图&rdquo;、识别 ~10 个 IC 影响者 + 9 个 leader 影响者;但 Ward 只说&rdquo;理解他们怎么做的、好制造更多&rdquo;——<strong>未落到晋升/分钱/决策权</strong>,是诊断不是机制改写</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;I would rather hire the humble asshole than the arrogant nice guy&rdquo;;&rdquo;Do not be afraid of hiring False Positives… Be afraid of missing the 20x employee&rdquo;;筛子=trajectory/doers/learners,&rdquo;ask a candidate how to do something and then ask them to do it&rdquo;(Ward, <em>How to Hire</em>, Medium)</td>\n<td>招人筛子成文(强项 vs 无短板、轨迹 vs 履历、做者 vs 说者),HM 拍板、面试组只答&rdquo;他最强在哪&rdquo;;但实操机制薄,且被 revealed 直接打脸(见下)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;I want Carta to be a Bias to Action and a Bias to Yes company&rdquo;(Ward, <em>A bias to action</em>, Medium)</td>\n<td>无机制(谁能拍/可逆分级/超时默认皆无)——<strong>需补机制</strong>,纯口号,不进分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>3 决策权 / 9 演进</td>\n<td>〔事实·revealed〕销售用客户 cap-table 数据私联未披露投资者;Ward:&rdquo;we have decided to prioritize trust, and exit the secondary trading business&rdquo;(TechCrunch 2024.1);secondaries 仅 ~$3M vs cap-table ~$250M</td>\n<td>危机后被迫砍业务(护栏:<strong>弱组织补债</strong>,非主动演进);员工侧&rdquo;leadership turnover constant, toxic culture filled with &lsquo;yes&rsquo; people&rdquo;(Blind)、Glassdoor 文化 3.4/5;3+ 起性骚扰/歧视和解(CRO 被指 groped,TechCrunch 2025.2)</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 6(裁员)+4(影子图)+2(招人)=12 → round(12/27×100)=<strong>44</strong>。<strong>在赌什么 / 何时失效</strong>:Ward 赌&rdquo;一号位亲自承担+把组织讲清楚&rdquo;能撑住高速;一旦执行层(销售/高管)行为与 stated 价值背离(数据滥用、骚扰),CEO 的 articulate 反而放大信任损失(他还主动 email 客户提示负面报道,被指自伤)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/span 维度&rdquo;需补机制&rdquo;(只有口号);影子图分析&rdquo;未落到人事行动&rdquo;。Follow up:验证 hypothesis=&rdquo;Ward 的成文哲学是真落地的机制,还是 articulate 创始人的 stated 表演?&rdquo;——查丑闻/和解后是否有 revealed 的治理/人事整改(换 CRO、独立审查、留存回升),没有则坐实&rdquo;说强做弱&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:cap-table 近垄断 + 大市场;但 secondaries/估值业务屡踩信任红线,战略偏共识、执行有红旗。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 大 × 战略 共识 → <strong>P2</strong>。中等偏离、信息 RICH;Alpha 真实但被同等强度 revealed dysfunction 对冲,值持续观察、不值放下手头事去追。</li>\n</ul>","industry":"金融/支付/加密"},{"rank":70,"score":44,"conf":"RICH","dir":"↑","priority":"P1","company":"Duolingo","oneliner":"指标制自治小队+'宁缺勿招混蛋'+60页文化手册,standing Alpha","card":"<h1>Duolingo — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。组织操作系统 = <strong>&ldquo;按指标(metric)而非功能划团队&rdquo;</strong> —— 每个团队拥有唯一一个必须季度上涨的指标、跑数百次 A/B test,团队数到 50 就拆成 &ldquo;areas&rdquo;;叠加一套<strong>反共识的招人筛子</strong>(出租车司机测试 + &ldquo;宁缺毋滥&rdquo;)。这是<strong>截面 Alpha</strong>(当前在运行、跑成稳态、能复述&rdquo;谁/怎么/多少&rdquo;),不是转向故事。AI-first memo→反转是单独的 Δ,不进主分、也不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 激励</td>\n<td>&ldquo;We do not do feature-based teams, we do metrics-based teams&rdquo;;&rdquo;a bunch of teams that own each a single metric&rdquo;、要 &ldquo;increase every quarter&rdquo;、跑 &ldquo;hundreds of AB tests&rdquo;;&rdquo;we had 50 teams…so we split up into areas&rdquo;(von Ahn, Tim Ferriss #607 transcript)</td>\n<td>团队按&rdquo;要撬动的指标&rdquo;成立(如 retention 团队),每队拥唯一指标、季度必须上、用海量实验逼动;50 队即上收成 area 层。偏离&rdquo;按功能/产品线分工&rdquo;的默认。员工侧对账:&rdquo;shipping faster is rewarded…incentive to work longer hours&rdquo;(Glassdoor)= 指标-实验文化确实落到一线行为上</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;if they&rsquo;re going to be mean to the driver, they&rsquo;re probably going to be mean to other people&rdquo;;为找 CFO 找了 &ldquo;like a year&rdquo;,简历强、委员会都喜欢的候选人因 &ldquo;pretty mean to their driver&rdquo; 被否(von Ahn, Fortune/AOL 2026)</td>\n<td>付钱让接送司机评候选人;一票否决,凌驾简历+面试委员会;&rdquo;宁可 understaffed 也不破金标准&rdquo;。偏离&rdquo;招够人=进展&rdquo;的人头通胀默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>〔事实〕团队由 2–3 名 &ldquo;co-leads&rdquo; 带,&rdquo;PM lead owns product discovery and roadmap…engineering lead owns product delivery and implementation&rdquo;;&rdquo;co-leads…ultimately responsible…deciding its roadmap&rdquo;(Lenny&rsquo;s Newsletter)</td>\n<td>路线图决策权下沉到队内 co-lead、按职能切责任面;偏离&rdquo;决策上浮 CEO&rdquo;——但产品公司里较常见,非激进</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(AI 改制)</td>\n<td>&ldquo;When I released my AI memo a few weeks ago, I didn&rsquo;t do that well&rdquo;;&rdquo;the most important thing…is that you are doing whatever your job is as well as possible…if it can&rsquo;t [AI help], I&rsquo;m not going to force you&rdquo;(von Ahn, Rapid Response 2026)</td>\n<td>2025-04 发&rdquo;AI-first&rdquo;memo(停用可被 AI 替代的外包、headcount 只在不能自动化时给、AI 进绩效)→ 舆论反弹 → 2026-05 <strong>撤掉 AI 使用绩效规则</strong>。Δ-reorg 诊断:<strong>反弹后被迫反转</strong>(非表现好时主动演进),记弱组织债的一小块,但不盖 Alpha</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 6(指标团队 2×3) + 4(招人 2×2) + 2(co-lead 1×2) = 12 → 12/27×100 ≈ <strong>44</strong>。Δ 行(AI memo 反转)单列、不进分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;把组织对齐到少数硬指标 + 海量实验&rdquo;能持续撬增长;失效条件 = 指标 gaming / 短期主义侵蚀学习成效(Glassdoor 已现&rdquo;长工时/random firings/fake transparency&rdquo;杂音),或 AI 反复反转暴露一号位决策不稳。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span、坏消息上行机制、激励的具体回报结构(股权/奖金口径)信息不足(需补机制)。Follow up:① 验证&rdquo;指标团队&rdquo;是否仍是当前(2026)在跑结构而非旧访谈遗存;② 与离职员工对账&rdquo;shipping/指标压力&rdquo;是真 Alpha 还是 metric-gaming 的债;③ AI memo 反转是一次性还是反复反转的 pattern。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:消费教育大市场、订阅+gamification 增长模型强劲;AI-first 是激进战略下注但执行反复——属战略层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 {大} × 战略 {AI-first 偏反共识但已回撤} → <strong>P1</strong>(组织有真 Alpha 但未达 67;市场大、战略有看点,排进本周)。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":71,"score":44,"conf":"RICH","dir":"↑","priority":"P2","company":"Dropbox","oneliner":"Virtual First 90/10远程为轴重设招聘/会议/地产,运行中的独特组织OS","card":"<h1>Dropbox — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得有空看、不必放下手头事。它的&rdquo;组织操作系统&rdquo;就一件真东西——<strong>把 full remote 做成永久结构性承诺(Virtual First)</strong>:全员 90% 远程、办公室改名 Studios 只做协作、用&rdquo;核心协作时段 + 异步默认 + 会议只留给 3D(discussion/debate/decision)&rdquo;替代坐班同步。这是<strong>截面 Alpha</strong>(已跑 5+ 年、员工侧坐实存在),但所有&rdquo;变好了&rdquo;的成效数字都是公司自引(stated);2023/2024 两轮大裁 + &ldquo;层级过多&rdquo;自承是<strong>弱组织被迫补债的 Δ</strong>,不加分、也压住了热度。同辈(Box/Atlassian/Asana 等同规模上市 SaaS)对照下,真正反常的只有&rdquo;在 RTO 大潮里反向把远程钉成结构&rdquo;这一条。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构/层级</td>\n<td>〔事实〕2,600 人中 90% 远程;办公室改名 &ldquo;Dropbox Studios&rdquo; 只做协作,个人工作一律 offsite(MIT Sloan / euronews 2026)</td>\n<td>永久 Virtual First:个人活默认在家/co-working,办公室只留团队协作;同辈在 2023–26 普遍 RTO/混合,它反向把&rdquo;全远程&rdquo;钉成不可逆结构(放弃 SF 大量办公地产)→ 对同类明确反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策/信息流</td>\n<td>&ldquo;async-by-default mindset… reserving meetings only for the 3d&rsquo;s: discussion, debate, and decision-making&rdquo;;&rdquo;core collaboration hours… four-hour time blocks&rdquo;(Dropbox VF 2025 blog)</td>\n<td>全公司 4 小时核心协作窗口跨时区重叠 + 异步默认 + 会议三准则,杀掉&rdquo;全天 sync&rdquo;;规则可证伪、确在跑,但&rdquo;减会 27%/编码 +28%&rdquo;等成效是公司自引 → 机制 revealed、成效 stated</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;if you have a dog that&rsquo;s just obsessed with tennis balls, you don&rsquo;t have to do anything… in an interview you&rsquo;re trying to figure out, is this person just obsessed with their craft&rdquo;;&rdquo;Hire people who are smarter than you, then stay out of their way&rdquo;(20VC / thebigbyte)</td>\n<td>招人筛子=对手艺的&rdquo;网球式痴迷&rdquo;(看 side projects/自驱),非简历;十年反复讲。但是讨好型、不可证伪、无 keeper-test 退出机制 → 软筛子,非 costly</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>真相上行/演进</td>\n<td>&ldquo;our organizational structure has become overly complex, with excess layers of management slowing us down… designing a flatter, more efficient team structure&rdquo;(Drew Houston 2024-10-30 全员信)</td>\n<td>自承&rdquo;层级过多/拖慢&rdquo; + 砍 20%(528 人)求扁平。诊断=<strong>弱组织补债</strong>:demand softening/macro 逆风后被迫做、2023 已先裁 16%、员工侧&rdquo;management 每 12 个月换一轮、thrash 多&rdquo;对账坐实 → Δ 不进主分;此处是<strong>确认平庸</strong>的旁证</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 6(VF 结构)+ 4(异步机制)+ 2(网球招人)= <strong>12 / 27 × 100 = 44</strong>。Δ 行(2024 reorg)单列不计。<strong>在赌什么/何时失效</strong>:赌&rdquo;地理无关的异步深度工作能换来更高人效与留存,且不靠坐班维系文化&rdquo;;若产品长期落后(被自承&rdquo;没达到客户应得水平&rdquo;)、远程下创新协作衰减,VF 就只剩成本优势、护不住组织。</li>\n<li><strong>盲区 + 下一步</strong>:激励/所有权、康威、span 具体数(经理带几人)均<strong>信息不足</strong>(≠平庸)。<strong>所有 VF 成效数字(35% 更多 PR / 40% 更快上线 / 史上最低 attrition)= 公司自引、待验证落地</strong>,别当 revealed。follow up:① 找第三方/员工侧验证 attrition 与人效是否真优于同辈、有无回弹;② 看新 co-CEO Ashraf Alkarmi(2026.5 接任)是否保留 VF 还是补债式收权。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:核心云存储商品化、增长放缓,all-in 押 Dash AI 搜索——战略上是同辈共识式 AI pivot,不算反共识;组织上唯一真信号是 Virtual First。</li>\n<li><strong>优先级</strong>:组织 44 × 市场 中(商品化云存储 + 不确定 AI 转型)× 战略 共识(随大流 AI)→ <strong>P2</strong>:有空再看 / 持续观察 VF 落地是否被新 CEO 时代验证或推翻;不进 P0(成效全 stated + reorg 属补债)。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":72,"score":44,"conf":"RICH","dir":"↑","priority":"P2","company":"Reddit (RDDT)","oneliner":"2555人对MAU远低于同辈、人效超百万，Huffman有明确招人筛子+不裁人反扩建","card":"<h1>Reddit (RDDT) — Why attention?   ·   Score 44 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;有空看&rdquo;。真正的截面 <strong>Alpha 是极致精简</strong>——~2,000 人撑起 top-10 全球站点 + $1.3B+ 营收、人效从 ~$58万 升到 ~$90万/人,在社交/广告同类(Snap/Pinterest)里明显反常;但这种精简一半是<strong>结构性运气</strong>(版主免费做内容审核,省掉同类最大的审核组织),不全是刻意组织设计。叠加一个 <strong>AI-native 新人招聘 Delta(在转向)</strong>。员工侧&rdquo;talent density exercises&rdquo;对账出<strong>纪律变churn的红旗</strong>,压住&rdquo;高人才密度&rdquo;叙事。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>层级/span·人效</td>\n<td>〔事实〕FY24 2,233 人撑 $1.3B 营收(+62%);FY25 ~2,555 人、季度净利率升至 28%;人效 ~$58万→~$90万/人(SEC 10-K / FY25 8-K)</td>\n<td>同类社交平台(Snap ~5k、Pinterest ~4k+)在更小营收上养更大团队;Reddit 极少人头跑超大规模 → 偏离&rdquo;按规模堆人头&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/信息流</td>\n<td>〔事实〕&rdquo;subreddit mods work for
