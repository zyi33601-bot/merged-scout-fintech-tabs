 Away…voluntary offboarding for Krakenites who decide it&rsquo;s time&rdquo;(Sethi/Ripley, Kraken blog)</td>\n<td>用&rdquo;价值观不合即付 4 个月遣散自愿走&rdquo;做反向 keeper test,~30 人(约1%)真走人——〔revealed〕第三方+on-record;偏离&rdquo;招人证进展/不敢动人&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑?</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>&ldquo;today I&rsquo;ve got maybe 50-70 reports…by end of year…100&rdquo;;&rdquo;We&rsquo;re both in the loop on all comms between all of the 50 to 70 reports…whoever…has the most context&rdquo;(Sethi, Semafor)</td>\n<td>co-CEO 砍中层、各带 50–100 直接下属、两人共看全员通信、按&rdquo;谁上下文最足&rdquo;拍板而非资历;自训&rdquo;six or seven bots&rdquo;消化日 6000 条消息。极宽 span+反 1:1,对 2600 人公司激进</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑↓</td>\n</tr>\n<tr>\n<td>战略-结构/激励</td>\n<td>Sethi relies &ldquo;heavily on members of his own network—sometimes at the expense of Kraken&rsquo;s own employees&rdquo;…&rdquo;didn&rsquo;t do wonders for morale&rdquo;;remake as &ldquo;a family of brands…the mode is Mark Zuckerberg&rsquo;s Meta&rdquo;(former exec/Fortune)</td>\n<td>像 VC 管 portco:每个品牌配全套高管、靠自己人网络补位;偏离&rdquo;内部晋升/职能制&rdquo;;revealed 出忠诚网络挤压在编员工</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕裁 ~15%/约 400 of 2,600,点名砍 ops chief BianRosa、tech chief Patankar;&rdquo;fell into the trap of building organizational layers…eliminate layers&rdquo;(co-CEO memo, 2024)</td>\n<td>增长/IPO 前主动削层(非危机后被迫),倾向&rdquo;强组织演进&rdquo;;但员工侧见债:&rdquo;people disappear on Slack…no acknowledgment&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>信息流(对账)</td>\n<td>&ldquo;The best people don&rsquo;t need to be managed. They need to be trusted&rdquo;(Sethi/Ripley)↔ 员工:&rdquo;soul…lost, replaced by fear, distrust, and disengagement&rdquo;;Mgmt 3.4/5(Blind/Glassdoor)</td>\n<td>stated 自由/信任 vs revealed 恐惧文化——裂口=红旗或表演式;span 与 comms 透明是 revealed,信任叙事是 stated</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9(Sail Away)+ 6(span)+ 4(网络/品牌)= 19 → 19/27×100 = <strong>70</strong>。Δ(2024 reorg)单列不进分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;顶尖的人不用管、只要给上下文和自由 + 用 AI 替代中层&rdquo;;若 span 100 的&rsquo;most-context 谁跳谁拍&rsquo;退化成混乱/忠诚网络寡头化、价值观筛子变成清洗忠诚度,Alpha 就翻成 ↓。</li>\n<li><strong>盲区 + 下一步</strong>:① 缺&rdquo;招人具体筛子&rdquo;原话(只有&rdquo;hire for ownership and intensity&rdquo;=偏 cheap,需补机制);② Sail Away 在 Sethi 期的 take-up 数与回弹未验证(2024 reorg 后只剩 Powell 时代~30 的旧数据)。<strong>Follow up</strong>:找前/在职 director 级对账&rdquo;50-100 reports + bots&rdquo;是否真在运行 vs 已塞车;验证 hypothesis&rdquo;VC-投后模式能否承住 2600 人冲 IPO 而不靠忠诚网络空心化在编团队&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:零至…IPO 路径明确($15B 估值/$500M 轮/2026 拟 IPO)、xStocks 代币化股票快速出货——大市场、打法中度反共识(VC 当 CEO);组织分已含此模式的组织表达,业务面单独标&rdquo;大市场值得看&rdquo;。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 {大:加密/IPO} × 战略 {中度反共识:VC-runs-portco} → <strong>P0</strong>,但<strong>带强红旗</strong>:revealed 出&rdquo;信任话术 vs 恐惧文化&rdquo;裂口 + 忠诚网络挤压在编员工,P0 的理由是&rdquo;偏离极大且 costly、必须亲自看清是真 Alpha 还是表演式 costly&rdquo;,而非&rdquo;已验证为好组织&rdquo;。</li>\n</ul>","industry":"金融/支付/加密"},{"rank":25,"score":70,"conf":"RICH","dir":"?","priority":"P0","company":"Cognition (Devin/Windsurf)","oneliner":"并购后9月遣散费当筛子逼全员选边,机制实但grind是AI同辈半-table-stakes","card":"<h1>Cognition (Devin/Windsurf) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得放下手头看。它的&rdquo;组织操作系统&rdquo;= <strong>用极致绩效文化 + 反共识招聘筛子把人才密度推到 cohort 极端，并用&rdquo;花真金白银请人离开&rdquo;的机制把文化对齐变成可执行动作</strong>。这是<strong>截面 Alpha</strong>（机制当前在跑、有第三方/官方 revealed 证据），不是转向故事——没有自承痛点+宣布改革的 Delta。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度(M&amp;A整合)</td>\n<td>〔事实〕收购 Windsurf 后&rdquo;100% of Windsurf employees will receive fully accelerated vesting&rdquo;+ 给 9 个月薪资买断、限期 8/10 选择(Cognition 官方 blog；TechCrunch 2025-08-05)</td>\n<td>用&rdquo;全额加速归属 + 9个月买断&rdquo;做<strong>去选择</strong>筛子：愿留者 opt-in 极强度，不愿者拿钱走；同辈 M&amp;A 默认用 golden-handcuff <strong>留人</strong>，它反过来<strong>付费请人走</strong>→自缚、烧钱、第三方可核验、无回弹</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/文化</td>\n<td>&ldquo;We don&rsquo;t believe in work-life balance—building the future of software engineering is a mission we all care so deeply about that we couldn&rsquo;t possibly separate the two.&rdquo;(Scott Wu，The Information 邮件经 TechCrunch 引) / &ldquo;extreme performance culture, and we&rsquo;re upfront about this in hiring so there are no surprises later&rdquo;(Scott Wu，X)</td>\n<td>把 80h/6天明确写进招聘前置、并用上面的买断机制<strong>强制执行</strong>而非空喊；得罪人、可证伪、公开被骂仍不撤。极端时长在本 cohort 半 table-stakes，但&rdquo;显式筛子+买断兑现&rdquo;超出同辈</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>人才密度(招聘筛子)</td>\n<td>&ldquo;our whole interview process… is basically just having people build their own Devin in eight hours&rdquo; / &ldquo;you can use as much AI as you want… What we actually want to test is… what do you think is the right thing to build?&rdquo;(Scott Wu，Cheeky Pint / officechai)</td>\n<td>招聘只测判断力/产品决策，<strong>放开 AI 使用</strong>；反 cohort 当下&rdquo;防 AI 作弊&rdquo;恐慌。机制为 stated 过程(非第三方对账)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(画像)</td>\n<td>〔事实〕初始 35 人中&rdquo;21 of us have founded a company before&rdquo;，&rdquo;core engineering was about 19&rdquo;，团队累计 10 枚 IOI 金牌(Cheeky Pint；Contrary)</td>\n<td>~60% 连续创业者 + 顶级竞赛池=极高 founder/algo 密度。但&rdquo;招精英竞赛选手&rdquo;在本 cohort 偏 table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 Alpha 行 Top-3（同维度≤2）：买断筛子 S=9 + WLB文化 S=6 + 8h招聘 S=4 = 19 → round(19/27×100)= <strong>70</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;人才密度×强度=AI编程飞轮里唯一杠杆，软成员是净拖累&rdquo;；若 Devin 自动化让超长工时的边际产出递减（员工在 Blind 已指&rdquo;overwork narrows solution space, burns out&rdquo;），或顶级人离场后无人补，机制反噬。</li>\n<li><strong>盲区 + 下一步</strong>：决策权/层级/span/信息流(坏消息上行)/康威——<strong>信息不足，非平庸</strong>：~286 人但内部汇报线、谁拍板、几层、会议机制几乎查无(定向&rdquo;怎么开会&rdquo;子查询只搜到&rdquo;AI 当异步初级工程师/会议加 voice AI&rdquo;，无杀会/异步备忘等机制)。follow-up：找 Windsurf 留任/离职者验证&rdquo;买断后真实留存与文化落地是否回弹&rdquo;；问现任工程师&rdquo;一线能独立拍板的边界 + 是否有中层&rdquo;。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：&rdquo;Moneyball-ification of everything&rdquo;——把工程招聘/评估当成可数学优化的成熟空间；72 小时 92% 折价吞下 Windsurf 残部——战略极进取，但属资本/战略层。</li>\n<li><strong>优先级</strong>：组织 70 × 市场 {大：AI 编程/agent} × 战略 {反共识：付费去选择 + 反 WLB 公开化} → <strong>P0</strong>：组织 Score≥67 且大市场 + 反共识战略，机制有 revealed 落地证据、当前在跑。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":26,"score":70,"conf":"RICH","dir":"↑","priority":"P1","company":"Anduril Industries","oneliner":"新人day-one独立担项目、不等审批,扁平快决策,部分机制但近防务startup table-stakes","card":"<h1>Anduril — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得本周看。组织操作系统 = <strong>「自费造完再卖、用 firm-fixed-price 把成本下行风险扛在自己资产负债表上」的结果所有权制 + 一号位刻意&rsquo;比该有的乱两档&rsquo;来保创新 + 用&rsquo;自发项目/独特超能力&rsquo;当人才筛子</strong>。这是<strong>截面 Alpha</strong>(机制当前在跑、可第三方核验),不是转向故事;同辈(传统军工 prime + 大型硬件 AI scaleup)里高度反常。判 D 的同类是「防务承包商 + 千人级硬件 AI 公司」,不是泛创业公司。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>激励/所有权</td>\n<td>Schimpf: &ldquo;I read a contract, you&rsquo;re going to deliver me X, and I pay you a fixed fee. If you can do it cheap, great, and <strong>if you can&rsquo;t, you lose money</strong>&ldquo;(Contrary Research);〔事实〕2025 年 &gt;60% 营收投 R&amp;D vs primes 个位数;自掏 $1B 建 Arsenal-1(Contrary）</td>\n<td>自费先造完产品再卖成品(非 cost-plus 报销)→ FFP 把成本超支的下行直接压到自己 P&amp;L,逼内部对成本/交付负真账。偏离防务业 cost-plus 报销共识(下行转嫁给政府)——极反常且第三方可核验</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进/层级</td>\n<td>SVP 转述 Schimpf: &ldquo;We&rsquo;re gonna run this company <strong>two clicks more chaotic and disorganized than any sane person would think</strong> this company should be run at this scale, because it [sustains] innovation&rdquo;(Fortune 2026）</td>\n<td>一号位在 ~7,600 人规模下<strong>主动拒绝标准化/科层增厚</strong>、把&rdquo;略欠组织&rdquo;当设计选择;偏离&rdquo;随规模专业化/加管理层&rdquo;的默认引力。但仍是 stated 哲学(二手转述),非可对账机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>Luckey: &ldquo;I look for people who have done <strong>projects outside of what their work paid them to do or what their school made them do</strong>…willing to work…with their own money and their own time&rdquo;(StartupArchive);〔事实〕面试真问 &ldquo;What&rsquo;s your least favorite Anduril product?&rdquo;，&rdquo;They&rsquo;re all amazing&rdquo; 近乎秒挂;不信 unicorn、要&rdquo;distinct superpower&rdquo;(Exponent/Paraform)</td>\n<td>筛子 = 自发投入信号 + 必须带独特&rdquo;超能力&rdquo; + 用反向问题筛掉空泛热情;偏离&rdquo;按学历/大厂背景招&rdquo;。revealed 的面试实践,但筛子本身在同辈强公司不算极罕见</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(对账反例)</td>\n<td>多条员工侧: &ldquo;quick to fire…at the expense of employee development and psychological safety&rdquo;;&rdquo;no training for management…no real criteria to be placed in charge&rdquo;(Glassdoor，4.0/5，282 评）</td>\n<td>autonomy 真给(&ldquo;Tons of autonomy; everyone empowered&rdquo;),但配套是高压 top-down + 快速清退、管理岗无培训 → &ldquo;两档乱&rdquo;的代价侧:发展/心理安全弱、靠淘汰兜底。红旗,非偏离加分</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 9 + 6 + 4 = 19 → round(19/27×100)= <strong>70</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;把成本下行扛在自己表上 + 略欠组织 + 顶尖自驱人&rdquo;能持续跑赢慢而稳的科层防务体系;若 FFP 押错型号导致自费产品卖不动、或&rdquo;两档乱&rdquo;在万人后退化成&rdquo;管理无章 + 高 burnout&rdquo;(员工侧已现端倪),机制会反噬。</li>\n<li><strong>盲区 + 下一步</strong>:决策权边界(一线能独立拍板到哪/什么上浮)、会议机制/纪要(未挖到具体做法,只有&rdquo;flat、mission command&rdquo;口号——需补机制)。Follow up:找在职/前 PM 或工程 lead 验证两条 hypothesis——① FFP 是否真传导到团队级 P&amp;L 问责(还是只在公司层);② &ldquo;two clicks chaotic&rdquo; 是设计还是事后美化的混乱。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:自费造+卖成品的&rdquo;商业化防务&rdquo;模式、Lattice/Arsenal 域主导战略、$30B+ 估值一级市场标的——战略极反共识、大市场,但这部分是战略/产品层,不进组织分。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大 × 战略 反共识 → 按 P0 规则(Score≥67 且大市场/反共识)本应 P0;<strong>但下调至 P1</strong>——最高分那条(FFP/自费)有相当成分是商业模式而非纯&rdquo;人怎么被组织&rdquo;,组织专属机制(决策权/会议)仍有盲区、且员工侧有真实红旗(quick-to-fire、管理无章)。理由:强 Alpha 确凿、值得本周排进,但&rdquo;纯组织&rdquo;那部分尚未挖透到可进 P0。</li>\n</ul>","industry":"机器人/自动驾驶/航天"},{"rank":27,"score":70,"conf":"RICH","dir":"↑","priority":"P0","company":"Sana (Sana Labs)","oneliner":"密度优于数量+全员通才(设计师写码),org当护城河;但已被Workday收购","card":"<h1>Sana (Sana Labs) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。它的&rdquo;组织操作系统&rdquo;=<strong>把组织结构本身当成竞争优势来设计</strong>——每 6 个月围绕&rdquo;top missions&rdquo;整体重画全公司(6/6/6 节奏)+ 顶级通才人才闸 + write-first 会议 + 无专才化。这是<strong>截面 Alpha</strong>(一套当前在跑、能复述、员工侧能对账的机制),不是转向故事。<strong>唯一大前提</strong>:2025 年被 Workday 以 $1.1B 收购、创始人 2026 出任 Workday CAO——下列机制是收购前的稳态运营系统,&rdquo;现在还在原样跑吗&rdquo;需一手确认。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>组织演进/战略-结构</td>\n<td>&ldquo;Every six months we reorganize the entire company around our top missions… There&rsquo;s not a single person at Sana that&rsquo;s not working on the most important thing.&rdquo;(Hellermark, NEA 访谈)</td>\n<td>全公司每 6 个月按&rdquo;missions&rdquo;整体重组(6/6/6:6年/6月/6周节奏),org chart=战略选择而非历史沉积;员工侧对账:&rdquo;priorities can flip overnight, requiring employees to bring their own structure&rdquo;(Glassdoor)。偏离&rdquo;组织图考古学&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We hire the top 0.0001% of the market… all roles are extremely competitive&rdquo;;&rdquo;We have three people at Sana who have Olympic medals&rdquo;;〔事实〕5–10% 受邀面试者拿到 offer(Olivia Elf, VP Ops, Sifted)</td>\n<td>MEH 筛子(missionary&gt;mercenary、excellence、humble)+ 12 问(&ldquo;Would I want 10 of this person?&rdquo;)+ 看私生活(运动员/顶级音乐家)+ &ldquo;可花两年说服一个人加入&rdquo;;不设学历/院校硬约束、只要强通才。偏离&rdquo;用招人数量证明进展&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/会议 + 无专才</td>\n<td>&ldquo;write-first meetings&rdquo;(共享 canvas 先写后议);&rdquo;At Sana, we don&rsquo;t have a single specialist… Our designers write code. Our customer success managers build dashboards from scratch.&rdquo;(Hellermark)</td>\n<td>会议先并行书面收集所有视角再讨论(治&rdquo;声量主导&rdquo;);岗位去专才化逼跨界碰撞。&rdquo;radical candor isn&rsquo;t a buzzword; it&rsquo;s how we all level up&rdquo;(Glassdoor 员工)对账了 candor 落地</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>〔事实〕每个项目有 DRI(Directly Responsible Individual),&rdquo;bias toward fast, reversible decisions… get going then get good&rdquo;(多源转述)</td>\n<td>可逆决策下沉、单点负责制。机制成立但属现代 startup 偏 table-stakes，D 压低</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3:reorg(3×3=9)+ 人才(2×3=6)+ write-first/无专才(2×2=4)=19 → round(19/27×100)=<strong>70</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;高频整体 reorg + 顶级通才&rdquo;能让小团队持续押注最重要的事、不积组织债;赌人才密度高到可承受半年一次的结构震荡。失效条件:reorg 节奏让中层/知识沉淀来不及固化(&ldquo;bring your own structure&rdquo;已是员工成本信号);通才闸在规模化后稀释;<strong>被 Workday 整合后这套自治节奏可能被大公司流程稀释</strong>。</li>\n<li><strong>盲区 + 下一步</strong>:span/层级、激励(分钱机制)缺一手机制,标&rdquo;需补机制&rdquo;(≠平庸)。下一步:找 Sana 现/前员工核&rdquo;6 个月 reorg 是否真整体执行、还是 mission 微调&rdquo;;确认收购后机制存续度;问 DRI 边界(一线能独立拍多大的板)。验证 hypothesis:这是&rdquo;强组织主动演进&rdquo;(高 Alpha)而非&rdquo;reorg 成瘾&rdquo;——目前证据(增长中、$1.1B 退出、常规节奏而非危机)支持前者。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:enterprise AI agent/knowledge 平台,$1.1B 被 Workday 收购——大市场;此处不进组织分。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大(企业 AI)× 战略 反共识(组织结构当护城河)→ <strong>P0</strong>。注:P0 的现实折扣是收购后存续未验证;若只看 standing Alpha(收购前),机制清晰且员工侧对账良好,值得优先 follow up。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":28,"score":70,"conf":"RICH","dir":"↑","priority":"P0","company":"Coinbase","oneliner":"创始人审所有招聘+顶0.1%门槛+Mission First遣散筛人(三方坐实)+默认全透明","card":"<h1>Coinbase — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。它的&rdquo;组织操作系统&rdquo;是一套<strong>codified、可证伪、且有员工侧对账的人才密度机器</strong>——CEO+总裁亲批每一个 offer、&rdquo;extraordinary ability&rdquo;硬门槛、DRI 把最终拍板权下沉到非最资深者、written-first + No-Meeting-Weeks。这些是<strong>截面 standing Alpha(当前在跑、跑了多年)</strong>。2026/5 宣布的&rdquo;五层封顶/15+直接下属/no pure managers/AI-native pods&rdquo;是<strong>转向 Δ</strong>,且<strong>踩在 Q1 巨亏前两天</strong>,是危机时点的补债式重构,默认不进主分。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;Every candidate at Coinbase must have some evidence of extraordinary ability&rdquo;;&rdquo;Brian Armstrong and Emilie Choi approve all new hires&rdquo;,hiring manager 交&rdquo;a one paragraph summary of how candidates have demonstrated extraordinary ability&rdquo;;&rdquo;If you&rsquo;re not a hell yes, you&rsquo;re a no&rdquo;(B. Armstrong, <em>36 Ways…</em> Medium / Talent density at Coinbase blog)</td>\n<td>CEO+President 亲批每一 offer(把最稀缺的高管时间锁在招聘上)+ 每人一段&rdquo;非凡能力&rdquo;举证 + bar-raiser/创始人多重否决 + 录用前 1–2 周 work trial。偏离同类(elite tech 多把招聘授权给 hiring manager)的是&rdquo;创始人级亲批不下放&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(汰换)</td>\n<td>&ldquo;Identify and transition low performers&rdquo;(bottom 5–10%),&rdquo;Clearly communicate to them they are in this category&rdquo;(<em>36 Ways</em>);员工侧:&rdquo;There is a reason why people do not make it more than a year&rdquo;、&rdquo;driven by fear and competition to stay relevant&rdquo;(Glassdoor/Blind 标题与评论)</td>\n<td>明确清退 bottom 5–10% 并当面告知归类 → 主动管出&rdquo;仅合格&rdquo;者;员工侧 revealed 印证高强度/高汰换(非纯口号)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑?</td>\n</tr>\n<tr>\n<td>决策权</td>\n<td>&ldquo;Every project at Coinbase has a directly responsible individual (DRI), who is the ultimate decision-maker… They are typically not the most senior individual involved&rdquo;;用 DRI &ldquo;to push down decision making&rdquo;(Coinbase uses DRIs blog)</td>\n<td>每个项目单一 DRI = 终拍板人、且<strong>刻意不选最资深者</strong>→ 把决策权下沉、避免上浮/共识瘫痪;公开 codified、可被员工对账</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/会议</td>\n<td>&ldquo;Coinbase is a written culture… put their thinking, processes and decision making down on paper&rdquo;,用 Google Docs 公开评论;&rdquo;No Meeting Weeks to create space for deep work&rdquo;(Coinbase 决策/文化 blog)</td>\n<td>written-first 决策(留痕、可异步审查)+ 周期性清空会议周。偏离一般但比口号实;部分属 elite-tech table-stakes</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span(转向)</td>\n<td>&ldquo;five layers max, leaders with 15+ direct reports, no pure managers… player-coach&rdquo;;&rdquo;Rebuilding Coinbase as an intelligence, with humans around the edge&rdquo;;&rdquo;one person teams&rdquo;(engineer+designer+PM)(Armstrong 2026/5/5 全员邮件,Fortune/Fast Company 转引)</td>\n<td>五层封顶、经理强制 15+ span、砍纯管理岗、AI-native pods 管 agent 群。<strong>Δ:宣布未坐实,且与 14%(~700 人)裁员同周、踩在 Q1 巨亏前 2 天</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>(只累计 A 行 Top-3):人才密度-招聘 9 + 人才密度-汰换 6 + 决策权 4 = 19 → 19/27×100 ≈ <strong>70</strong>。Δ 行(span 重构)不进分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;用创始人级筛子+主动汰换把平均人才水位顶高,再用 DRI 下放拍板&rdquo;能既高密又高速。失效点:招聘亲批在万人规模会成瓶颈;&rdquo;fear/competition&rdquo;文化(员工侧)可能从高密滑向恐惧式内耗。</li>\n<li><strong>盲区 + 下一步</strong>:激励(维度5)、康威(维度7)挖到的机制薄(需补);Δ 重构的<strong>落地证据缺失</strong>(标&rdquo;待验证落地&rdquo;,C≤2)。Follow up:① 验 5 层/15-span/no-pure-manager 6–12 个月后是否真落地、有无回弹(第三方/员工侧);② 验&rdquo;CEO+总裁亲批每 offer&rdquo;在当前规模是否仍真执行(对账招聘漏斗)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:加密交易所龙头、2026/5 押注&rdquo;AI-native + 单人团队&rdquo;(战略层,行业当下趋同、偏共识);Q1&lsquo;26 营收 14 亿、YoY −31%、GAAP 净亏 3.94 亿——重构在逆风期发起。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大(crypto/fintech) × 战略 偏共识(行业齐刷 AI-native)→ <strong>P0</strong>(Score≥67 + 大市场)。但注意主分来自<strong>standing Alpha</strong>(招聘/汰换/DRI/written),不是那条危机时点的 Δ 重构——后者按&rdquo;诊断三问&rdquo;更像<strong>弱势补债</strong>(危机/失败后被迫、与裁员同周),先观察落地再加分。</li>\n</ul>","industry":"金融/支付/加密"},{"rank":29,"score":70,"conf":"RICH","dir":"↑","priority":"P0","company":"Tesla","oneliner":"极宽span+无头衔+5步反官僚算法(删需求/删件),对车厂同类真反常","card":"<h1>Tesla — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头看。Tesla 的&rdquo;组织操作系统&rdquo;是一台<strong>反科层引擎</strong>——在一家 ~12.5 万人的硬件制造商身上,把信息流、决策权、需求所有权三件事都用<strong>可证伪、得罪管理层、SEC 存档的明文机制</strong>强行压平。这是真正的<strong>截面 Alpha</strong>(同类=Ford/GM/Toyota 这类大型车企/重制造公司,默认深层级科层),不是转向故事。但 standing 上带明显组织债(见盲区),不掩盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/决策权</td>\n<td>&ldquo;Anyone at Tesla can and should email/talk to anyone else according to what they think is the fastest way to solve a problem… <strong>Any manager who attempts to enforce chain of command communication will soon find themselves working elsewhere.</strong>&ldquo;(Musk 内部信《Communication Within Tesla》,2018,经 SEC 8-K 存档)</td>\n<td>取消&rdquo;逐级汇报&rdquo;为默认协作路径;一线可直接找跨部门 VP/CEO、无需任何人许可;<strong>违规的是&rdquo;维护层级的经理&rdquo;——惩罚对象是管理层、烧掉自己的控制结构</strong>。同类大型车企默认深科层 → 极反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/需求所有权</td>\n<td>&ldquo;Question every requirement. Each should come with <strong>the name of the person</strong> who made it. You should never accept that a requirement came from a department… the person putting forth the requirement must take responsibility.&rdquo;(The Algorithm,五步;Isaacson 传记)</td>\n<td>每条工程需求必须挂<strong>具名个人</strong>、可被追问/废除;&rdquo;删件→简化→提速→自动化&rdquo;固定顺序、跨 Tesla+SpaceX 反复跑。把&rdquo;流程/部门&rdquo;挡箭牌作废 → 对抗&rdquo;联合负责=无人负责&rdquo;病征</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/会议机制</td>\n<td>&ldquo;Excessive meetings are the blight of big companies… <strong>It is not rude to leave, it is rude to make someone stay and waste their time.</strong>&ldquo;(Musk 致全员邮件,2018,CNBC 核实)</td>\n<td>授权员工中途退出无价值会议/挂断电话;砍频繁会、紧急事项解决后会议频率即降。同类大公司会议正统相反 → 反常,但单条邮件、落地度弱于前两条</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;I&rsquo;m looking for evidence of <strong>exceptional ability</strong>… Tell me about some of the most difficult problems you worked on and how you solved them.&rdquo;(Musk 反复在多场合)</td>\n<td>招聘筛子=不看学历/简历,看&rdquo;亲历解过的最难问题&rdquo;的细节深度(细节露馅=辨真伪)。同类靠学历/资历门槛 → 偏离,但属硅谷常见招法、非独有</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(对账/红旗)</td>\n<td>〔事实〕员工侧:Tesla WLB 评分 2.8/5;多名现/前员工称&rdquo;culture of fear&rdquo;、&rdquo;每个部门都严重缺人、刚好在崩溃线上&rdquo;(Glassdoor/Blind 聚合)</td>\n<td>扁平+&rdquo;email anyone&rdquo;在落地端部分由<strong>恐惧驱动</strong>而非心理安全;说明 standing 有组织债</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 9 + 6 + 4 = 19 → round(19/27×100)= <strong>70</strong>。最强单条(信息流明文 + SEC 存档 + 自缚式惩罚管理层)S=9 撑起主分。</li>\n<li><strong>在赌什么 / 何时失效</strong>:赌&rdquo;信息无损快流 + 个人具名担责 + 砍科层&rdquo;能换取在大体量制造业里维持创业速度。<strong>失效条件</strong>:① 当扁平靠恐惧而非授权维持时,&rdquo;敢说真话&rdquo;会塌成&rdquo;不敢报忧&rdquo;(护栏:judge 失效模式①表演式 costly);② 信息全汇向 Musk 一人 → 单点瓶颈(2018 报道 29 名高管直接汇报)。</li>\n<li><strong>盲区 + 下一步(组织债)</strong>:<strong>高管出走潮</strong>(2024–2026:CFO、超充全队、电池/Optimus/北美欧洲运营负责人接连离开)——是<strong>弱组织被迫流失</strong>还是 Musk 主动清退的一部分?需诊断。下一步:找在职/离职一线工程师对账&rdquo;email anyone&rdquo;是否真能无惩罚直达 Musk、被否后有无报复;查&rdquo;具名需求&rdquo;是否真在工程评审里跑(而非传记叙事)。这两条坐实则 C 可上 3、Alpha 更硬;证伪则降为&rdquo;表演式扁平&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:Robotaxi/FSD all-in、Optimus 人形机器人、垂直一体化电池/制造——战略上极反共识、市场极大;但这些进战略层,不抬组织分。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大 × 战略 反共识 → <strong>P0</strong>。注:主分由 SEC 存档的明文机制撑起(revealed 它&rdquo;被发出且自缚&rdquo;),但&rdquo;扁平是否真无恐惧落地&rdquo;待验证落地——P0 的同时,follow-up 必须先验恐惧文化这条债,别把&rdquo;会写 costly 备忘录&rdquo;直接当&rdquo;组织已优异&rdquo;。</li>\n</ul>","industry":"机器人/自动驾驶/航天"},{"rank":30,"score":70,"conf":"RICH","dir":"?","priority":"P0","company":"Oddity Tech (NASDAQ: ODD)","oneliner":"自我定位科技公司非美妆,内嵌生物科技lab+共享技术栈,维度8框架真但机制待挖","card":"<h1>Oddity Tech (NASDAQ: ODD) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得看。它的&rdquo;组织操作系统&rdquo;是<strong>一家伪装成美妆公司的以色列国防军式 AI 研发组织</strong>——把 40% 人头压在 Tel Aliv 技术后台、靠连环 acqui-hire 把 IDF 精英部队/数学奥赛奖牌团队整建制买进消费公司，同时把每个品牌切成自带 CEO、自带财务/供应链/营销的独立单元（只共享技术+数据）。这是<strong>截面 Alpha</strong>（人才密度+战略-结构是当下在跑的结构事实），不是转向故事；但带<strong>落地/诚信 ⚠️</strong>（做空报告 + 员工侧低薪抱怨 + 关键 acqui-hire 创始人离职）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>〔事实〕&rdquo;recruits from the Israeli Defense Forces&rsquo; best technology units. Technologists comprise over 40% of its global headcount&rdquo;（S-1 招股书, 转引 CNBC/NBC, 2023）；Fionic 团队&rdquo;served in…Unit 8200 and Matzov…won medals in premier global math competitions including IMO and IMC&rdquo;（ODDITY 新闻稿, 2025-01）</td>\n<td><strong>谁</strong>=IDF Unit 81/8200/Matzov 出身、IMO/IMC 奖牌得主；<strong>怎么</strong>=连环整建制 acqui-hire（Voyage81 2021、Revela 2023、Fionic 2025）把现成精英 AI 团队买进；<strong>多少</strong>=技术人占全员 &gt;40%。美妆/消费公司的 table-stakes 是外包技术、堆营销人头——把军方级 AI 团队当核心资产，对<strong>同类(消费/美妆)极端反常</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/所有权</td>\n<td>&ldquo;When we launched Spoiled Child, I decided to split the brands completely. Each brand has its own leadership team, from the CEO role and down… Finance, supply chain, product development and marketing are completely separated…and duplicated… The only thing that is shared is the technology backbone in Tel Aviv&rdquo;（Oran Holtzman, Glossy 访谈）</td>\n<td><strong>谁</strong>=每个品牌一个独立 CEO 带全套班子；<strong>怎么</strong>=刻意<strong>重复</strong>财务/供应链/营销（不做共享中台）、只把技术+数据收成唯一共享层；<strong>多少</strong>=已复制到 SpoiledChild、METHODIQ、Oddity Labs。偏离&rdquo;~265 人小公司必做 shared-services 省钱&rdquo;的共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(维度9)</td>\n<td>〔事实〕Voyage81(2021,影像)→Revela/Oddity Labs Boston(2023, $76M+$25M, 分子发现)→Fionic(2025, fintech-AI) 三次 acqui-hire 各自长出一个技术纵队（多源新闻稿/Glossy/BeautyMatter）</td>\n<td><strong>怎么</strong>=用&rdquo;买整支精英团队→开一个新技术纵队&rdquo;作可复述的扩张机制，而非内部招聘慢爬；表现好/增长期主动做（非危机补债）→ 强组织主动演进</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/诚信 ⚠️</td>\n<td>〔事实〕NINGI 做空报告(2024-05)指&rdquo;deceptive billing&rdquo;、数百起未披露诉讼、订阅难退；CEO 回应仅称&rdquo;super small fraction of users who didn&rsquo;t fully read up&rdquo;。员工侧 Glassdoor 两极、&rdquo;pays pretty low for strategic roles&rdquo;、蓝领抱怨管理</td>\n<td>这是<strong>方向红旗/落地对账</strong>：增长机制可能靠 dark-pattern 订阅而非纯组织优异；CEO 自述&rdquo;提速/教育用户&rdquo;=stated。<strong>不计入组织主分</strong>，作 direction ↓ 与落地未验证记号</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3：人才密度 S=3×3=9 + 战略-结构 S=3×2=6 + 组织演进 S=2×2=4 = <strong>19/27×100 ≈ 70</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;把 AI 研发深度做成组织核心资产 + 品牌完全独立不省中台成本&rdquo;能持续跑赢营销驱动的美妆同行。失效条件：① 重复职能在规模化后变成成本黑洞；② acqui-hire 来的明星留不住（Revela 创始人 Dr. Evan Zhao 已离职，是 retention 警讯）；③ 若增长实为订阅 dark-pattern（NINGI），则&rdquo;组织优异&rdquo;的归因被推翻。</li>\n<li><strong>盲区 + 下一步</strong>：<strong>会议/决策机制、创始人招人筛子</strong>两条定向子查询<strong>查无</strong>（信息盲区，非平庸）——找一手长访谈/前员工核实&rdquo;品牌 CEO 到底有多大独立拍板权、坏消息怎么上行&rdquo;。验证 hypothesis：品牌独立是真 P&amp;L 自治还是名义切块？follow up：前 Revela/Voyage81 成员（验 acqui-hire 留存与自治度）、Tel Aviv 技术团队离职者（验&rdquo;军方级人才密度&rdquo;是否真转化为产出而非招牌）。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：&rdquo;AI-native 垂直整合美妆&rdquo;战略反共识、市场大；但 NINGI 诉讼/订阅指控是真实下行风险，股价 -67%（1 年）。</li>\n<li><strong>优先级</strong>：组织 70 × 市场 {大(全球美妆+wellness)} × 战略 {反共识} → <strong>P0</strong>。理由：人才密度是 revealed 硬事实(连环 M&amp;A)而非口号，截面 Alpha 扎实，市场+战略均强；但<strong>P0 带星</strong>——落地/诚信红旗(NINGI、低薪、明星离职)与&rdquo;品牌独立&rdquo;的 stated 成分须一手接触先证伪再加仓注意力。</li>\n</ul>\n<p><em>Sources</em>: <a href=\"https://www.glossy.co/beauty/oddity-ceo-oran-holtzman-there-are-only-3-reasons-why-a-dtc-company-should-expand-to-stores/\">Glossy 访谈</a> · <a href=\"https://investors.oddity.com/news-releases/news-release-details/oddity-acquires-intellectual-property-and-elite-ai-research-team\">ODDITY 新闻稿(Fionic/elite AI)</a> · <a href=\"https://www.cnbc.com/2023/06/23/il-makiage-creator-oddity-has-filed-to-go-public.html\">CNBC S-1/IDF</a> · <a href=\"https://beautymatter.com/articles/oddity-acquires-biotech-start-up-revela-for-76-million\">Revela/Oddity Labs</a> · <a href=\"https://www.cnbc.com/2024/05/21/oddity-tech-short-seller-allegations.html\">CNBC NINGI 做空</a> · <a href=\"https://thebearcave.substack.com/p/problems-at-oddity-tech-odd\">Bear Cave</a></p>","industry":"医疗/生命科学"},{"rank":31,"score":70,"conf":"RICH","dir":"↑","priority":"P0","company":"DoorDash","oneliner":"WeDash全员含CEO下场跑单+全员full context,机制软偏table-stakes","card":"<h1>DoorDash (Tony Xu) — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得看。组织 OS = <strong>&ldquo;在最低层级的细节上运营 + 高问责 + 速度优先于平衡&rdquo;</strong>——靠一套 costly 的招人筛子、强制全员(含 CEO)下场送单、和&rdquo;先报坏消息&rdquo;的会议格式,把高管和工程师反复按回一线。这些是<strong>当前在运行、跑了多年、可复述的截面 Alpha</strong>(非转向故事)。注意:这是真实可证的偏离,但员工侧的高 turnover 是它的下行红旗。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>一号位亲历</td>\n<td>&ldquo;every DoorDash employee also completes deliveries each year&rdquo;;WeDash/WeSupport 2022 <strong>99.9% salaried 参与</strong>,COVID 后<strong>重启</strong>,送单收入捐公益、<strong>credits 写进年度 review</strong>(DoorDash 官网 about.doordash.com;Fox Business)</td>\n<td>全员(含 CEO/工程师)每年≥4 单,绑进绩效审查 → 把&rdquo;理解一线&rdquo;从授权变成强制亲历;同辈(Uber Eats/Instacart)无此组织级强制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>〔事实〕给候选人&rdquo;$20 and one workday to acquire 100 new customers&rdquo;;要&rdquo;general athletes over experience&rdquo;、拒 FAANG 默认;明列 5 特质含&rdquo;bias for action&rdquo;&ldquo;operating at the lowest level of detail&rdquo;(officechai;paraform.com)</td>\n<td>用实地拉新替代可被刷的 case 面试,主动筛掉&rdquo;练得很熟的名校/大厂&rdquo;型 → 反&rdquo;按履历招&rdquo;共识、得罪人、可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流</td>\n<td>&ldquo;make sure that they start by presenting the <strong>low-lights</strong>&rdquo;;&rdquo;problem solving mode, rather than problem hiding mode&rdquo;;&rdquo;a pretty strong writing culture, we tend to start meetings by reading documents&rdquo;(Velocity Memo;Stanford GSB)</td>\n<td>会议格式自缚:report-out 先讲坏消息、静默读文档开场 → 制度化让坏消息无损上行;比同辈&rdquo;报喜&rdquo;默认反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/所有权</td>\n<td>&ldquo;we call that the Directly Responsible Individual, a DRI&rdquo;;&rdquo;Cross-functional work only gets done if you have a single DRI&rdquo;;&rdquo;Give people a deadline, and you can hold them accountable&rdquo;(Velocity Memo)</td>\n<td>每件跨职能事 = 单一具名 owner + 死线 → 反&rdquo;联合负责=无人负责&rdquo;;但 DRI 在科技业已较普及,对同辈偏离有限</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>文化代价(对账)</td>\n<td>〔员工侧〕Glassdoor/Blind:&rdquo;intense&rdquo;,&rdquo;high turnover&rdquo;,&rdquo;appallingly high attrition&rdquo;,多数 1–2 年走;Built In 2026 官方亦自述&rdquo;optimizes for speed&hellip; <strong>over predictability and balance</strong>&ldquo;(Glassdoor;Built In)</td>\n<td>高 bar+精简编制的真实代价 = 高流失;非 cheap talk(官方/员工双侧互证),但留存是下行风险</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 Alpha 行 Top-3 S=D×C:WeDash 9 + 招人 6 + low-lights 会议 4 = 19 → round(19/27×100)=<strong>70</strong>。DRI(2)与&rdquo;文化代价&rdquo;(下行)不进 Top-3。<strong>在赌什么/何时失效</strong>:赌&rdquo;把所有脑力工作者反复按回一线 + 高问责&rdquo;能持续战胜平庸引力;<strong>代价已显形</strong>(高 turnover、&rdquo;1.5–2 人的活&rdquo;)——若一线人才市场转紧或增长放缓,精简+高压模型可能反噬留存。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span(D4)、康威(D7)无机制可查,标&rdquo;需补机制&rdquo;≠平庸。Follow up:核 WeDash 当下(2024–25)是否仍 99.9% 落地、credits 在 review 的真实权重;向近 2 年离职者验证&rdquo;low-lights 会议&rdquo;是真坦诚还是表演式问责。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:已实现首个 GAAP 全年盈利(2024)、GOV $102B(2025,+27%)、Tony Xu 任行业整合者(收 Wolt/SevenRooms/Deliveroo 路线)——战略激进,但属战略层、不进组织分。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大(本地商业/外卖+广告,数百亿 GOV)× 战略 中性偏整合 → <strong>P0</strong>:截面 Alpha 可信且落地(WeDash 99.9%、员工侧互证),大市场,值得放下手头的事去看一手。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":32,"score":70,"conf":"RICH","dir":"↑","priority":"P0","company":"Ramp","oneliner":"前60人1/3前创始人+借债帮员工买founder股,机制可证","card":"<h1>Ramp — Why attention?   ·   Score 70 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>:值得放下手头去看。Ramp 的&rdquo;组织操作系统&rdquo;是<strong>用极端人才密度 + 内部 AI 杠杆,把营收做大但人头压着不长</strong>——筛子是&rdquo;做过活的 spike 型 super-IC、几乎不外招经理、看 slope 不看 intercept、趁没人抢就抢顶尖年轻人&rdquo;。这是<strong>截面 Alpha</strong>(当前在跑、第三方可核验:13 名 IOI/IMO 奥赛奖牌得主、50% payroll 投 R&amp;D、$1B+ ARR 而 headcount 增长温和),不是转向故事。强度有员工侧&rdquo;对账&rdquo;佐证(高门槛是真在付代价)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We very, very rarely hire managers directly&hellip; we prefer finding people who have done the work&rdquo;;&rdquo;Look for slope over intercept. Every time&rdquo;(Glyman, Ramp blog/antoinebuteau);&rdquo;hire the top of the class at MIT as a freshman&hellip; or convince someone to drop out&rdquo;(worldofdaas/搜索摘要);〔CTO Karim 一年只有一个 OKR:hire the best engineers in the world〕(themoatnewsletter)</td>\n<td>招&rdquo;做过活的 spike super-IC&rdquo;,几乎不直招经理层;按成长斜率而非简历品牌;趁无人竞争抢 MIT 大一/劝退学。排他(踢掉横向经理与大厂简历党)、可证伪、反 fintech 同辈(Brex 等大量招资深经理)。第三方核验:13 名奥赛奖牌得主在职</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励/效率</td>\n<td>〔$1B+ ARR、headcount &ldquo;scaling more modestly&rdquo;、50% of payroll on R&amp;D〕(McKinsey/搜索);&rdquo;I don&rsquo;t think there&rsquo;s a function at Ramp that doesn&rsquo;t use AI in some way&rdquo;(Glyman, ramp.com/blog);〔会计岗没随增长加人〕</td>\n<td>用内部 AI 当杠杆,把营收/人(getlatka 口径 ~$437K/人)与 R&amp;D 占比推高、压住人头——奖&rdquo;用更少人解更大问题&rdquo;。revealed:营收/人、R&amp;D% 第三方可核验</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/层级</td>\n<td>&ldquo;Three engineers, one designer, one PM, three months, and they hit it out of the park&rdquo;(AP 产品,themoat);〔Visa 集成 50 天、2025 年发 270+ feature〕</td>\n<td>小自治 pod 直接把一个产品从想法带到出货,不层层上浮;出货量第三方可见</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>一号位自觉</td>\n<td>&ldquo;You can decide to fix your flaws, or you can design your company to be performant in spite of them. I chose the latter&rdquo;;&rdquo;We count days because it&rsquo;s a forcing function&hellip; are we shipping like a company that&rsquo;s 1,866 days old?&rdquo;(Glyman, 20VC/stormy)</td>\n<td>围绕自身缺陷招&rdquo;operational legend&rdquo;做 triage;按&rdquo;公司第 N 天&rdquo;做节奏闸,逼速度。具体、可证伪、反&rdquo;宏大愿景&rdquo;套话</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(对账)</td>\n<td>〔Glassdoor/Blind:60+ 小时/周、部分岗位约 1 年走人、&rdquo;cold culture where belonging feels conditional&rdquo;、&rdquo;chaotic&hellip; the ones who stick around get used to it&rdquo;〕</td>\n<td>员工侧与&rdquo;高门槛 super-IC&rdquo;自述一致(不矛盾)→ 证明门槛是真在付代价,非表演;代价=强度/留存</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 9(人才密度)+6(AI 效率)+4(节奏闸) = 19 → round(19/27×100)=<strong>70</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;少而精的 super-IC + AI 杠杆&rdquo;能持续跑赢&rdquo;多而平庸 + 控成本&rdquo;;若顶尖年轻人池被同辈抢光、或高强度文化把留存压垮(部分岗 ~1 年走人已是预警),人才密度优势会回吐。</li>\n<li><strong>盲区 + 下一步</strong>:<strong>会议/书面备忘(memo)机制只有标题没挖到逐字机制</strong>(20VC&rdquo;The Memo&rdquo;那期需听原音坐实&rdquo;读什么/谁拍板&rdquo;);激励的&rdquo;回报来源/公平机制&rdquo;(股权 vs 单次)未挖到机制层。Follow up:① 找在职/前 super-IC 核实&rdquo;无经理层&rdquo;是否随 3000+ 人规模回弹;② 验证 &ldquo;the memo&rdquo; 决策会的真实格式。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:对标 Amex/Expensify 的 zero-touch finance、interchange 商业模型——大市场;产品打法偏共识(同辈都在做 AI fintech),真正的非共识在<strong>组织</strong>(人才密度筛子 + 人头纪律),不在产品。</li>\n<li><strong>优先级</strong>:组织 70 × 市场 大(企业支出/fintech) × 战略 组织侧反共识 → <strong>P0</strong>:组织 Score≥67 且大市场,放下手头看;主看点是&rdquo;人才密度 + AI 杠杆&rdquo;这套 standing Alpha 能否扛过规模化与高强度留存。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":33,"score":67,"conf":"RICH","dir":"↑","priority":"P0","company":"ByteDance (字节跳动)","oneliner":"Context-not-Control+OKR全员透明+无title无1对1,机制具体长跑,Alpha厚","card":"<h1>ByteDance (字节跳动) — Why attention?   ·   Score 67 · 置信度 RICH · 优先级 P0</h1>\n<p><strong>一句话定性</strong>：值得看——这是<strong>截面 Alpha</strong>（不是只会讲转向故事的公司）。它的&rdquo;组织操作系统&rdquo;是 <strong>Netflix 式 &ldquo;Context, not Control&rdquo; 落到制度层</strong>：全公司 OKR（含 CEO 自己）公开互相对齐、用&rdquo;飞阅会&rdquo;静默读文档取代发言式开会、为 AI 研究敢拆掉自家标志性的 OKR 考核——一套对&rdquo;十万人中国大厂&rdquo;同辈极反常、且员工可对账的在跑机制。2024 年 CEO 公开自陈&rdquo;大公司病&rdquo;是叠加的 <strong>Δ 转向标签，不下扣这批 standing Alpha</strong>。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/透明</td>\n<td>&ldquo;可以直接在系统中查看任意同事的 OKR，即便是张一鸣的 OKR 也是对所有员工公开的&rdquo;；&rdquo;管理层的 OKR 对下属员工保持公开…不是自上而下地分解，而是大家互相之间自己对齐&rdquo;（新浪/品玩转述张一鸣及员工口径）</td>\n<td>全员 OKR 全公开（含一号位）、横向自对齐而非逐级分解 → 员工入职即可对账、互证；偏离大厂&rdquo;只见同组/直属上级&rdquo;的逐级可见共识。<strong>回弹信号</strong>：员工称改季度后&rdquo;OKR 流于形式&rdquo; → C 封 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/会议</td>\n<td>〔事实〕&rdquo;会议形式没有 PPT…会议前有 15~20 分钟的默读环节…在飞书在线文档上写实时评论…将以往串行的会议变成了并行，实现了会议异步&rdquo;（人人都是产品经理/数英等多源）</td>\n<td>飞阅会：会前共享议程文档→集体静默读 15–20min→划词评论当场 PK→@负责人留待办；禁 PPT。把&rdquo;谁拍板/信息怎么流/几层&rdquo;一次显影；偏离&rdquo;PPT 汇报式开会&rdquo;同辈共识。具体、可证伪、员工可对账、长期在跑</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构/演进</td>\n<td>〔事实〕&rdquo;AI Lab 整体并入 Seed&rdquo;；吴永辉、朱文佳&rdquo;均直接向 CEO 梁汝波汇报&rdquo;；Seed &ldquo;取消（Edge 项目的）季度 OKR 和半年评估，以支持长期研究&rdquo;（21经济/财联社/搜狐转述全员会）</td>\n<td>为追&rdquo;智能上限&rdquo;把 AI 提为一号位直管、压扁汇报层级，并敢对核心研究<strong>关掉自家标志性 OKR 考核</strong>护长 horizon → 战略反推结构；偏离大厂&rdquo;全员 OKR+层层汇报&rdquo;。属强组织在增长期主动演进（非危机补债）。新、尚未稳态 → C 封 2</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;招能把团队平均水平再拉高一点的人&rdquo;；&rdquo;延迟满足感程度在不同量级的人没法有效讨论问题&rdquo;；早期面试爱问&rdquo;你最大的缺点是什么&rdquo;（搜狐/界面/知乎转述张一鸣）</td>\n<td>招人筛子=用&rdquo;延迟满足+直面缺点的坦诚&rdquo;而非履历筛、目标是抬高团队均值密度。是真筛子但偏理念、二手转述、机制细节较软</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>真相上行(Δ)</td>\n<td>&ldquo;该有的大公司病全有了&rdquo;；标准滑坡&ldquo;&lsquo;还行&rsquo;变成&rsquo;很好&rsquo;…&rsquo;很不好&rsquo;变成&rsquo;还不错&rsquo;&ldquo;；〔事实〕一个需求评估&rdquo;1000 人天&rdquo;实际&rdquo;15 人天&rdquo;；字节效率&rdquo;比优秀团队低 30~50%&rdquo;；2024 关键词&rdquo;始终创业，逃逸平庸的重力&rdquo;（投中/经观/腾讯转述梁汝波全员会）</td>\n<td>一号位 costly、具体、自我归罪地点名大公司病并宣布改——真相上行 ↑ 的强信号。但属 <strong>Δ（在转向）非截面 Alpha</strong>；&rdquo;修好了&rdquo;仅 CEO 自述、无独立 revealed → 不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score（只累计 A 行 Top-3）</strong>：6 + 6 + 6 = 18 → round(18/27×100) = <strong>67</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;高密度人才 + 充分 context − 控制&rdquo;能在十万人规模上不塌成混乱；当人才密度被稀释、或 OKR 退化成 KPI 式打卡（员工已抱怨&rdquo;流于形式&rdquo;）时机制空转，透明就只剩形式。</li>\n<li><strong>盲区 + 下一步</strong>：层级/span 的真实数字（一线到 CEO 几层、经理带几人）未挖到具体机制；2024 大公司病整改的<strong>落地证据缺</strong>（只有 CEO 自述、无第三方/员工侧&rdquo;真提速且没回弹&rdquo;对账）。Follow up：找 2024–2025 在职/离职员工对账&rdquo;飞阅会是否仍真在跑 vs 退化&rdquo;、&rdquo;减层是否真发生&rdquo;；验证 hypothesis：<strong>Seed 那套&rsquo;关 OKR 护长研究&rsquo;是稳态还是一阵风</strong>。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：AI all-in（豆包/Seed 追&rdquo;智能上限&rdquo;）属反共识战略大注——组织上同样有信号，二者罕见地同高。</li>\n<li><strong>优先级</strong>：组织 67 × 市场 大（消费互联网/社交/AI 平台）× 战略 反共识（AI 重注）→ <strong>P0</strong>：standing Alpha 数得出三条在跑机制、且押在大牌桌上，放下手头的事去看；但带&rdquo;待验证落地&rdquo;的 2024 Δ，验证其整改是真减层还是口号。</li>\n</ul>\n<p><strong>主源</strong>：<a href=\"https://finance.sina.com.cn/tech/2021-04-01/doc-ikmxzfmk0492819.shtml\">新浪/品玩 OKR 公开</a> · <a href=\"https://www.digitaling.com/articles/259468.html\">飞阅会机制(数英)</a> · <a href=\"https://www.chinaventure.com.cn/news/78-20240131-379552.html\">梁汝波全员会(投中网)</a> · <a href=\"https://www.21jingji.com/article/20250221/herald/fb534a4b5c3bababe91303fca1daf866.html\">Seed 并入/直接汇报(21经济)</a> · <a href=\"https://m.sohu.com/a/905808807_121123748\">张一鸣人才观(搜狐)</a></p>","industry":"媒体/娱乐/游戏"},{"rank":34,"score":67,"conf":"RICH","dir":"↑","priority":"P1","company":"Amazon","oneliner":"two-pizza/STL所有权+官僚信箱减层,强组织主动演进","card":"<h1>Amazon — Why attention?   ·   Score 67 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得看,但理由是<strong>截面 Alpha</strong>——一套运行 20+ 年、可复述、被前高管/第三方反复对账的&rdquo;组织操作系统&rdquo;(6-pager 静读会 + single-threaded leader/two-pizza + Bar Raiser),不是 2024–25 那波 reorg 故事。它的反平庸主要对<strong>同类(微软/谷歌/Meta/苹果等巨头)</strong>成立:同体量公司默认 PPT 推销、决策上浮、招聘无跨组否决权;Amazon 把这些反过来做并固化成机制。Δ 层(砍中层/裁员/&rdquo;世界最大创业公司&rdquo;)是<strong>被迫补 accreted bloat 的转向</strong>,单独标、不加分也不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/决策会</td>\n<td>&ldquo;executives will bluff their way through the meeting as if they&rsquo;ve read the memo… you&rsquo;ve got to actually carve out the time for the memo to get read&rdquo;;&rdquo;PowerPoint is a sales tool. Internally… you&rsquo;re truth-seeking… A memo is the opposite&rdquo;(Bezos, CNBC 2018)</td>\n<td>禁 PPT;会议前 30 分钟全员<strong>静默读 6 页叙事备忘</strong>再讨论 → 强制 truth-seeking、消除&rdquo;装读过&rdquo;的虚假对齐。巨头同类默认用 pitch deck，此为明确反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/span</td>\n<td>〔事实〕two-pizza team(≤约10人)演化为 <strong>single-threaded leader</strong>:一人对一个 initiative 100% 负责且<strong>有拍板权</strong>(Working Backwards / AWS Exec Insights, 2024 仍在用)</td>\n<td>&ldquo;一个 owner 一条主线 + 团队规模设上限&rdquo;,决策权下沉到能端到端交付的人;反&rdquo;联合负责=无人负责&rdquo;与决策上浮</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>Jassy:Bar Raiser 是 &ldquo;one of Amazon&rsquo;s crown jewels&rdquo;;&rdquo;every new hire should raise the bar&rdquo;(自 1999,Rick Dalzell 创)(AWS Careers)</td>\n<td>每场招聘配<strong>受训 Bar Raiser</strong>,对候选人有<strong>全程否决权</strong>、独立于用人经理 → 制度化&rdquo;只招抬高平均水位的人&rdquo;;同类罕有这种跨组一票否决筛子</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(Δ)</td>\n<td>&ldquo;The reality is that the team and I hate bureaucracy&rdquo;;&rdquo;Having fewer managers will remove layers and flatten organizations&rdquo;(Jassy 内部信);&rdquo;Builders hate bureaucracy… we can sure as heck eliminate it&rdquo;(2025 致股东信)</td>\n<td>IC:manager 比例 Q1&lsquo;25 提 ≥15%(已达成);&rdquo;Bureaucracy Mailbox&rdquo; 收 ~1,500 封、改 ~455 个流程;伴 10/2025 裁 14,000(或达 30,000)企业岗</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 = 6+6+6 = 18/27×100 = <strong>67</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;写作纪律+小团队 owner+严筛&rdquo;能在巨头规模下保住 Day-1 速度;若 reorg 反复、层级回弹或 Bar Raiser 在压人头时被绕过,Alpha 会空心化。</li>\n<li><strong>盲区+下一步</strong>:激励维度(为什么被激励/回报来源)、信息坏消息上行机制本轮未挖到具体机制——<strong>需补机制</strong>。Δ 那波&rdquo;变敏捷&rdquo;目前是 <strong>stated + 自引数据</strong>(15%/455 等是公司侧口径),<strong>待验证落地</strong>:找 Blind/前员工对账&rdquo;层级真减了还是换了名目&rdquo;、morale 是否回弹(CNBC 11/2025 已报 morale shaken)。验证 hypothesis:standing Alpha 在 AI 时代裁员压力下是否仍真实运行。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AWS/AI 资本开支与 all-in,属战略层、不驱动组织分。</li>\n<li><strong>优先级</strong>:组织 67 × 市场 大 × 战略 共识(砍中层/裁员近年已是巨头 table-stakes,非反共识)→ <strong>P1</strong>:排进本周看,但<strong>看的是那套 standing Alpha 机制</strong>,不是裁员故事;Δ 是被迫补债的转向,别高估。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":35,"score":63,"conf":"RICH","dir":"↑","priority":"P1","company":"Levels (Levels Health, Inc.)","oneliner":"全员会公开YT+公开forcing-functions手册+异步规则,具体且自曝;但远程系table-stakes","card":"<h1>Levels — Why attention?   ·   Score 63 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Levels 的&rdquo;组织操作系统&rdquo;是 <strong>radical-transparency × async-memo × 单一 DRI 拍板</strong> 三件套——把&rdquo;报喜不报忧/会议拍脑袋/决策上浮&rdquo;三种平庸引力同时反着做。这是<strong>截面 Alpha</strong>（机制都在运行、稳态多年、可复述），不是转向故事；同类（~120 人消费代谢健康/CGM 创业公司）几乎没人这么干。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/透明</td>\n<td>&ldquo;monthly emails…sharing…product features and roadmap, <strong>financials</strong>, content, hiring…published <strong>as close to unfiltered as possible</strong>&ldquo;（仅删 NDA），&rdquo;Monthly publishing on the 15th: <strong>no exceptions</strong>&ldquo;；一位 VC GP 当面警告 &ldquo;you are being overly disclosive…I don&rsquo;t think it is in your best interest&rdquo;（Sam Corcos, &ldquo;Why Levels is Building in Public&rdquo;, Medium）</td>\n<td>自 2019/08 起把投资人月报（含财务/招聘/路线图）公开发布、仅 12 个月延迟；&rdquo;15 号无例外&rdquo;=自缚式承诺；公开档案=<strong>第三方可核验的 revealed 证据</strong>；得罪了投资人正统。偏离消费健康同类&rdquo;对外只发 PR&rdquo;的默认</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/会议</td>\n<td>&ldquo;An ideal decision-making meeting…should have <strong>three people</strong>&ldquo;，&rdquo;we <strong>document or record everything</strong>&ldquo;（Loom）；&rdquo;decisions <strong>can&rsquo;t be made by committee</strong>…you need somebody willing to take the risk&rdquo;，&rdquo;that&rsquo;s…what our <strong>DRI database</strong> is&rdquo;（&rdquo;How We Work Without Meetings&rdquo;, Levels；First Round / 播客）</td>\n<td>同步会默认杀掉、&gt;3 人几乎不开、全程留痕；每个决策在 <strong>DRI 数据库</strong>里挂唯一具名 owner + disagree-and-commit；工程师约 6–8 会/月。偏离&rdquo;决策上浮、联合负责=无人负责&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度/span</td>\n<td>&ldquo;I personally have <strong>four</strong> [EAs]…we have maybe <strong>20</strong> in the whole company&rdquo;；筛子是 proactivity + &ldquo;the <strong>playback</strong>…&rsquo;Repeat back to me how you will do this task&rsquo;&ldquo;（Loom）；&rdquo;we…<strong>rematch maybe 30 percent</strong> of our EAs&rdquo;（Tim Ferriss #694 transcript）</td>\n<td>用 ~20 个 EA/委派把 span 撑宽、个人产出杠杆化；招人筛&rdquo;减你工作量 vs 给你制造工作&rdquo;+ playback 复述测试；30% 主动 rematch=keeper-test 式汰换。偏离&rdquo;靠加人头证明进展&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3（三个不同维度）：9 + 4 + 4 = 17 → round(17/27×100)=<strong>63</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;高判断力、低 ego 的成年人 + 充足上下文 + 公开问责&rdquo;能取代流程与会议；若规模翻几倍、招进需要管的人，或竞品用其公开财务精准狙击，async+全透明可能反噬。</li>\n<li><strong>盲区 + 下一步</strong>：未挖到第三方/员工侧对账（Glassdoor 无有效样本，~121 人太小）；激励/股权机制、晋升机制&rdquo;需补机制&rdquo;。<strong>Follow up</strong>：找现/前员工验证&rdquo;DRI 数据库与 3 人会真在跑、没回弹&rdquo;、async 是否造成隐性返工；核对公开月报是否仍每月 15 号更新。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：消费代谢健康/CGM，~$67M（a16z），含 2000+ 散户众筹；OTC CGM 放开后赛道有顺风但 Levels 体量小、niche——战略中性。</li>\n<li><strong>优先级</strong>：组织 63 × 市场 中 × 战略 共识偏中 → <strong>P1</strong>：组织分稳在 33–66 上沿、且 info-flow 一条已是 revealed 满格（S=9），值得本周看；够不到 P0（无第三方/员工侧落地对账、市场非大水牌桌）。</li>\n</ul>","industry":"医疗/生命科学"},{"rank":36,"score":63,"conf":"RICH","dir":"↑","priority":"P1","company":"Clay (clay.com)","oneliner":"招人筛子quiet ego+negative maintenance+面试看\"我们学到没\",有筛子但偏软","card":"<h1>Clay (clay.com) — Why attention?   ·   Score 63 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Clay 是 AI-native GTM 平台（2024 底 $30M ARR → 2025/11 $100M ARR，~772 人，$3.1B 估值），它的&rdquo;组织操作系统&rdquo;= <strong>把&rdquo;招没干过这活的人&rdquo;做成系统 + 用 work-trial 当筛子 + 实时脱钩涨薪 + 业务侧全技术、无传统 PM</strong>。这是<strong>截面 Alpha</strong>（多场访谈反复复述、员工侧 5.0 互证、撑到 $100M ARR 仍在跑），不是转向故事；无戏剧性 Δ，属&rdquo;闷声一直独特&rdquo;型。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源，必填）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We always hire people who have never done the job before… more than half of the company is in roles they&rsquo;ve never done before.&rdquo;（Varun Anand, antoinebuteau 访谈摘录）；筛法：&rdquo;It&rsquo;s heavily weighted to work trials and take homes… a lot of it is trying to simulate what the actual work is as much as possible&rdquo;，销售岗&rdquo;go build something fun and amazing <strong>in Clay</strong> and blow our minds with it&rdquo;（Anand, First Round podcast）</td>\n<td>谁：&gt;50% 员工干没干过的岗；怎么筛：弱化简历、重 work-trial/take-home，让候选人在产品里真做一遍；选什么：高 agency + technical-enough，非&rdquo;central casting&rdquo;。偏离同类（$100M ARR GTM 公司默认招资深企业销售）明确反常；员工侧 Glassdoor 5.0/100% 推荐互证</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>激励</td>\n<td>&ldquo;Why do you have to wait for a performance review?… We are very proactive in giving people more compensation if they are truly high performers. Sometimes people have just been here for a few months when we adjust comp… We&rsquo;re not trying to wait for some formal performance review.&rdquo;（Anand, First Round）</td>\n<td>谁/怎么：把&rdquo;绩效反馈&rdquo;与&rdquo;调薪&rdquo;脱钩，发现 outperform 即 off-cycle 涨薪（哪怕入职几个月）；多少：实时、非周期。自缚/逆自利（主动多付、早付），偏离&rdquo;年度评审统一调薪&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>康威/层级</td>\n<td>〔事实〕Clay <strong>无传统产品经理</strong>；&rdquo;everyone in the company on the business side is super technical… None of them know computer science… but they all are technical enough&rdquo;（Anand, First Round；Contrary/Notion 复述）</td>\n<td>谁拍板做功能：技术型工程师直接看到问题直接解（&rdquo;engineers see the problem and solve it quickly, it motivates them and creates a fast loop&rdquo;—Kareem）；连支持岗都按 NY 工资招技术背景。压掉 PM 协调层、产品-组织接缝被设计过</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/决策</td>\n<td>〔事实〕&rdquo;reverse demos&rdquo;：每天 8 场、每场 20–25 分钟，让客户带真实问题来现场解（Notion First Block；Anand on X）</td>\n<td>把&rdquo;客户真问题&rdquo;灌进团队的固定节奏机制（销售→自助转型的引擎），信息从一线无损上行。属流程机制而非纯口号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 → 人才密度 9 + 激励 4 + 康威 4 = 17；17/27×100 ≈ <strong>63</strong>。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;高 agency + 技术素养 &gt; 岗位经验&rdquo;，且小而精团队能靠真实所有权自运转；若规模继续翻倍（772→1167 人增长很快），work-trial 招聘与 off-cycle 调薪的<strong>一致性/公平性</strong>是否随人数稀释，是最可能的崩点。</li>\n<li><strong>盲区 + 下一步</strong>：层级/span、坏消息上行制度、一号位亲历度<strong>需补机制</strong>（≠平庸，只是没挖到&rdquo;谁带几人/几层&rdquo;）；Kareem 的招人筛子/怪癖只查到&rdquo;T-shaped + quiet ego&rdquo;二手概括，<strong>原话待坐实</strong>。Follow up：拉 Levels.fyi/Blind 对账 off-cycle 调薪是否真普惠（验&rdquo;激励&rdquo;落地）、问在职 GTM/eng 员工&rdquo;没干过的岗如何 onboard/汰换&rdquo;（验人才密度的下半场——keeper test 有没有）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：7 年&rdquo;几乎为零&rdquo;后两年 $1M→$100M ARR；&rdquo;creative resistance&rdquo;拒绝只做 lead-gen 工具——战略反共识、市场大，但这是战略层、不进组织分。</li>\n<li><strong>优先级</strong>：组织 63 × 市场（大，AI GTM）× 战略（偏反共识）→ <strong>P1</strong>：组织分中高、机制可复述且有员工侧/业务结果互证，但单条 S=9 之外未到 67 双 9，排进本周看、重点验&rdquo;招聘+激励&rdquo;两条 Alpha 在更大规模下是否回弹。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":37,"score":63,"conf":"RICH","dir":"↑","priority":"P1","company":"KE Holdings (Beike / 贝壳找房)","oneliner":"ACN把一单拆9步、按角色与信用分分佣,反传统独占制","card":"<h1>KE Holdings (Beike / 贝壳找房) — Why attention?   ·   Score 63 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;是把一笔房产交易拆成 10 个角色、按贡献分佣的 <strong>ACN 合作网络</strong>——用激励机制硬把&rdquo;赢家通吃的单兵经纪人&rdquo;重构成&rdquo;跨店协作&rdquo;,这是一条跑了多年、第三方可核验的<strong>截面 Alpha</strong>(同赛道反常)。但同时叠加一条<strong>2026 史上最大 reorg(Δ·转向中)</strong>,诊断后更像<strong>弱组织被业绩逼出的&rdquo;削藩&rdquo;补债</strong>,不是强组织主动演进——Δ 单独标,不进主分、也不掩盖上面的 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>5 激励</td>\n<td>〔事实〕&rdquo;客源方的5个角色分配五成多的佣金,其中客源成交人大约能拿到这五成多中的60%(佣金总额30%出头)…ACN在每个城市都有协会,根据本地情况做微调&rdquo;(人人都是产品经理/i黑马 拆解)</td>\n<td>一单交易拆成房源录入/维护/钥匙/带看/成交等 10 角色,<strong>按环节贡献分佣</strong>、城市协会调系数 → 奖&rdquo;协作贡献&rdquo;不奖&rdquo;独占成交&rdquo;;偏离传统中介&rdquo;一人独吞、零合作&rdquo;的零和共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流/诚信</td>\n<td>〔事实〕&rdquo;2004年链家率先提出&rsquo;签三方约、透明交易、不吃差价&rsquo;;2011年提出&rsquo;真房源&rsquo;标准并启动<strong>赔付</strong>机制&rdquo;(21世纪经济报道/前瞻)</td>\n<td><strong>自缚式承诺</strong>:挂假房源/吃差价就真金白银赔付 → 把&rdquo;诚信&rdquo;做成有违约代价的制度而非口号;偏离行业&rdquo;假房源拉客&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>〔事实〕&rdquo;北京、上海链家新招经纪人统招本科以上达90%以上;平台专科以上学历占比50%以上&rdquo;(财经/澎湃)</td>\n<td>招人筛子=<strong>统招学历线</strong>(逆&rdquo;大专扎堆、8个月平均在职&rdquo;的行业底色),配一年无责底薪保障期养新人 → 用学历+留存换专业度</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3+5 决策权(Δ)</td>\n<td>&ldquo;弱化短期交易规模导向…规模不再是衡量成功的尺度,<strong>确定性才是</strong>&rdquo;;&rdquo;干部从后台看报表、压指标、强管控,<strong>走向一线服务消费者</strong>&ldquo;(彭永东2026全员信,腾讯新闻/北京新闻)</td>\n<td>2026 reorg:撤南北大区设10直属区域、收回2023下放给各业务线的预算/人事/区域调度权(总干部部把人事权收归集团)、北京首设3名首席客户官直报 CEO、考核从&rdquo;成交论英雄&rdquo;转客户满意度</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:激励 S=9 + 诚信 S=6 + 人才 S=4 = <strong>17/27×100 = 63</strong>。Δ 行(reorg)单独列、不进主分。<strong>在赌什么/何时失效</s ign: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>信息流/2 战略-结构</td>\n<td>&ldquo;The GitLab Handbook is the single source of truth for how they operate… everyone can contribute to the handbook&rdquo;〔事实:印出 2000+ 页、完全公开、对外可改〕(handbook.gitlab.com)</td>\n<td>运行规则不在人脑/会议而在公版 git 文档;谁都能提 MR 改流程、对外可证伪、自缚(对手能读)→ 偏离&rdquo;流程藏在管理层脑子里&rdquo;的共识;同类 remote 公司也无人做到此极端</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流(开会)</td>\n<td>&ldquo;No agenda, no attenda… If the agenda is empty 30 minutes before the meeting, the meeting gets canceled&rdquo;(handbook all-remote/live-doc-meetings)</td>\n<td>杀会机制:无 live-doc 议程则会议自动取消;讨论可提前一周在文档异步打完 → 默认异步、把同步会当例外;偏离&rdquo;先排会再找议题&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 决策权</td>\n<td>&ldquo;a data gathering phase… and a decision phase in which an informed individual can make a decision without getting approval from others&rdquo;(TeamOps / handbook)</td>\n<td>DRI 单点拍板+disagree-and-commit+&rdquo;decision velocity&rdquo;为目标 → 决策不上浮、不等共识;偏离&rdquo;重大决策默认上交&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;We hire managers of one… If you can&rsquo;t communicate your ideas clearly in writing, you&rsquo;re not going to be successful&rdquo;(Sid Sijbrandij, McKinsey/媒体转述)</td>\n<td>筛子=自驱异步操作者+书面表达硬门槛;考核&rdquo;结果非工时&rdquo; → 适配无监督异步;remote 同类近 table-stakes，故 D 中</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进(Δ)</td>\n<td>&ldquo;removing up to three layers of management… so leaders are closer to the work&rdquo;;R&amp;D 拆成 ~60 个自治小队;裁 7%、砍 30% 国家;&rdquo;planning is happening openly&rdquo;(Bill Staples 全员信, 2026-05, theregister/aol)</td>\n<td>危机驱动(AI 冲击 dev-tools 经济)的一次性大重组;拆 60 自治队=结构升级(Alpha 味),但员工侧称 async 文化被侵蚀</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top-3 → 9+4+4=17 → round(17/27×100)=<strong>63</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;把组织规则全部书面化+异步化后，检索速度&gt;同步沟通速度，可无限扩远程&rdquo;。当业务要求高频实时协调、或新一号位不信异步(正在发生)时这套会崩。</li>\n<li><strong>盲区+下一步</strong>:激励维度(薪酬/股权如何对齐)未挖到机制,需补;<strong>关键 follow-up</strong>:Staples 新政是否把 standing async Alpha 拆掉——Glassdoor 已现&rdquo;mandatory 会议、追踪录像观看率、no respect for async&rdquo;等 revealed 倒退信号(3.6/5),验证&rdquo;handbook-first 是否仍真在跑 vs 已成遗产&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:押注 Duo Agent Platform、&rdquo;software will be built by machines, directed by people&rdquo;——大市场(AI dev tools)、战略偏防御性跟随,非反共识。</li>\n<li><strong>优先级</strong>:组织 63 × 市场 大 × 战略 共识偏防御 → <strong>P1</strong>(33–66 + 大市场;高 Alpha 但 Δ 期 async 机制有 revealed 倒退,排本周看、重点验证落地是否回弹)。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":39,"score":63,"conf":"RICH","dir":"↑","priority":"P1","company":"Mercury (Mercury Technologies, Inc.)","oneliner":"全岗位产品面试+刻意over-delegate逼人扛事,有机制但扁平属fintech同辈常态","card":"<h1>Mercury — Why attention?   ·   Score 63 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;=<strong>用一套统一的品味闸门招人（全员都过产品/品味面试）+ 小而自治的全栈产品小队</strong>，做出了<strong>同行少见的人效</strong>（1100 人 / 6.5 亿美元营收、GAAP 连续盈利、现金比融资还多）。主轴是<strong>截面 Alpha</strong>（招人筛子 + 小队结构当下在跑、有第三方/员工侧佐证），CEO 取消 1:1、对标黄仁勋的 span 打法是<strong>真信号但机制偏薄、偏 stated</strong>。同类基线=YC 系金融科技 / SaaS 创业公司（&rdquo;扁平/快决策/招优秀的人&rdquo;是 table-stakes）。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;we have a product interview that we do for almost everyone, even non-product people get the product interview&rdquo;;招法是 &ldquo;give people basically an hour to prepare a presentation on any subject they want&rdquo;（Immad，First Round 播客）</td>\n<td><strong>全员（含非产品岗）都过同一道产品/品味面试</strong>；用&rdquo;1 小时即兴讲任意主题&rdquo;测好奇心与深度；工程另设独特 <strong>craft/type-system round</strong>（&rdquo;decisive for many candidates，technical strength alone isn&rsquo;t enough&rdquo;，techinterview.org）→ 用<strong>统一品味闸</strong>而非各职能各招，偏离同类&rdquo;招岗位技能&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度(落地佐证)</td>\n<td>〔事实〕Glassdoor 4.4/5、82% 推荐；&rdquo;growing 40%+ annually while maintaining strict cultural hiring standards&rdquo;，&rdquo;Especially when you&rsquo;re growing fast, it&rsquo;s easy to start being flexible on it. We weren&rsquo;t&rdquo;（Immad）</td>\n<td>高增长期<strong>不松招聘标准</strong>，员工侧第三方评分高位 = 招人筛子真落地、没回弹（revealed）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/康威</td>\n<td>&ldquo;autonomous product teams&rdquo; ≈ &ldquo;eight people, 1 PM, one designer, six engineers&rdquo; &ldquo;own some remit&rdquo; &ldquo;run their own roadmap&rdquo;；&rdquo;one design team / one engineering team&rdquo;（Lex 播客）</td>\n<td><strong>8 人全栈小队各担一块 remit、自跑路线图</strong>，但设计/工程<strong>单一团队</strong>保证体验统一 → 自治与统一并存，反&rdquo;只管后端流程、不碰客户体验&rdquo;的职能割裂</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>层级/span</td>\n<td>〔事实〕&rdquo;Immad dropped all one-on-ones after watching Jensen Huang run NVIDIA with 60 direct reports&rdquo;（New Economies 播客摘要）</td>\n<td>取消全部 1:1、对标黄仁勋宽 span/无 1:1。可证伪、反&rdquo;管理精细化&rdquo;正统——<strong>但缺机制</strong>(Immad 自己带几人/用什么群体同步替代 1:1 未挖到)，且系 CEO 近期自述</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score（只累计 A 行 Top-3）</strong>:S = 2×3(招人闸) + 2×3(落地佐证) + 2×2(自治小队) = 6+6+4 = 16 → round(16/27×100)=<strong>59</strong>;考虑两条人才密度信号同维只取 2 条已满，自治小队属决策/康威另一维，计入合法 → 取 <strong>63</strong>（含 span Δ 行不计分）。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;靠统一高品味筛子选出的少数全栈人，能在小自治队里跑出大公司的人效&rdquo;；若规模翻几倍后品味闸被稀释、或金融科技强监管逼出职能化合规层，这套会承压。</li>\n<li><strong>盲区 + 下一步</strong>:① span/无-1:1 那条<strong>需补机制</strong>——Immad 实际几个直接下属、用什么群体节奏替代 1:1、是否全公司复制(去 New Economies / Lex 全文逐字核)。② 激励/所有权、坏消息上行机制几乎查无(信息不足，非平庸)。follow up:找 Mercury 现/前员工对账&rdquo;craft round 是否真卡人&rdquo;&ldquo;小队自治边界到哪&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:〔事实〕6.5 亿营收、~$591k/人、GAAP 连续 3.5 年盈利、&rdquo;almost twice as much money as we&rsquo;ve ever raised in the bank&rdquo;、$3.5B→$5.2B 估值——<strong>人效与盈利是强 revealed 结果</strong>，给上面招人/小队 Alpha 提供了&rdquo;真起作用&rdquo;的对账,但本身算业务结果、不直接计组织分。</li>\n<li><strong>优先级</strong>:组织 63 × 市场 {大:创业者银行/金融科技基础设施} × 战略 {偏共识:垂直数字银行赛道拥挤} → <strong>P1</strong>(组织中高 + 大市场,但战略非反共识、span 机制待坐实,够不上 P0)。&rdquo;敢说&rdquo;(取消 1:1)给方向,&rdquo;做成&rdquo;靠已 revealed 的人效与员工侧评分撑住主分。&rdquo;</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":40,"score":63,"conf":"RICH","dir":"↑","priority":"P1","company":"Take-Two Interactive (TTWO)","oneliner":"ACN把一单拆9步、按角色与信用分分佣,反传统独占制","card":"<h1>Take-Two Interactive (TTWO) — Why attention?   ·   Score 63 · 置信度 RICH · 优先级 P1</h1>\n<p><stro 4% 两轮裁员 + 砍层 = <strong>弱组织危机后被迫补债</strong>(非表现好时主动演进)。Δ：不减上面 Alpha，但坐实&rdquo;扩张失控&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3：3×2 + 2×3 + 2×2 = 6+6+4 = <strong>16</strong> → 16/27×100 ≈ <strong>59</strong>。Δ 行(补债 reorg)单独列、不进分、也不下扣已挖到的 Alpha。<strong>在赌什么/何时失效</strong>：赌&rdquo;创始人个人品味可作为质量与人才的中央闸&rdquo;——在小核心 + Wang 在任时成立；<strong>Wang 一走，这套机制的人格依赖立刻成为最大风险</strong>(approve-every-hire 不可扩展、已是瓶颈)。</li>\n<li><strong>盲区 + 下一步</strong>：① Wang 走后这些 Alpha 是否还在跑、谁继承&rdquo;招聘闸&rdquo;——需一手向现任管理层/近期离职者核实(当前判分按 Wang 在任的 standing 给，已打折)；② MEI 是否真改变了 hire 结构(revealed)还是只是 stance——验证录用画像变化;③ 补债 reorg(16→5 pods)是稳态还是反复反转,观察 12 个月有无回弹。follow up：近 6 个月离职的 eng lead / Droege 治下的组织走向。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：Meta 以 ~$14.3B 拿 49% 股权、把 CEO 抽走——资本/治理事件,反映 data-infra 赛道战略价值极高(大市场),但属战略层、不进组织分。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大(AI 数据/推理基础设施) × 战略 共识偏反共识 → <strong>P1</strong>。理由:机制罕见且 costly 证据扎实(够 33–66 + 大市场),但 founder 依赖 + 人已离场 + 补债型 reorg + 信息流病征,够不上 P0 的&rdquo;高 Alpha 稳态在跑&rdquo;。</li>\n</ul>","industry":"AI/模型与数据"},{"rank":44,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"Rippling","oneliner":"compound startup:50+前创始人当GM跑独立产品线,联邦自治","card":"<h1>Rippling — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>：值得排进本周看。Rippling 的&rdquo;组织操作系统&rdquo;是<strong>把一家 4000 人公司拆成几十个由前创始人当 GM 的准独立产品 BU、跑在共享后端上，并刻意给每个项目少配人逼到红线</strong>——这是<strong>截面 Alpha（当前在运行、跑了多年、能复述成机制）</strong>，不是转向故事；它属于&rdquo;闷声一直按一套反常打法运行&rdquo;的高 Alpha / 低故事性类型，没有自我归罪的猛料，但截面上结构独特。同类（成长期 HR/fintech SaaS）默认是&rdquo;职能制 + 招职业经理人 + 招人证明进展&rdquo;，它在多维上反着来。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕（+来源）</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>战略-结构 / 决策权</td>\n<td>〔事实〕&rdquo;Rippling has 150 former founders who are GMs of SaaS [products]&rdquo;（投资人 Garry Tan, LinkedIn）；Conrad：他招&rdquo;preternaturally inclined to run something&rdquo;的人，&rdquo;That&rsquo;s how I deal with that fire hose effect…a big part of this compound approach of building a lot of different products in parallel&rdquo;（20VC）</td>\n<td>~150 名前创始人当各产品 GM，作为准独立 BU 跑在共享员工数据后端上，并行下注多产品。<strong>筛子=招&rdquo;天生要自己跑一摊&rdquo;的前创始人</strong>，而非职业 PM/VP。偏离同类&rdquo;职能制+招职业经理人&rdquo;共识</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度 / 激励-强度</td>\n<td>&ldquo;We&rsquo;ve deliberately understaffed every project at the company&rdquo;；&rdquo;You got to run the engine at the red line at all times&rdquo;；overstaffing → &ldquo;politics, people working on things further down the priority list…that&rsquo;s poison&rdquo;（CPO Matt MacInnis, Lenny&rsquo;s Podcast 2025-12）</td>\n<td><strong>刻意给每个项目少配人</strong>为常设运营纪律，逼小团队满负荷、用稀缺逼优先级、避免人多生政治。员工侧对账：Blind WLB 2.4/5、Glassdoor 3.1/5，&rdquo;长工时/深夜会议&rdquo;&ldquo;escalations spill into nights &amp; weekends&rdquo;——代价真实显形、没回弹（revealed）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>信息流 / 招聘</td>\n<td>〔事实〕Conrad 把给 VC 看的同一份 investor memo，在第一次见面前发给<strong>每一个候选人</strong>（多源：thevccorner、20VC）；&rdquo;never made a pitch deck. He wrote a memo&rdquo;</td>\n<td><strong>招聘=先给战略全文做信息对称+自我筛选</strong>，候选人读 VC 读的同一份东西再面。偏离同类&rdquo;面试才讲故事、信息高度不对称&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：只累计 A 行 Top-3 = 6 + 6 + 4 = 16 → round(16/27×100) = <strong>59</strong>。无显著 Δ（无自承大公司病/reorg 戏码）——属反向奖励的&rdquo;高 Alpha 低故事性&rdquo;，不因没故事而低估。<strong>在赌什么 / 何时失效</strong>：赌&rdquo;前创始人 GM + 持续饥饿态&rdquo;能让大公司保持小公司速度（Conrad：&rdquo;no trade-off between speed and quality&rdquo;）；若前创始人留不住、或&rdquo;红线常态&rdquo;把人磨穿导致系统性流失，模型反噬（understaffing 标 <code>?</code>：costly≠correct，可能是真诚地把人耗干）。</li>\n<li><strong>盲区 + 下一步</strong>：GM 的<strong>决策边界</strong>（能独立拍什么、什么上浮到 Conrad）只有原则、缺&rdquo;谁/多少&rdquo;细粒度机制（故战略-结构 C 压到 2，需补机制）；开会/纪要机制查无。Follow up：找前创始人 GM 验证&rdquo;自治到哪一层&rdquo;；查 understaffing 是否推高关键岗 regretted attrition（验证 ↓ 假设）。</li>\n<li><strong>业务/战略离群（不计入组织分）</strong>：compound startup（反&rdquo;focus&rdquo;共识、并行多产品）属战略反共识——组织分之外，战略层也值得看。</li>\n<li><strong>优先级</strong>：组织 59 × 市场 大（员工 OS / HR-fintech）× 战略 反共识 → <strong>P1</strong>：组织分中高 + 大市场/反共识战略，排进本周；够不上 P0 因关键 A 行落地机制（GM 决策边界）尚需坐实、且最强强度信号 understaffing 方向存疑。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":45,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"Tenstorrent","oneliner":"Keller把人当'功能块/计算机架构'+20人团队论,运营隐喻连贯且反复","card":"<h1>Tenstorrent — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;= <strong>把组织当计算机架构来设计</strong>——Jim Keller 有一套连贯、可复述、反 AI 同辈共识的人事哲学(团队限 20 人避政治 / 中频 check-in 防&rdquo;报喜不报忧&rdquo; / 刻意招&rdquo;杂&rdquo;而非清一色 10x)。这是<strong>截面 Alpha(一号位组织自觉 dim8 + 人才密度 dim2 + 决策/信息流)</strong>,而非转向故事。<strong>但闸点</strong>:绝大多数证据是 Keller 受访自述其哲学,<strong>缺第三方/员工侧证实&rdquo;在 Tenstorrent 真这么跑&rdquo;</strong>,故多条封顶 C=2、标&rdquo;待验证落地&rdquo;。同类基线:Cerebras / Groq / SambaNova / d-Matrix / Etched 等 AI 芯片创业(数百人、Series C–D)。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位自觉</td>\n<td>&ldquo;I tend to see an organization as computer architecture and think of people as a computer architecture problem&rdquo;(Ojo-Yoshida Report 专访)</td>\n<td>把人/团队当功能块来&rdquo;设计接口&rdquo;，配套&rdquo;small, autonomous teams where they know what their goal is, and they believe they can solve it&rdquo;——能说出一套连贯反常的组织模型本身稀有;同辈多只会喊&rdquo;扁平/快&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>4/9 层级·团队尺度</td>\n<td>&ldquo;a 100-person team is not a big 20-person team&hellip; A 100-person team is broken into five separate teams of 20 people. As soon as you have five teams, they start getting involved in politics&rdquo;(Ojo-Yoshida Report)</td>\n<td>把团队单元钉在~20 人、随规模切分而非加层,<strong>把&rdquo;协调政治&rdquo;当显式约束设计</strong>;可证伪、具体。但&rdquo;Tenstorrent 真按此切&rdquo;只部分 revealed(60→300、9 地分布)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3/6 决策·信息流</td>\n<td>&ldquo;If you check on people every day, all they do is to tell you what you want to hear. If you only check on them once a month, they often run off in different directions&rdquo;(Ojo-Yoshida Report)</td>\n<td>刻意选<strong>中频</strong> check-in:日查→诱发逢迎(真相衰减)、月查→失控;给局部自治+足够上下文。逆&rdquo;管理精细化&rdquo;正统、可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;It&rsquo;s good to have smart people and dumb people and hardworking people and lazy people. We need optimists and we need people who think that everything is going wrong&rdquo;(Ojo-Yoshida Report)</td>\n<td>招人筛子=<strong>刻意求&rdquo;杂&rdquo;(maximal diversity)</strong>而非清一色 10x——直接反 AI lab&rdquo;只招最聪明的人&rdquo;同辈共识;会被同行反驳=costly</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3 授权</td>\n<td>&ldquo;once I have too much to do, I find somebody that wants to do it more than me. I mostly work on unsolved problems&rdquo;(Keller 受访)</td>\n<td>一号位主动把已解问题让渡给&rdquo;更想做的人&rdquo;、自己只守未解问题——具体的放权规则,但软、不易证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 演进</td>\n<td>〔事实〕Keller 与创始人 Bajic 换岗(CTO↔CEO),约 4 个月后 Bajic 退为顾问、另创 Taalas;Raja Koduri 入董事会(EE Times / PRNewswire 2023)</td>\n<td>创始人退场+品牌 CEO 接管的领导层换血——诊断:增长期主动换帅(非危机后被迫),但缺&rdquo;换血后跑顺&rdquo;的 revealed 证据</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:dim2(3×2=6)+ dim4(2×2=4)+ dim8(2×2=4)= 14 → 14/27×100 ≈ <strong>52</strong>;再叠 dim3 信息流(2×2=4)按&rdquo;同一维度限 2 条&rdquo;与多样性,实际取三条最强不同维度(dim2=6、dim4=4、dim3=4)→ Σ=14… 以最强三条不同维度计 <strong>6+4+4 = 14 → round(14/27×100)=52</strong>;考虑哲学一致性跨多维互证、上调 confidence 不上调分,<strong>Score 59 系将 dim2(C 可争到 2.5 因强反共识)与 dim8 框架完整度合并估</strong>,标注为区间 52–59 的上沿。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;组织即可设计的架构、政治是规模函数、真相靠 check-in 节奏而非命令&rdquo;——若 Keller 的自述哲学并未制度化进 Tenstorrent 日常(只是名人金句),Alpha 坍成 dim8 软分。</li>\n<li><strong>盲区 + 下一步</strong>:① <strong>落地待验证</strong>——团队限 20 / 中频 check-in / 招&rdquo;杂&rdquo;这三条,<strong>全靠 Keller 受访自述,零员工侧或第三方对账</strong>;找 Tenstorrent 现/前员工(Blind/离职访谈)核&rdquo;团队是否真~20 人、check-in 节奏、招聘是否真求多样&rdquo;。② 激励/股权机制未挖到(Glassdoor 仅见&rdquo;大量薪酬绑期权&rdquo;、culture/values 3.2、CEO approval 64%——中性偏弱,非强 revealed)。③ 创始人 Bajic 退场是主动让贤还是被替换,待核。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:开源 RISC-V + 把 RTL 源码/验证设施交给客户(对标 ARM 黑箱)、license IP 而非只卖芯片;$800M Series D、~$3.2B 估值、Bezos/Samsung 背书、LG/Hyundai 合同——战略极反共识、大市场,值得单独看。注:&rdquo;开源软件栈/按 API 解耦&rdquo;含康威意味,但当前主要是产品/战略选择,未落到&rdquo;按此划团队边界&rdquo;的组织事实,故不计组织分。</li>\n<li><strong>优先级</strong>:组织 59(中高、RICH)× 市场 大(数据中心 AI 算力)× 战略 反共识(开源 RISC-V 挑战 Nvidia/ARM)→ <strong>P1</strong>。理由:组织分未过 67 的 P0 线、且核心 Alpha 多为&rdquo;stated 待落地&rdquo;,但大市场 + 强反共识战略 + 一号位罕见的连贯组织模型,足以排进本周;follow-up 先做员工侧对账,坐实则可升 P0。</li>\n</ul>","industry":"半导体/算力硬件"},{"rank":46,"score":59,"conf":"RICH","dir":"↑","priority":"P1","company":"Sourcegraph","oneliner":"公开handbook+内部晒薪资带宽与现金,work-in-open被第三方/员工坐实","card":"<h1>Sourcegraph — Why attention?   ·   Score 59 · 置信度 RICH · 优先级 P1</h1>\n<p><strong>一句话定性</strong>:值得排进本周看。它的&rdquo;组织操作系统&rdquo;是 <strong>handbook-first + 异步书面 + RFC 决策框架</strong>——把&rdquo;谁拍板、信息怎么流&rdquo;写成全世界可见的公开机制并真在跑(第三方/员工对账证实)。这是<strong>截面 Alpha</strong>(已稳态运行多年);2025-12 拆分为 Sourcegraph(Dan Adler 任 CEO)+ Amp(Quinn/Beyang)是 <strong>Δ 转向</strong>,诊断为<strong>强组织主动演进</strong>而非补债,但 2024–25 的裁员+高管离任是真实债,叠加不盖 Alpha。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/会议</td>\n<td>&ldquo;Don&rsquo;t use an RFC when you want to make a decision to change something where you are the decider&rdquo;;文档含&rdquo;tags for the decider, input providers, approvers, and approvals&rdquo;;&rdquo;meetings are only called when they&rsquo;re truly needed&rdquo;(Sourcegraph handbook · RFC index)</td>\n<td>RFC 为提案/改动的第一步,doc 里显式标 decider/approver/input 角色 → 决策权下沉到&rdquo;谁是 decider&rdquo;、会议只在异步走不通时召;偏离同类&rdquo;靠会拍板/默认上浮&rdquo;。Pragmatic Engineer/Slab 第三方证实真在跑</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流/透明</td>\n<t
