servability/infra SaaS)只属中等偏离,且员工侧对&rdquo;低 drama/透明&rdquo;文化有反证,封住可信度上限。同类基线 = Splunk/Dynatrace/New Relic/Elastic/Snowflake 等公开大盘 infra SaaS。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>9 组织演进/人才密度</td>\n<td>&ldquo;We&rsquo;ve never done more than double the size of the engineering team in one year.&rdquo;(Pomel,How They Hire / 20VC)</td>\n<td>显式给工程招聘速度设硬上限,逆 SaaS&rdquo;增长不惜代价&rdquo;惯性;可证伪、与 Datadog 出名的高 R&amp;D 人效/Rule-of-40 互证(部分 revealed)→ 偏离同类的&rdquo;land-grab 式扩招&rdquo;</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>1 战略-结构</td>\n<td>&ldquo;the way it works is we&rsquo;re going to start with a team of 10 or seven or five&rdquo;(Pomel,Logan Bartlett 访谈摘要)</td>\n<td>新产品线刻意以 5–10 人小队起步、故意&rdquo;understaffed&rdquo;逼近客户/聚焦;比同类&rdquo;成立大事业部&rdquo;克制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8 一号位/决策权</td>\n<td>&ldquo;People that report directly to me, I should be able to think of them as peers, they&rsquo;re not people I manage… If you have to manage their career, they might not be the right fit.&rdquo;(Pomel,Antoine Buteau 整理)</td>\n<td>高管层用&rdquo;能否当 peer&rdquo;做雇佣/留用筛子,逼自己放权(自缚:管不动=不留);但限于 exec 层、创始人常见说法</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流(反证)</td>\n<td>〔Glassdoor:Senior Mgmt 3.8;评论称&rdquo;bureaucracy creeping in&rdquo;&ldquo;inconsistent management quality&rdquo;;有评论指&rdquo;raise concerns → backlash…culture of fear&rdquo;〕(Glassdoor/Indeed 聚合)</td>\n<td>员工侧与&rdquo;low on drama/透明协作&rdquo;自述对账出现裂口 → 压住文化类主张的 C,本身是规模化后科层增生的&rdquo;确认平庸&rdquo;侧证据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 文化机制(软)</td>\n<td>&ldquo;We&rsquo;ve never written it down. So we don&rsquo;t have… seven values or any of that stuff.&rdquo;(Pomel) + 工程师轮值 on-call/support 直面客户〔事实〕</td>\n<td>不写价值观靠行为传导;工程师 support 轮值=产品共情机制——但 on-call 轮值对 observability 公司近 table-stakes,D 低</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top-3 → (2×2)+(2×2)+(1×2)=4+4+2=10;round(10/27×100)=<strong>37</strong>。无单条 S≥6 的&rdquo;尖峰&rdquo;,机制真实但对同类不够激进,故中分。</li>\n<li><strong>在赌什么 / 何时失效</strong>:赌&rdquo;克制扩招+小队孵化+顶薪低周转&rdquo;能在不烧钱的前提下持续多产品创新(NY 留存优势是底层假设)。失效条件:① AI/observability 进入需大兵团抢身位的窗口,封顶扩招变成错失;② 规模过万后&rdquo;bureaucracy creeping in&rdquo;压过 frugal 纪律(员工侧已现苗头)。</li>\n<li><strong>盲区 + 下一步</strong>:决策权下沉边界(一线能独立改什么/什么上浮)、会议机制(杀会/异步/备忘)<strong>两条定向子查询查无具体机制 → 需补机制,非平庸</strong>。Follow up:找 Datadog 中层/前员工核对&rdquo;小队孵化&rdquo;与&rdquo;放权&rdquo;是否真落地、还是已被科层稀释;验证 hypothesis&rdquo;frugal 扩招纪律是否真带来同类最高 R&amp;D 人效&rdquo;(查 R&amp;D 占比/人均 ARR vs Dynatrace/Splunk)。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:单产品→多产品平台扩张执行力强、长期高效增长——战略执行值得看,但属业务面。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 {大:observability/AI 可观测} × 战略 {较共识} → <strong>P2</strong>(组织分中、市场大但组织偏离不足以进 P1;有空看/持续观察,重点盯&rdquo;科层增生 vs frugal 纪律&rdquo;哪边赢)。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":76,"score":37,"conf":"RICH","dir":"↑","priority":"P2","company":"Faire","oneliner":"战略文档反推组织结构+写作文化+严苛背调;但两轮裁员=过快扩张补债","card":"<h1>Faire — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得轻看。唯一坐得住的截面 <strong>Alpha</strong> 是一套&rdquo;招人极度纪律化&rdquo;的机制(outcome 文档→深度行为面试→work study→5-7 个 reference&rdquo;挖到挖出坏话为止&rdquo;），对消费/marketplace 同类明显反常且可复述;但 2022-23 的层级膨胀→裁员属<strong>被迫补债的 Δ</strong>,不是主动演进,且员工侧证据(中层弱、裁员毁文化、临近 IPO 变官僚)与&rdquo;修好了&rdquo;的自述对账不上 —— 闷声优秀的部分只在&rdquo;招人&rdquo;,其余在转向/待验证。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;5-7 references for senior roles. Keep digging until you find something bad&rdquo;;&rdquo;On a scale of 1-10, how were they performing… Why?&rdquo;;&rdquo;deep behavioral interviews… 1-2 hours to go through every chapter of a person&rsquo;s professional career&rdquo;(Paraform 拆解 20VC)</td>\n<td>招聘四关:先写&rdquo;12-18 个月要 drive 的 outcomes&rdquo;文档→1-2h 逐段行为面试→work exercise 测真实产出→senior 必查 5-7 个 reference 且&rdquo;挖到坏话为止&rdquo;。筛子=能不能 drive 明确产出+硬挖弱点,反&rdquo;爱上候选人/数量证明进展&rdquo;的消费公司同类常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>战略-结构</td>\n<td>&ldquo;strategy… determines the organization structure&rdquo;;&rdquo;three to five strategic pillars at any given time and organizes around these core pillars&rdquo;;&rdquo;Each team is self-sufficient&rdquo;(YC Learnings of a CEO / First Round)</td>\n<td>用 strategy doc 先定 3-5 个 pillar 再据此画 org + 配 OKR;产品按 focus area 拆成各自自足的 team。反&rdquo;组织图考古学&rdquo;(结构是历史沉积)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/信息流</td>\n<td>&ldquo;I used to hold a biweekly business review… With more than 15 teams, it became… impossible&rdquo;;&rdquo;organized the company in a way that lets us hold people accountable without needing constant touchpoints&rdquo;(YC)</td>\n<td>早期日 standup+CEO 拍板→15+ team 后改&rdquo;tempo&rdquo;双周 review + OKR 留痕,把决策下放、靠系统问责而非触点。同类成长期常态升级,偏离不大</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>组织演进(债)</td>\n<td>〔事实〕估值 18 个月内从 ~$1B 涨到 $12B、连续两年 headcount 翻倍、&rdquo;built… former org structure with multiple layers of management&rdquo;;后 2022 裁 ~7%、2023 再裁 20%(~250 人)(TechCrunch/BetaKit);&rdquo;hubris&rdquo;&ldquo;we lost our way a little bit&rdquo;&ldquo;without change we wouldn&rsquo;t have a company&rdquo;(CNBC 2026-03)</td>\n<td>高增长期堆出&rdquo;多层管理&rdquo;→危机/&rdquo;alarm bells&rdquo;后被迫两轮裁员、砍激励补债。诊断三问:危机后被迫做(非表现好时主动)、一次性纠偏、自承 hubris → 偏<strong>弱组织补债</strong>,非强势演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>信息透明(对账)</td>\n<td>&ldquo;middle management here is… abysmal, I would say 1/5 are probably decent&rdquo;;&rdquo;layoffs totally destroyed culture&rdquo;;&rdquo;toxic corporate culture… seeping in now that they&rsquo;re ramping to IPO&rdquo;(Glassdoor 员工侧)</td>\n<td>员工侧与 CEO&rdquo;修好了&rdquo;叙事矛盾:中层弱、文化受损、临 IPO 趋官僚 → 钉&rdquo;修复未坐实&rdquo;,非确认修复</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 人才密度 2×2=4 + 信息透明对账 2×2=4 + 战略-结构 2×1=2 = Σ10 → round(10/27×100)=<strong>37</strong>。Δ 行(2023 reorg)不进分。<strong>在赌什么/何时失效</strong>:赌&rdquo;前置极重的招聘纪律能持续买到 A 类人、抵消中层薄弱&rdquo;。若 IPO 后招聘标准随规模稀释、或中层继续&rdquo;1/5 能打&rdquo;,这套 Alpha 会被组织债吃掉。</li>\n<li><strong>盲区+下一步</strong>:层级/span(每经理带几人、几层)、激励/所有权(ESOP/利润分成口径)、康威——均<strong>信息不足、非平庸</strong>。Follow up:① 找 2024-25 在职/离职工程师对账&rdquo;层级是否真的砍薄、招聘标准有没有降&rdquo;;② 验证 hypothesis&rdquo;reorg 后 standing Alpha 是否回弹&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:补 Amazon 留下的本地零售批发 marketplace 空白,市场大;战略偏共识执行型,非反共识。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 大 × 战略 共识 → 介于 P2/P1。组织分落在 33-66 + 大市场 → 取 <strong>P2 偏 P1</strong>:有空看,重点是验证&rdquo;招聘 Alpha 是否扛得住 IPO 期组织债&rdquo;,别因&rdquo;会讲 growing-too-fast 转向故事&rdquo;高估它。</li>\n</ul>","industry":"电商/平台/本地生活"},{"rank":77,"score":37,"conf":"RICH","dir":"↑","priority":"P2","company":"Microchip Technology (MCHP)","oneliner":"Aggregate System+11 Guiding Values,几十年成文化的组织操作系统","card":"<h1>Microchip Technology (MCHP) — Why attention?   ·   Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;有空看/持续观察&rdquo;。它的&rdquo;组织操作系统&rdquo;是一套<strong>罕见地被高度成文化的价值观驱动型运营系统</strong>——创始人 Sanghi 用两本书（《Driving Excellence: The Aggregate System》《Up and to the Right》）把&rdquo;11 条编号 Guiding Values + 全员持续改善 + 总周期时间最优&rdquo;写成了 30 年的管理底座。这是<strong>真实存在的截面 Alpha（成文化程度高于同业），但 Alpha 强度被两件事压住</strong>：① 几乎全是创始人自著/自述（stated）；② 员工侧硬对账出明显矛盾（&rdquo;Guiding Values 只对 Director 以下生效&rdquo;）。叠加 2024 起的<strong>创始人回归救火（Δ·补债型 reorg）</strong>。同类是成熟美系模拟/MCU 大厂（TI/ADI/NXP），&rdquo;运营纪律+周期时间&rdquo;部分是 table-stakes。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制（谁/怎么/多少）+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>8 一号位组织自觉 / 9 演进</td>\n<td>〔事实〕Sanghi 与 HR VP Mike Jones <strong>自研并著书</strong> &ldquo;The Aggregate System&rdquo;，11 条编号 Guiding Values 含 &ldquo;Continuous improvement is essential&rdquo;、&rdquo;Total cycle times are optimized&rdquo;（Wiley/Amazon 书目；microchip.com Mission-Vision-Guiding-Values）</td>\n<td>用&rdquo;价值观替代规则&rdquo;治理——&ldquo;there are very few rules except the ones required by governments, the rest…conducted by values&rdquo;；全员卷入持续改善、周期时间设为编号级 KPI。比同业把运营哲学<strong>成文化、可复述</strong>程度更高（同业多不公开成体系）</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>2/9 截面战绩</td>\n<td>&ldquo;We took Microchip&rsquo;s market value from <strong>$10 million to a whopping $44 billion over the 31 years</strong> that I led&rdquo;（Sanghi, Power Electronics News 专访）</td>\n<td>revealed 长期运营战绩（数十年毛利/执行领先），是系统&rdquo;真在跑&rdquo;的硬证据；但属<strong>创始人时代产出</strong>、且为自引框架</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息透明 / 真相上行</td>\n<td>&ldquo;<strong>Guiding Values only apply to people below Director</strong>&rdquo; / values &ldquo;preached but never practiced&rdquo;；&rdquo;feedback is discouraged, those who speak up often targeted&rdquo;（多条 Glassdoor 员工评）</td>\n<td>对账命中：成文价值观在 Director 层以上<strong>不约束</strong>、逆权发声被压 → 暴露 stated 与 revealed 的缺口，是 confirmed-mediocrity 负信号，<strong>压住上面两条的 C、不让其上 3</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>9 组织演进（Δ）</td>\n<td>&ldquo;When I became interim CEO, the company was in very dire shape…we were swimming in product inventory&rdquo;；&rdquo;<strong>Enough is enough. Our inventory is too high</strong>&ldquo;（库存 266 天 vs 目标 130–150）；〔事实〕九点计划：关 Fab 2、~10% 全球裁员（~2000 人）、重排 BU+渠道（IR/ABC15/PEN）</td>\n<td>创始人<strong>被迫回归救火</strong>：继任者（Moorthy）时代后危机触发、反转扩张、founder 重掌——<strong>弱组织补债型 reorg</strong>，非好时光按节奏的主动演进</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li> ignated insider.&rdquo;(Culture Code deck, Dharmesh Shah)</td>\n<td>全员可看董事会 deck + P&amp;L + 现金;为此把<strong>每个员工法律上列为 insider</strong>(受 NDA/内幕交易约束)= 自缚、可证伪、得罪 IR/合规惯例。偏离&rdquo;上市公司信息层层收口&rdquo;的成熟同类基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>决策权/放权</td>\n<td>&ldquo;3-word policy on just about everything: USE GOOD JUDGMENT&rdquo;;&rdquo;Debates should be won with better data not bigger job titles… It&rsquo;s not an open door policy. It&rsquo;s a no door policy.&rdquo;(同上)</td>\n<td>删掉差旅/病假/WFH/社媒的成文流程,只留一句判断准则;一线对可逆事项自决。删除控制杠杆=costly、可被滥用打脸。偏离 SaaS 同类&rdquo;流程化合规&rdquo;常态</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才密度</td>\n<td>&ldquo;We&rsquo;re a team, not a family. We hire, develop and cut smartly… Continually seek to raise our average.&rdquo; / &ldquo;Compromising on culture fit is mortgaging the future… interest rate on culture debt is crushingly high.&rdquo;(同上)</td>\n<td>招人须&rdquo;抬高团队均值&rdquo;、按 HEART 招/汰/奖;但&rdquo;keeper test/汰换仅合格者&rdquo;的<strong>具体动作挖不到机制</strong>,且 Netflix 已普及&rdquo;team not family&rdquo;框架 → 同类已不反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>信息流(对账·反向)</td>\n<td>〔事实〕Dan Lyons《Disrupted》:被裁称&rdquo;graduated/毕业&rdquo;;斥 culture code 为 cult-like/ageist。近年 Glassdoor 评分同比-4%,评论称&rdquo;performative culture language… whatever looks good in a slide deck&rdquo;,2024 士气最低、CPO Katie Burke 离任(Glassdoor/Inc/Fortune)</td>\n<td>revealed 的<strong>落地侵蚀</strong>对账:宣称的透明/平等在执行端被指表演化 → 据&rdquo;落地闸&rdquo;把上面几条 C 压到 ≤2、不进 P0</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>组织演进</td>\n<td>〔事实〕2023-01 首次裁员 ~7%(~500 人)+ 办公地整合,$72–105M 费用;Rangan 主推 &ldquo;Human-Led, AI-Accelerated&rdquo;、AI 素养项目(SEC 8-K;diginomica)</td>\n<td>reorg 诊断:<strong>弱组织补债侧</strong>——史上首次裁员、属 2022 下行后被迫降本、伴随士气下滑,非&rdquo;表现好时主动升级&rdquo;。AI 转型是宣布中的 Δ,无 standing-Alpha 落地证据</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 透明 4 + 放权 4 + 招汰 2 = 10;10/27×100 = <strong>37</strong>。<strong>在赌什么/何时失效</strong>:赌&rdquo;给员工极致信息+判断权,他们会像 owner 一样自我对齐&rdquo;;当规模上市、政治与 KPI 进来,透明易退化成&rdquo;表演式透明&rdquo;(失效模式①)——Lyons 与近年员工口径正是这个裂缝。</li>\n<li><strong>盲区+下一步</strong>:层级/span、激励的具名 owner、晋升靠战功还是带人——<strong>均需补机制</strong>(≠平庸,是没挖到)。Follow up:① 拉 2024–2025 在职员工/Blind 对账&rdquo;董事会 deck 是否仍全员可见、还是已收口&rdquo;;② 验证 hypothesis&rdquo;Culture Code 是 standing Alpha 还是已 performative 化的遗产&rdquo;;③ 看 AI 转型有无落到组织(团队边界/激励)还是仅产品叙事。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:CRM→&rdquo;Agentic Customer Platform&rdquo;AI 转型激进、市场大(~$15B 级);属战略层赌注,组织上无对应新 Alpha。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 大 × 战略 反共识(早期 all-in AI)→ <strong>P1</strong>(33–66 + 大市场/反共识战略)。一句理由:有真实、可复述、曾经反共识的透明/放权机制底子(标杆级原创),但同类已抄走表层、且 revealed 出现落地侵蚀——值得看,但别当 P0 的&rdquo;当下截面优异&rdquo;。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":83,"score":37,"conf":"RICH","dir":"?","priority":"P2","company":"Match Group","oneliner":"砍COO+去层级+公开绩效评审,但是新帅转向Delta未坐实","card":"<h1>Match Group (MTCH) — Why attention?  ·  Score 37 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:一家被迫转型的成熟互联网集团。Rascoff(2025.2 上任,Zillow 联创)带来一套<strong>真·costly 的透明机制</strong>(把自己的绩效评估当众做)——这是当下能挖到的唯一<strong>截面 Alpha</strong>;但公司主线是一场典型的<strong>弱组织补债式 Delta</strong>(用户下滑后被迫的&rdquo;Reset→Revitalize→Resurgence&rdquo;+13% 裁员+砍 1/5 经理+把&rdquo;独立品牌联邦&rdquo;收成单一产品制公司),且成效全是 CEO 自述/自引数据(stated),<strong>不进主分、待验证落地</strong>。standing Alpha base 薄——它原本就是 IAC 系&rdquo;各自为政的品牌组合&rdquo;,正被拆掉。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>6 信息透明</td>\n<td>&ldquo;My mid-year review was conducted live at an All Hands so everyone could see exactly what I&rsquo;m accountable for.&rdquo;(Rascoff, LinkedIn《Building a Culture of Transparency》)</td>\n<td>一号位把自己的绩效评估<strong>当全员会公开做</strong>、列明自己被问责的指标 → 自缚+声誉暴露+逆权力,得罪&rdquo;高管不可评议&rdquo;的正统;对上市公司 CEO 反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息透明</td>\n<td>&ldquo;Any employee can message me with feedback… No hierarchy. No filters. Just real input.&rdquo; / &ldquo;I read every message… if anonymous, I share responses more broadly.&rdquo;(Rascoff, Fortune 2026.2;LinkedIn)</td>\n<td>全员可直 DM CEO,他逐条读、署名直接回、匿名的写答案<strong>每月全员公开</strong>;已收 300+ 条,一条 Gen Z ERG 建议变成他每月例会 → 真相上行的具体制度,非口号</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进 / 1 战略-结构</td>\n<td>〔事实〕&rdquo;restructuring aimed at helping Match function as a single company and not as a group of independently managed brands&rdquo;;&rdquo;reducing management layers, including around one in five managers&rdquo;;13% 裁员/325 人,中台化 tech/客服/审核/投放/国际 GTM,省 $100M/年(Q1&lsquo;25 财报/8-K;TechCrunch;StockStory)</td>\n<td>从&rdquo;品牌联邦&rdquo;收成单一产品制公司、砍 ~20% 经理、共享中台 → 但属<strong>用户下滑后被迫的一次性大重组</strong>(新 CEO 救火),非表现好时按节奏升级;成效 $100M 为自引</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>2 人才密度(Zillow 旧识)</td>\n<td>&ldquo;I would rather hire a &lsquo;rising star&rsquo; with high upside than a &lsquo;safe&rsquo; veteran who has stopped growing.&rdquo;(Rascoff,转述/Zillow 时期)</td>\n<td>招&rdquo;成长斜率&rdquo;而非&rdquo;安全资历&rdquo; → 偏离&rdquo;招稳妥老兵&rdquo;共识,但二手转述、非 Match 当期落地机制</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → (2×2)+(2×2)+(1×1)=4+4+1=9;9/27×100=<strong>33→</strong> 计入 Δ 行无效,实际 <strong>37</strong>(透明两条 + 招人软信号;Δ 重组不进主分)。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;CEO 极端透明 + 直连一线&rdquo;能在一个士气受裁员冲击的成熟公司里重建信任与速度。失效条件:公开自评/DM 沦为表演式 costly(对外可见、对内人事/权力没真改),或裁员后人才流失抵消透明红利。</li>\n<li><strong>盲区 + 下一步</strong>:<strong>决策权/层级/激励维度需补机制</strong>——&ldquo;砍 1/5 经理后 span 变多宽、一线能独立拍板什么、奖励改没改&rdquo;全无细节(信息盲区,非平庸)。透明机制的<strong>落地证据薄</strong>:只有 Rascoff 自引&ldquo;&lsquo;高管让员工知情&rsquo;survey +13%&rdquo;(stated)。Follow up:找 Match/Tinder 前员工对账&rdquo;公开自评是否真改了问责、DM 是否真影响人事资源&rdquo;;看 reorg 后 12 个月留存与产品速度的第三方数据。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:核心赌注是 Tinder 用户下滑下的 Gen Z 产品重构 + AI 化——战略层,组织分不计。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 {中(在线交友成熟、增长承压)} × 战略 {共识(同类成熟互联网公司都在裁员+扁平+AI)} → <strong>P2</strong>。一句理由:有一条真 costly 的透明 Alpha 值得留意,但主线是弱组织补债式 Delta、standing Alpha 薄、成效未验证——有空再看/持续观察,不放下手头事。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":84,"score":37,"conf":"THIN","dir":"↑","priority":"P2","company":"New York Times (NYT)","oneliner":"2018起missions/functions跨职能架构+编采商业硬隔离,媒体同业罕见且订阅转型已落地","card":"<h1>New York Times (NYT) — Why attention?   ·   Score 37 · 置信度 THIN · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:<strong>值得&rdquo;有空看 / 持续观察&rdquo;，不是 P0</strong>。NYT 的组织操作系统是一家把&rdquo;报社&rdquo;重做成&rdquo;产品-数据-工程一体的订阅科技公司&rdquo;：用 2018 起的 <strong>&ldquo;missions / functions&rdquo;</strong> 横向矩阵替代传统编辑部式部门墙，同时保留<strong>编辑/商业双线汇报到 publisher</strong> 的行业防火墙。<strong>这是截面 Alpha（当前在跑、且数字订阅 0→12.78M 是第三方可核验的落地证据）</strong>，但公开能挖到的<strong>机制颗粒度偏浅</strong>（谁拍板、span、激励、招人筛子几乎查无）→ 拿不到高 C，置信度 THIN。同行（WaPo / WSJ / Gannett / Condé）很多事是 table-stakes，对同类的真偏离主要是&rdquo;转型真做成了&rdquo;。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离同类基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>7 康威 / 1 战略-结构</td>\n<td>〔事实〕&rdquo;beginning at the end of 2018, the company&rsquo;s business structure was broken out into teams that manage &lsquo;missions&rsquo;…and &lsquo;functions,&rsquo; like product, advertising and marketing&rdquo;（Nieman Lab 2020 转述 Levien 重组）；员工侧&rdquo;Product teams are collaborative and very data-driven, great cross-functional culture where PM, Engineering, Design, and Analytics work closely&rdquo;（Glassdoor）</td>\n<td>把传统媒体的&rdquo;采编/广告/发行&rdquo;职能墙，重画成<strong>横向 mission 小队（按产品目标）× 纵向 function（共享职能）</strong>的矩阵；产品/数据/工程嵌入业务而非外包。偏离同类&rdquo;编辑部+广告部两张皮&rdquo;基线。<strong>机制颗粒（mission 多大、谁拍板）公开查无</strong></td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进</td>\n<td>〔事实〕数字订阅由近零增至<strong>12.78M 总订阅(2025-12-31)、52% 在多产品 bundle</strong>；&rdquo;those subscribers engage more, stay longer and pay more over time&rdquo;（Levien, 财报/StockTitan 10-K、TheWrap Q3&lsquo;25）</td>\n<td>在<strong>整个行业转型失败的同类里（同为 legacy 报社）真把订阅科技模型跑成稳态</strong>、且没回弹——revealed outcome（第三方可核验），不是 CEO 自引数据</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流 / 治理</td>\n<td>〔事实〕executive editor 与 CEO <strong>均向 publisher (A.G. Sulzberger) 汇报</strong>，publisher 守&rdquo;church &amp; state&rdquo;防火墙（多源）；&rdquo;the first dollar always goes to journalism&rdquo; / &ldquo;If you break the newsroom, you can&rsquo;t remake it&rdquo;（Levien, Fortune 2025）</td>\n<td>编辑独立靠<strong>双线汇报+家族控制</strong>制度化。但这是<strong>新闻业 table-stakes</strong>（WaPo/WSJ 同构）→ 对同类不算偏离</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>8/2 一号位·人才</td>\n<td>&ldquo;the best ideas flow upwards&rdquo;；&rdquo;If you want…a mission-driven culture, you need to be really clear about what is <strong>not</strong> changing&rdquo;（A.G. Sulzberger，2014 Innovation Report / Reuters Institute）</td>\n<td>一号位有组织自觉的<strong>软信号</strong>，但<strong>挖不到机制</strong>（无具体招人筛子、无 span、无会议机制）→ <strong>需补机制</strong>、不进主分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 → 4 + 4 + 2 = 10 → round(10/27×100)=<strong>37</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;把报社当软件公司做产品-数据一体化 + 防火墙保住信誉&rdquo;能持续转化为订阅复利；若 AI 摘要/分发吞掉直达流量、或 mission 矩阵退化成又一层协调官僚（员工已报&rdquo;lots of restructuring&rdquo;&ldquo;communication like pulling teeth&rdquo;&ldquo;parts of tech org understaffed&rdquo;），增长引擎会失速。</li>\n<li><strong>盲区 + 下一步</strong>:决策权/span/激励/招人筛子/会议机制 <strong>几乎全部查无</strong>（信息不足，≠ 平庸）。Follow up：① 找 mission 小队的真实规模与拍板边界（产品/工程一线能独立改什么）；② 工会(NewsGuild/Tech Guild)与 Glassdoor 长贴里&rdquo;重组疲劳 vs 跨职能协作&rdquo;的对账，判断矩阵是真整合还是政治化；③ Joe Kahn(编辑)× Levien(商业)真实协作机制。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:<strong>多产品 bundle 战略（News+Athletic+Cooking+Games+Wirecutter+Audio，目标 2027 达 15M）= 业务/产品离群，已按护栏一剔出组织分</strong>——它的组织表达（产品-工程一体化）已在维度7计过，bundle 本身只进战略层。</li>\n<li><strong>优先级</strong>:组织 37 × 市场 中(订阅媒体，规模可观但非超大赛道) × 战略 偏共识(订阅+bundle 是当下行业主流答案，NYT 是执行最好的、非反共识) → <strong>P2</strong>。理由：截面 Alpha 真实存在且转型已 revealed 落地，但<strong>对同类的偏离中等、机制颗粒太浅拿不到高 C</strong>；非&rdquo;放下手头去看&rdquo;，属&rdquo;有空看/持续观察&rdquo;，重点跟进 mission 矩阵的真实决策权与激励机制。</li>\n</ul>","industry":"媒体/娱乐/游戏"},{"rank":85,"score":35,"conf":"RICH","dir":"↑","priority":"P2","company":"Adobe","oneliner":"Check-in废除强制排名:可复述的绩效机制,反大厂stack-rank正统","card":"<h1>Adobe — Why attention?   ·   Score 35 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;有空看&rdquo;、非放下手头去看。Adobe 的&rdquo;组织操作系统&rdquo;亮点是两条<strong>仍在运行的人机制</strong>——2012 年率先杀掉强制分布/末位淘汰的 <strong>Check-in</strong>、以及人人可领 $1000 自由试错的 <strong>Kickbox</strong>——这是真截面 <strong>Alpha</strong>，但当年的反正统优势已被同类大厂追平（D 衰减），且核心决策维度有<strong>独立可核验的平庸病征</strong>（共识冗长、筒仓、反复 reorg）。叠加一个<strong>弱组织承压型 Δ</strong>：CEO 换帅 + 绕 AI 重组（危机驱动，非强势演进）。Δ 不减 Alpha，但 Alpha 本身只到中低。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>5/6 激励·信息流</td>\n<td>&ldquo;We plan to abolish the annual performance review format&rdquo;(Donna Morris, 2012, whatmatters.com);〔事实〕&rdquo;forced-distribution stack rankings have been replaced…sessions are <strong>called by contributors and decoupled from compensation</strong>&rdquo;;&rdquo;~80,000 manager hours&rdquo;被砍(同源)</td>\n<td>全员废除末位淘汰/曲线打分→改连续 Check-in、反馈与薪酬解耦、由员工发起；2012 业界首动者、2024–25 确认仍在跑。偏离当时&rdquo;stack-ranking 正统&rdquo;。<strong>但</strong>自2013–15 微软/GE 等同类大厂陆续跟进→对同类已非反常</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3/5 决策权·激励</td>\n<td>〔事实〕&rdquo;red cardboard box containing a <strong>$1,000 no-strings prepaid credit card</strong> employees can spend as they see fit&rdquo;(Fast Company/InnovationLeader);任意员工可参加2天 workshop 自带预算试错</td>\n<td>一线无审批拿真金试任意 idea、&rdquo;1/1000 命中即成功&rdquo;；仍在跑且已开源。偏离大厂&rdquo;创新走流程/上浮立项&rdquo;基线</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>3/6 决策·真相上行(病征)</td>\n<td>〔事实〕员工侧:&rdquo;<strong>consensus-heavy reviews and slower decisions</strong>&rdquo;&ldquo;<strong>silos and fiefdoms</strong> are not uncommon, with <strong>long-timers holding back progress</strong>&ldquo;&rdquo;frequent reorgs&rdquo;(Built In / Blind 汇总, 2026)</td>\n<td>矩阵+共识驱动→决策慢、筒仓、中层沉淀；独立员工口径=<strong>确认平庸</strong>(非信息盲区)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>9/1 组织演进(Δ)</td>\n<td>〔事实〕&rdquo;Narayen to <strong>Step Down Amid Generative AI Turbulence</strong>&ldquo;，股价 YTD ≈ −25%，员工称&rdquo;lack of specific AI strategy&rdquo;(Fortune/FinancialContent/Blind, 2026)</td>\n<td>换帅+绕 AI 重组：<strong>危机/承压时被迫</strong>、非表现好时主动→诊断偏&rdquo;弱组织补债&rdquo;，标&rdquo;↗转向中&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>：仅计 A 行 Top-3 → Check-in(S=4)+Kickbox(S=4)+(病征行 D=0 不贡献) ≈ Σ8–10 /27×100 ≈ <strong>35</strong>。<strong>在赌什么/何时失效</strong>：赌&rdquo;去掉考核仪式+给一线试错权能换来真创新与留存&rdquo;；当矩阵共识文化把决策拖慢、AI-native 对手快打慢时失效（当前正发生）。</li>\n<li><strong>盲区+下一步</strong>：David Wadhwani(继任热门)的<strong>招人筛子/开会机制</strong>两条定向子查询<strong>查无具体机制</strong>(需补机制，非平庸)——他若上任,follow up 其&rdquo;怎么开会/怎么放权&rdquo;是否打破现有共识病。验证 hypothesis：Check-in 的留存改善数据全为 Adobe 自引(stated)→需第三方/员工侧对账才到 C3。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>：Firefly 版权安全模型、被 AI-native 对手挤压的护城河之争——战略层值得看，但属产品/市场，不进组织分。</li>\n<li><strong>优先级</strong>：组织 35 × 市场 大 × 战略 共识(承压跟随) → <strong>P2</strong>：两条真机制+大市场撑住关注，但核心决策维度确认平庸、Δ 偏补债→非 P0/P1，列入&rdquo;持续观察换帅后是否真演进&rdquo;。</li>\n</ul>","industry":"软件/SaaS/网络安全"},{"rank":86,"score":33,"conf":"RICH","dir":"↑","priority":"P2","company":"Upstart (UPST)","oneliner":"Speed as a Habit:可逆/致命决策分级+决策尽量下沉,自述待验证","card":"<h1>Upstart (UPST) — Why attention?  ·  Score 33 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得&rdquo;有空看&rdquo;。它的&rdquo;组织操作系统&rdquo;=创始人 Dave Girouard 把<strong>决策速度</strong>当一等公民——先定 WHEN 再定 WHAT、按可逆性分级、用固定会议节律明确&rdquo;哪件事在哪场会拍板&rdquo;。这是一条<strong>截面 Alpha</strong>(运行多年、可复述、员工侧对得上),但 ① 速度对创业公司部分是 table-stakes,② 大半证据是 CEO 自己广传的 First Round 长文(自利、未被第三方证明&rdquo;因此跑赢&rdquo;),C 封顶 2;非 P0。Δ 层有一次<strong>有序的创始人接班</strong>(CTO 联创 Paul Gu 2026/5 接任 CEO),诊断为强组织主动演进、非补债。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>决策权/节律</td>\n<td>&ldquo;WHEN a decision is made is much more important than WHAT… the vast majority [of decisions] aren&rsquo;t worth more than 10 minutes&rdquo;;&rdquo;a staff meeting on Monday, a business meeting on Wednesday, a product meeting on Friday… everybody knew which meeting the decisions were made at&rdquo;(Girouard, First Round《Speed as a Habit》)</td>\n<td>每个决策先定时间预算+谁给输入+何时出答案;Type-2(可逆)当假设直接 ship、错了再改;固定三会、每会明确&rdquo;谁在此拍板&rdquo;→ 偏离&rdquo;多收集数据/共识不拍板&rdquo;的默认引力</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>授权/context-not-control</td>\n<td>&ldquo;Well, your job is to figure out what we need to do instead&rdquo;;&rdquo;That&rsquo;s what I hired you to figure out&rdquo;(First Round profile)</td>\n<td>一线认定策略错时,CEO 不接管而把&rdquo;想替代方案&rdquo;的决策权推回给人;招高管&rdquo;靠 references 而非面试&rdquo;→ 偏离决策上浮/CEO 日历塞满细节</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>人才筛子</td>\n<td>&ldquo;Be smart, but know you might be wrong&rdquo;——要&rdquo;incredibly bright people… that realize they&rsquo;re not infallible&rdquo;(Girouard 访谈)</td>\n<td>招人筛&rdquo;智识谦逊+好奇心&rdquo;;联创 Paul Gu 早期作为年轻 Thiel Fellow 入伙、14 年后内部接任 CEO(revealed)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>演进(接班)</td>\n<td>〔事实〕&rdquo;Paul and I have been building Upstart side by side for almost 14 years… another 14&rdquo;;CTO/联创 Paul Gu 2026/5 任 CEO,Girouard 转执行董事长(Upstart IR, 2026/2)</td>\n<td>计划性、联创内部接班、非危机触发(diagnose=强组织主动演进,非补债)→ 单独标</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↗</td>\n</tr>\n<tr>\n<td>演进(债)</td>\n<td>〔事实〕&rdquo;3 separate organization-wide layoffs and restructures over 1.5 years&rdquo;(Glassdoor 员工);7%(2022/11)+20%(2023/2)裁员</td>\n<td>反复 reorg=真债,但由放贷业务的利率周期冲击驱动、headcount 已企稳;不掩盖上面 standing Alpha</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">—</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:只累计 A 行 Top-3 S=D×C → 决策(4)+授权(4)+筛子(1)=9 → 9/27×100=<strong>33</strong>。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;快错可逆 &gt; 慢对&rdquo;,在可逆决策占多数的软件/产品域成立;一旦核心是高风险不可逆决策(放贷信用模型、合规),&rdquo;10 分钟拍板&rdquo;文化可能伤人——这正是 2022–23 反复 reorg 暴露的边界。</li>\n<li><strong>盲区 + 下一步</strong>:层级/span、激励所有权、信息透明制度<strong>需补机制</strong>(只有泛泛&rdquo;管理很透明&rdquo;的员工口径,无具体制度)。Follow up:① 找前员工对账&rdquo;Speed as a Habit&rdquo;是否真落到一线授权、还是退化成&rdquo;老板快拍、下面背锅&rdquo;(员工提&rdquo;tough bosses/high stress&rdquo;);② 验 hypothesis:Paul Gu 接任后这套速度 OS 是被强化还是稀释。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:AI 信用承销(以 ML 替 FICO)是其大赌注、市场大,但在 fintech 里属已知主线、非组织信号——战略值得看,组织上是&rdquo;中等 Alpha + 已企稳的周期性债&rdquo;。</li>\n<li><strong>优先级</strong>:组织 33 × 市场 大 × 战略 偏共识 → <strong>P2</strong>:有一条可复述、员工对得上的真机制(决策速度 OS),够&rdquo;有空看/持续观察&rdquo;;但证据偏 CEO 自著、且未达 revealed&rdquo;因此跑赢&rdquo;,不进 P1/P0。</li>\n</ul>","industry":"金融/支付/加密"},{"rank":87,"score":30,"conf":"RICH","dir":"?","priority":"P2","company":"Intel (INTC)","oneliner":"砍掉约一半管理层级、点名'最强KPI是团队人数',revealed但属危机转向","card":"<h1>Intel (INTC) — Why attention?   ·   Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>:值得放进观察名单、但别当成&rdquo;组织优异标的&rdquo;。这是一家 50 年老巨头在危机后被新 CEO(Lip-Bu Tan,2025-03 上任)<strong>自上而下推动转向</strong>的故事——信号几乎全是 <strong>Δ(承认大公司病 + 宣布拆层/砍人/RTO)</strong>,<strong>截面 Alpha(当前在跑、跑成稳态的反常机制)几乎挖不到</strong>。reorg 诊断:① 危机/亏损/错失 AI 后<strong>被迫做</strong>(非表现好时主动);② <strong>远未稳态</strong>(裁员延续到 2026,工厂还在裁);③ standing Alpha base 薄(旧 Intel 文化被广泛报道已衰败)。&rdquo;组织变好了&rdquo;只有 CEO 自述 + 自引数据 → 按落地闸封顶、不进 P0。</p>\n<table>\n<thead>\n<tr>\n<th>维度</th>\n<th>逐字原话 / 〔事实〕(+来源)</th>\n<th>机制(谁/怎么/多少)+ 偏离基线</th>\n<th style=\"text-align: center;\">A/Δ</th>\n<th style=\"text-align: center;\">D</th>\n<th style=\"text-align: center;\">C</th>\n<th style=\"text-align: center;\">方向</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>4 层级/span</td>\n<td>&ldquo;Many teams are eight or more layers deep, which creates unnecessary bureaucracy that slows us down&rdquo;;&rdquo;The most important KPI for many managers at Intel has been the size of their teams. Going forward, this will not be the case&rdquo;;&rdquo;The best leaders get the most done with the fewest people&rdquo;(Tan《Our Path Forward》全员信,2025-04-24,Intel Newsroom)</td>\n<td>把&rdquo;管多少人&rdquo;从晋升 KPI 里拿掉、反向奖励&rdquo;用更少的人做更多&rdquo;;命中得罪人+可证伪+反共识 → costly。但是<strong>刚宣布的增量(Δ)</strong>、不是在跑的稳态</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>9 组织演进(revealed)</td>\n<td>〔事实〕&rdquo;streamlining the number of management layers by about 50%&rdquo;;年底全球员工 ~75,000(从约 125k 降 ~15%+)(Intel Q2&lsquo;25 财报/8-K,SEC,2025-07-24)</td>\n<td>实际砍层、砍编(第三方/财报可核验=revealed 动作);但这是<strong>砍冗余补债</strong>、非&rdquo;强组织主动升级&rdquo;,且只证明&rdquo;动了&rdquo;,未证明&rdquo;变好&rdquo;</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>3 决策权</td>\n<td>&ldquo;important chip groups reporting directly to him&rdquo;——DCAI、CCG 直接向 Tan 汇报;Bruckner/Hurley/Lisa Pearce 三名技术高管直汇报;升 Sachin Katti 为 CTO 兼 AI 主管(Reuters memo,2025-04;SCMP 转载)</td>\n<td>CEO 亲自抓核心工程线、把工程职能提进 ET(执委会);属一号位亲历(维8)。但本质是把权力<strong>收回 CEO</strong>(更集权=自利方向),按理发师铁律压 C</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>决策/会议</td>\n<td>&ldquo;I am instructing our leaders to eliminate unnecessary meetings and significantly reduce the number of meeting attendees. Too much valuable time is being wasted&rdquo;(同上全员信)</td>\n<td>指令式砍会/砍与会人数——是<strong>命令</strong>不是落地机制(没说怎么强制、是否反弹);同类turnaround常见话术</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n<tr>\n<td>6 信息流(承认)</td>\n<td>&ldquo;seen as too slow, too complex and too set in our ways — and we need to change&rdquo;;&rdquo;organizational complexity and bureaucratic processes have been slowly suffocating the culture of innovation&rdquo;(同上)</td>\n<td>一号位 costly、具体地自我归罪揪大公司病=真相上行的 ↑(强于否认麻木);但只是&rdquo;承认+宣布改&rdquo;,<strong>是 Δ 不是 Alpha</strong></td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score(只累计 A 行 Top-3)</strong>:<strong>全表无 A 行</strong> → standing Alpha S 求和 = 0。Δ 行默认不进主分。给 <strong>30</strong> 是对&rdquo;维8 一号位组织设计自觉 + 已 revealed 的砍层动作&rdquo;的软分(承认+方向清晰+部分落地动作可核验),非截面优异分。<strong>在赌什么 / 何时失效</strong>:赌&rdquo;砍掉中层 + 工程师直通 CEO 能恢复创新速度&rdquo;;若员工流失(turnover ~17%、留存者 workload +35%)抽干技术骨干、或砍人砍到产出肌肉,则转向反成自残。</li>\n<li><strong>盲区 + 下一步</strong>:① 新结构是否<strong>跑成稳态</strong>(2026 仍在裁,远未坐实)——这是最大未验证点;② 拆层后<strong>一线决策边界</strong>到底放了什么(只挖到&rdquo;直汇报&rdquo;,没挖到&rdquo;一线能独立拍什么板&rdquo;)=需补机制;③ Tan 的<strong>招人/看人筛子</strong>只搜到&rdquo;亲自招工程师、晚上听工程师、listening 哲学&rdquo;等软信号,无具体筛子(需补)。follow up:盯 2026 中后的留存/产品交付节奏 + 员工侧(Blind/Glassdoor)与&rdquo;提速&rdquo;自述对账,验证 hypothesis&rdquo;砍层真的提了速 vs 只是变小&rdquo;。</li>\n<li><strong>业务/战略离群(不计入组织分)</strong>:foundry&rdquo;不再开空白支票&rdquo;、砍德国/波兰建厂、放缓 Ohio(&ldquo;be judicious and disciplined as we allocate capital&rdquo;,Q2&lsquo;25)——资本纪律上的大转向,战略层值得看,但属资本决策、不进组织分。</li>\n<li><strong>优先级</strong>:组织 30(低分 + RICH = 信号丰富但<strong>截面平庸/全是转向故事</strong>) × 市场(大:算力/半导体) × 战略(反共识:foundry 资本纪律 + 全面重组) → <strong>P2</strong>。理由:组织维度暂无 standing Alpha、是被迫补债的 Δ,不值得为&rdquo;组织&rdquo;放下手头事;但大市场 + 资本/转向戏剧性大,值持续观察其落地,<strong>别误 Pass</strong>(它不是&rdquo;确认组织优异&rdquo;,也不是&rdquo;看不出&rdquo;,而是&rdquo;确认当前组织平庸 + 正在转向、待坐实&rdquo;)。</li>\n</ul>","industry":"半导体/算力硬件"},{"rank":88,"score":30,"conf":"RICH","dir":"?","priority":"P2","company":"商汤 SenseTime（HK 0020）","oneliner":"1+X把生态业务拆独立公司各设CEO担损益,真机制但似亏损补债","card":"<h1>商汤 SenseTime（HK 0020）— Why attention?  ·  Score 30 · 置信度 RICH · 优先级 P2</h1>\n<p><strong>一句话定性</strong>：值得&rdquo;持续观察&rdquo;而非现在重仓看组织。它的&rdquo;组织操作系统&rdquo;几乎全是<strong>转向 Delta（在改）</strong>——5 年半累亏 500 亿+、原视觉/智慧城市主业被迫收缩，2024 下半年起靠&rdquo;裁员+1+X 拆分&rdquo;补债。<strong>截面 Alpha 很薄</strong>：唯一挖到机制且有第三方落地证据的，是「1+X 把烧钱业务拆成独立 CEO+独立融资的生态企业」——这是危机驱动的演进（偏弱组织补债侧），不是从强势位置的主动升级。同类基线=AI 四小龙/AI lab，喊&rdquo;聚焦/轻盈化/聚焦核心&rdquo;是同辈 table-stakes。</p>\n<table>\n<thead>\n<tr>\n< er;\">?</td>\n</tr>\n<tr>\n<td>9 组织演进</td>\n<td>〔事实〕Chapek 2020 设 DMED 集中 P&amp;L → 2023 Iger 回归即拆回 → 2024 又调 streaming/ESPN(CNBC、Variety、Wikipedia DMED)</td>\n<td>reorg 来回反转:集中→拆散,危机/激进股东压力 + Iger 中途回锅后做。诊断三问命中&rdquo;危机后被迫做 / 反复反转&rdquo; → <strong>弱组织补债</strong>侧,非强组织按节奏升级</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">2</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>6 信息流/平庸</td>\n<td>&ldquo;terrible morale…constant anxiety about layoffs, people burned out and checked out&rdquo;&ldquo;you can do great work for years and still get cut in the next cost-saving reorg&rdquo;&ldquo;strong prevalence of internal politics&rdquo;(Glassdoor 员工评价汇总，2024–25)</td>\n<td>员工侧 revealed:年年裁员、政治内耗、明星员工过劳、senior 被更便宜的人替换。<strong>独立证据的确认平庸</strong>(非 CEO 自述)</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">0</td>\n<td style=\"text-align: center;\">3</td>\n<td style=\"text-align: center;\">↓</td>\n</tr>\n<tr>\n<td>2 人才密度</td>\n<td>&ldquo;values ability more than experience…puts people in roles that require more of them than they know they have&rdquo;;找&rdquo;genuine decency&rdquo;(《Ride of a Lifetime》)</td>\n<td>招人哲学 articulate 但<strong>无 costly 筛子</strong>:没有怪癖 bar、没有 keeper test、没有可证伪的具体动作 → 命中折扣词、不可证伪</td>\n<td style=\"text-align: center;\">A</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">?</td>\n</tr>\n<tr>\n<td>8 一号位自觉</td>\n<td>&ldquo;I was disappointed in what I was seeing&rdquo;;称 DMED is &ldquo;a mistake&rdquo;(CNBC / Variety 2023)</td>\n<td>一号位 costly 承认前任组织病、跟着拆结构 → Δ 级 ↑(敢说),但<strong>做成需 revealed</strong>,落地闸:员工侧反而恶化 → 不给 outcome 分</td>\n<td style=\"text-align: center;\">Δ</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">1</td>\n<td style=\"text-align: center;\">↑</td>\n</tr>\n</tbody>\n</table>\n<ul>\n<li><strong>Score</strong>:仅累计 A 行 Top   ['Frontier AI / 模型实验室 / 模型原生媒体',['anthropic','deepseek','surge ai','scale ai','elevenlabs','midjourney','minimax','sensetime','xai','captions','mirage']],
  ['AI-native 应用 / Agent / AI Dev Platform',['modal','cognition','sana','clay','anysphere','cursor','crosby']],
  ['半导体 / 算力硬件 / 供应链',['nvidia','amphenol','broadcom','tenstorrent','tsmc','microchip','smic','intel']],
  ['国防 / 航天 / 自动驾驶 / 机器人',['spacex','applied intuition','anduril','tesla','figure ai','rocket lab','blue origin']],
  ['Fintech / Crypto / 金融基础设施 / Insurtech',['revolut','kraken','coinbase','stripe','ramp','mercury','stoneco','lemonade','carta','upstart','block']],
  ['Commerce / Marketplace / Local Services / Travel',['airbnb','shopify','trip.com','pdd','doordash','amazon','etsy','mercadolibre','alibaba','meituan','faire']],
  ['Enterprise SaaS / 协作 / 业务应用',['expensify','kingsoft','gitlab','wix','rippling','notion','asana','atlassian','dropbox','canva','hubspot','adobe']],
  ['Infra Software / Security / Comms / Dev Infrastructure',['palantir','ubiquiti','sourcegraph','datadog','cloudflare','bandwidth','crowdstrike']],
  ['Media / Social / Gaming / Ads / Entertainment',['telegram','netflix','applovin','caesars','bytedance','take-two','tencent','roku','meta','duolingo','reddit','spotify','match group','new york times','disney','the trade desk']],
  ['Consumer / Retail / CPG / Beauty-tech',['post holdings','oddity tech']],
  ['Healthcare / Care Delivery / Wellness',['levels','u.s. physical therapy']],
  ['Real Estate / Housing Platforms',['ke holdings','beike']],
  ['Holding Companies / Professional Services / Operating Platforms',['iac','people inc','globant']]
];
function escHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function classifyIndustry(r){
  const company=String(r.company||'').toLowerCase();
  const hay=(company+' '+String(r.oneliner||'')).toLowerCase();
  for(const [name,companies] of INDUSTRY_OVERRIDES){
    if(companies.some(x=>company.includes(x)))return name;
  }
  for(const [name,companies,words] of INDUSTRY_RULES){
    if(companies.some(x=>company.includes(x)))return name;
    if(words.some(x=>hay.includes(x.toLowerCase())))return name;
  }
  return '其他/待归类';
}
DATA.forEach(r=>{r.industry=classifyIndustry(r)});
function industryStats(rows){
  const map=new Map();
  rows.forEach(r=>{
    const item=map.get(r.industry)||{name:r.industry,count:0,total:0,top:null};
    item.count++;item.total+=r.score;if(!item.top||r.score>item.top.score)item.top=r;map.set(r.industry,item);
  });
  return [...map.values()].sort((a,b)=>b.count-a.count||b.total/b.count-a.total/a.count);
}
function populateIndustryOptions(){
  industryStats(DATA).forEach(s=>{
    const opt=document.createElement('option');
    opt.value=s.name;opt.textContent=`${s.name} (${s.count})`;industrySel.appendChild(opt);
  });
}
function band(s){return s>=80?'s80':s>=60?'s60':s>=40?'s40':'s0'}
function dirc(d){return d==='↑'?'up':d==='↓'?'down':'q'}
function render(){
  const base=DATA.filter(r=>{
    const s=q.value.trim().toLowerCase();
    if(s){return (r.company+' '+r.industry+' '+r.oneliner+' '+r.card).toLowerCase().includes(s)}
    return true;
  });
  renderClusters(base);
  let list=base.filter(r=>industryFilter==='all'||r.industry===industryFilter);
  list.sort((a,b)=>{let x=a[sortK],y=b[sortK];if(typeof x==='string'){x=x.toLowerCase();y=y.toLowerCase()}if(x<y)return -sortDir;if(x>y)return sortDir;return a.rank-b.rank});
  tb.innerHTML='';
  list.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="n">${r.rank}</td>
<td class="s"><span class="score ${band(r.score)}">${r.score}</span></td>
<td><span class="conf">${r.conf}</span></td>
<td class="dir ${dirc(r.dir)}">${r.dir}</td>
<td><span class="industry">${escHtml(r.industry)}</span></td>
<td><span class="co">${r.company}</span>${r.priority?`<span class="pri ${r.priority}">${r.priority}</span>`:''}<div class="ol">${r.oneliner}</div></td>
<td><a class="lk" data-r="${r.rank}">查看卡片 →</a></td>`;
    tb.appendChild(tr);
  });
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';
    document.getElementById('cnt').textContent = DATA.length;
    const metaText = `${list.length} / ${DATA.length} 家 · ${industryFilter==='all'?'全部行业':industryFilter} · 点列头排序 · 点卡片查看逐字原话+机制`;
    headerMeta.textContent = metaText;
    if (isCompactMode) compactMeta.textContent = `有多少家：${metaText}`;
  }
function renderClusters(rows){
  const stats=industryStats(rows);
  clusters.innerHTML=`<button class="cluster ${industryFilter==='all'?'on':''}" data-industry="all"><b>全部行业</b><span>${rows.length} 家 · 清除行业筛选</span></button>`+
    stats.map(s=>{
      const avg=Math.round(s.total/s.count);
      return `<button class="cluster ${industryFilter===s.name?'on':''}" data-industry="${escHtml(s.name)}"><b>${escHtml(s.name)}</b><span>${s.count} 家 · 均分 ${avg} · Top ${escHtml(s.top.company)}</span></button>`;
    }).join('');
}
tb.addEventListener('click',e=>{const a=e.target.closest('.lk');if(!a)return;const r=DATA.find(x=>x.rank==a.dataset.r);openCard(r)});
function openCard(r){
  const mc=document.getElementById('mc');
  mc.innerHTML=r.card;
  prepareModalTables(mc);
  document.getElementById('ov').classList.add('on');
  document.getElementById('modal').scrollTop=0;
  mc.scrollLeft=0;
}
function prepareModalTables(root){
  root.querySelectorAll('table').forEach(t=>{
    const n=t.querySelector('tr')?.children.length||0;
    if(n)t.classList.add(`cols-${n}`);
  });
}
function renderInlineMd(s){
  return escHtml(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
}
function splitMdTableRow(line){
  return line.replace(/^\s*\||\|\s*$/g,'').split('|').map(c=>c.trim());
}
function renderMd(md){
  const lines=md.replace(/\r\n?/g,'\n').split('\n');
  const out=[];
  let i=0,para=[],list=null;
  const flushPara=()=>{if(para.length){out.push(`<p>${renderInlineMd(para.join(' '))}</p>`);para=[]}};
  const closeList=()=>{if(list){out.push(`</${list}>`);list=null}};
  while(i<lines.length){
    const line=lines[i];
    const t=line.trim();
    if(!t){flushPara();closeList();i++;continue}
    if(/^---+$/.test(t)){flushPara();closeList();out.push('<hr/>');i++;continue}
    if(t.startsWith('|')&&lines[i+1]&&/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i+1])){
      flushPara();closeList();
      const heads=splitMdTableRow(t);
      i+=2;
      const rows=[];
      while(i<lines.length&&lines[i].trim().startsWith('|')){rows.push(splitMdTableRow(lines[i].trim()));i++}
      out.push('<table><thead><tr>'+heads.map(h=>`<th>${renderInlineMd(h)}</th>`).join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>`<td>${renderInlineMd(c)}</td>`).join('')+'</tr>').join('')+'</tbody></table>');
      continue;
    }
    const h=t.match(/^(#{1,4})\s+(.+)$/);
    if(h){flushPara();closeList();out.push(`<h${h[1].length}>${renderInlineMd(h[2])}</h${h[1].length}>`);i++;continue}
    if(t.startsWith('>')){flushPara();closeList();out.push(`<blockquote>${renderInlineMd(t.replace(/^>\s?/,''))}</blockquote>`);i++;continue}
    const ul=t.match(/^[-*]\s+(.+)$/);
    if(ul){flushPara();if(list!=='ul'){closeList();list='ul';out.push('<ul>')}out.push(`<li>${renderInlineMd(ul[1])}</li>`);i++;continue}
    const ol=t.match(/^\d+\.\s+(.+)$/);
    if(ol){flushPara();if(list!=='ol'){closeList();list='ol';out.push('<ol>')}out.push(`<li>${renderInlineMd(ol[1])}</li>`);i++;continue}
    closeList();para.push(t);i++;
  }
  flushPara();closeList();
  return out.join('\n');
}
function openBaseline(){
  const mc=document.getElementById('mc');
  mc.innerHTML=`<div class="baseline-card">${renderMd(BASELINE_PATTERN_MD)}</div>`;
  prepareModalTables(mc);
  document.getElementById('ov').classList.add('on');
  document.getElementById('modal').scrollTop=0;
  mc.scrollLeft=0;
}
function close(){document.getElementById('ov').classList.remove('on')}
document.getElementById('x').onclick=close;
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')close()};
document.addEventListener('keydown',e=>{if(e.key==='Escape')close()});
q.addEventListener('input',render);
industrySel.addEventListener('change',()=>{industryFilter=industrySel.value;render()});
clusters.addEventListener('click',e=>{const b=e.target.closest('.cluster');if(!b)return;industryFilter=b.dataset.industry;industrySel.value=industryFilter;render()});
document.getElementById('baselineBtn').onclick=openBaseline;
document.getElementById('compactBaselineBtn').addEventListener('click',()=>document.getElementById('baselineBtn').click());
document.querySelectorAll('th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=(k==='company')?1:-1}render()});
populateIndustryOptions();
render();
</script></body></html>
