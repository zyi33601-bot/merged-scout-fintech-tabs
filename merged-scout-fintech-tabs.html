<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>组织偏离幸存者榜 × Fintech Cohort</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --line: #deded8;
        --line-strong: #c8c8c0;
        --fg: #20211f;
        --mut: #6f706b;
        --accent: #0f766e;
        --accent-soft: #e7f4f1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei",
          sans-serif;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        padding: 16px 22px 10px;
        border-bottom: 1px solid var(--line);
        background: rgba(247, 247, 244, 0.94);
        backdrop-filter: blur(12px);
      }

      .tab-row {
        display: flex;
        gap: 20px;
        align-items: flex-end;
      }

      .tab-title {
        appearance: none;
        border: 0;
        padding: 0 0 8px;
        background: transparent;
        text-align: left;
        flex: 1;
        color: var(--mut);
        cursor: pointer;
        font: inherit;
      }

      .tab-title:last-child {
        text-align: right;
      }

      .tab-title .name {
        display: block;
        margin: 0;
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--fg);
      }

      .tab-title .sub {
        display: block;
        margin-top: 2px;
        color: var(--mut);
        font-size: 12px;
      }

      .tab-title:hover {
        opacity: 0.95;
      }

      .tab-title.active {
        color: var(--accent);
      }

      .tab-title.active .name {
        color: var(--accent);
      }

      .tab-title.active::after {
        content: "";
        display: block;
        margin-top: 8px;
        height: 2px;
        background: var(--accent);
        border-radius: 999px;
      }

      .tab-title:not(.active)::after {
        content: "";
        display: block;
        margin-top: 8px;
        height: 1px;
        background: transparent;
      }

      .content {
        position: relative;
        min-height: 0;
        flex: 1;
      }

      .pane {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: none;
        background: white;
      }

      .pane.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <header role="tablist" aria-label="页面切换">
      <div class="tab-row">
        <button
          id="tabSurvivors"
          class="tab-title active"
          role="tab"
          aria-selected="true"
        >
          <span class="name">Costly Deviation Scanner</span>
          <span class="sub">Org Deviation Scout</span>
        </button>
        <button id="tabFintech" class="tab-title" role="tab" aria-selected="false">
          <span class="name">Fintech Cohort</span>
          <span class="sub">Org Deviation Scout</span>
        </button>
      </div>
    </header>
    <div class="content">
      <iframe
        id="paneSurvivors"
        class="pane active"
        title="Costly Deviation Scanner"
        loading="eager"
        src="org-deviation-scout-index.html?compact=1"
      ></iframe>
      <iframe
        id="paneFintech"
        class="pane"
        title="Fintech Cohort"
        loading="lazy"
        src="fintech-cohort-live.html?compact=1"
      ></iframe>
    </div>

    <script>
      const tabSurvivors = document.getElementById('tabSurvivors');
      const tabFintech = document.getElementById('tabFintech');
      const paneSurvivors = document.getElementById('paneSurvivors');
      const paneFintech = document.getElementById('paneFintech');

      function switchTab(activeTab) {
        if (activeTab === 'survivors') {
          tabSurvivors.classList.add('active');
          tabSurvivors.setAttribute('aria-selected', 'true');
          tabFintech.classList.remove('active');
          tabFintech.setAttribute('aria-selected', 'false');
          paneSurvivors.classList.add('active');
          paneFintech.classList.remove('active');
          return;
        }

        tabFintech.classList.add('active');
        tabFintech.setAttribute('aria-selected', 'true');
        tabSurvivors.classList.remove('active');
        tabSurvivors.setAttribute('aria-selected', 'false');
        paneFintech.classList.add('active');
        paneSurvivors.classList.remove('active');
      }

      tabSurvivors.addEventListener('click', () => switchTab('survivors'));
      tabFintech.addEventListener('click', () => switchTab('fintech'));
    </script>
  </body>
</html>
